<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Hive — Operational Grid Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #0d1117; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; color: #c8d6e0; }
    canvas { display: block; width: 100vw; height: 100vh; }

    .hud { position: fixed; pointer-events: none; z-index: 10; }

    #hud-legend {
      top: 24px; left: 24px;
    }
    #hud-legend h1 {
      font-size: 14px; letter-spacing: 4px; font-weight: 600;
      margin-bottom: 14px; color: #c8d6e0;
    }
    #hud-legend .domain-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; margin-bottom: 6px; opacity: 0.75;
    }
    #hud-legend .domain-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    #hud-stats {
      top: 24px; right: 24px; text-align: right;
    }
    .stat-row {
      font-size: 11px; margin-bottom: 6px; opacity: 0.7;
    }
    .stat-value {
      font-size: 18px; font-weight: 600; color: #c8d6e0;
      display: block; margin-top: 2px;
    }

    #hud-status {
      bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 2px; opacity: 0.7;
      background: rgba(13, 17, 23, 0.6);
      padding: 8px 16px; border-radius: 4px;
    }
    #hud-status .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    #hud-status .status-dot.live { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    #hud-status .status-dot.demo { background: #d29922; box-shadow: 0 0 6px #d29922; }

    .domain-label {
      color: #c8d6e0;
      font: 600 11px/1 "SF Mono", "Fira Code", "Cascadia Code", monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    .domain-count-label {
      color: #8b949e;
      font: 400 10px/1 "SF Mono", "Fira Code", "Cascadia Code", monospace;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Agent detail panel */
    #agent-panel {
      position: fixed;
      top: 80px;
      right: 24px;
      width: 280px;
      max-height: calc(100vh - 160px);
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      z-index: 20;
      pointer-events: auto;
      display: none;
      overflow-y: auto;
    }
    #agent-panel.visible { display: block; }
    #agent-panel .panel-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    #agent-panel .panel-title {
      font-size: 12px; font-weight: 600; color: #c8d6e0;
      letter-spacing: 1px;
    }
    #agent-panel .panel-close {
      cursor: pointer; color: #8b949e; font-size: 14px;
      background: none; border: none; font-family: inherit;
      pointer-events: auto;
    }
    #agent-panel .panel-close:hover { color: #c8d6e0; }
    #agent-panel .panel-field {
      font-size: 10px; color: #8b949e; margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    #agent-panel .panel-value {
      font-size: 12px; color: #c8d6e0; margin-bottom: 10px;
      word-break: break-all;
    }
    #agent-panel .panel-divider {
      border: none; border-top: 1px solid #21262d; margin: 10px 0;
    }
    #agent-panel .timeline-title {
      font-size: 10px; color: #8b949e; letter-spacing: 1px;
      margin-bottom: 8px;
    }
    #agent-panel .timeline-entry {
      font-size: 10px; color: #c8d6e0; margin-bottom: 6px;
      display: flex; gap: 6px; align-items: baseline;
      line-height: 1.4;
    }
    #agent-panel .timeline-method {
      font-weight: 600; flex-shrink: 0; width: 32px;
    }
    #agent-panel .timeline-path {
      color: #8b949e; flex: 1; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }
    #agent-panel .timeline-status {
      flex-shrink: 0; width: 24px; text-align: right;
    }
    #agent-panel .timeline-status.ok { color: #3fb950; }
    #agent-panel .timeline-status.err { color: #f85149; }
    #agent-panel .timeline-status.warn { color: #d29922; }
    #agent-panel .timeline-time {
      flex-shrink: 0; color: #484f58; width: 50px; text-align: right;
    }
  </style>
</head>
<body>

  <div id="hud-legend" class="hud">
    <h1>THE HIVE</h1>
    <div id="legend-items"></div>
  </div>

  <div id="hud-stats" class="hud">
    <div class="stat-row">AGENTS<span class="stat-value" id="stat-agents">0</span></div>
    <div class="stat-row">REQ/S<span class="stat-value" id="stat-rps">0.0</span></div>
    <div class="stat-row">TIME<span class="stat-value" id="stat-time">--:--:--</span></div>
  </div>

  <div id="hud-status" class="hud">
    <div class="status-dot demo" id="status-dot"></div>
    <span id="status-label">DEMO</span>
  </div>

  <div id="agent-panel">
    <div class="panel-header">
      <span class="panel-title">AGENT DETAIL</span>
      <button class="panel-close" id="panel-close">&times;</button>
    </div>
    <div class="panel-field">AGENT ID</div>
    <div class="panel-value" id="panel-agent-id">--</div>
    <div class="panel-field">CURRENT DOMAIN</div>
    <div class="panel-value" id="panel-domain">--</div>
    <div class="panel-field">REQUESTS</div>
    <div class="panel-value" id="panel-req-count">0</div>
    <hr class="panel-divider">
    <div class="timeline-title">RECENT REQUESTS</div>
    <div id="panel-timeline"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ── Domain constants ──────────────────────────────────────────────

    const DOMAIN_POSITIONS = {
      'app-level':  { x:  0,   z:  0   },
      'discovery':  { x: 14,   z:  5   },
      'identity':   { x: 10,   z: -10  },
      'wallet':     { x:  0,   z: -14  },
      'analysis':   { x: -10,  z: -10  },
      'social':     { x: -14,  z:  0   },
      'channels':   { x: -10,  z: 10   },
      'market':     { x:  0,   z: 14   },
      'analytics':  { x:  7,   z:  8   },
      'capital':    { x: -6,   z:  6   },
    };

    const DOMAIN_COLORS = {
      'app-level':  0xffffff,
      'discovery':  0x6eb5ff,
      'identity':   0x5fd89a,
      'wallet':     0xffd36e,
      'analysis':   0x64dfdf,
      'social':     0xc77dff,
      'channels':   0xff8e98,
      'market':     0xf4b350,
      'analytics':  0x72efdd,
      'capital':    0xff6d6d,
    };

    const DOMAIN_NAMES = {
      'app-level': 'App Level',
      'discovery': 'Discovery',
      'identity':  'Identity',
      'wallet':    'Wallet',
      'analysis':  'Analysis',
      'social':    'Social',
      'channels':  'Channels',
      'market':    'Market',
      'analytics': 'Analytics',
      'capital':   'Capital',
    };

    // ── Scene setup ───────────────────────────────────────────────────

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0d1117, 1);
    document.body.prepend(renderer.domElement);

    const scene = new THREE.Scene();

    // OrthographicCamera — true top-down, no perspective distortion
    const camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 0.1, 200);
    camera.position.set(0, 50, 0);
    camera.lookAt(0, 0, 0);
    camera.up.set(0, 0, -1);

    function fitCamera() {
      const positions = Object.values(DOMAIN_POSITIONS);
      let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
      for (const p of positions) {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
      }
      const pad = 7;
      const cx = (minX + maxX) / 2, cz = (minZ + maxZ) / 2;
      const rangeX = (maxX - minX) / 2 + pad;
      const rangeZ = (maxZ - minZ) / 2 + pad;
      const aspect = window.innerWidth / window.innerHeight;
      const halfW = Math.max(rangeX, rangeZ * aspect);
      const halfH = halfW / aspect;
      camera.left = -halfW; camera.right = halfW;
      camera.top = halfH; camera.bottom = -halfH;
      camera.position.set(cx, 50, cz);
      camera.updateProjectionMatrix();
    }
    fitCamera();

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableRotate = false;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.target.set(0, 0, 0);
    controls.update();

    // ── CSS2D label renderer ────────────────────────────────────────────

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    // ── Resize handler ────────────────────────────────────────────────

    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      labelRenderer.setSize(w, h);
      fitCamera();
    });

    // ── Domain zones ──────────────────────────────────────────────────

    const domainZones = new Map();
    const domainCountLabels = new Map();
    const domainAgentCounts = new Map();

    for (const [domain, pos] of Object.entries(DOMAIN_POSITIONS)) {
      const color = DOMAIN_COLORS[domain];
      const group = new THREE.Group();
      group.position.set(pos.x, 0, pos.z);

      // Flat filled zone
      const fillMat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0.08,
        side: THREE.DoubleSide, depthWrite: false,
      });
      const fillMesh = new THREE.Mesh(new THREE.PlaneGeometry(4, 4), fillMat);
      fillMesh.rotation.x = -Math.PI / 2;
      group.add(fillMesh);

      // Border ring
      const borderMat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0.25,
        side: THREE.DoubleSide, depthWrite: false,
      });
      const borderMesh = new THREE.Mesh(new THREE.RingGeometry(2.7, 2.8, 4), borderMat);
      borderMesh.rotation.x = -Math.PI / 2;
      // Rotate ring 45 degrees so the square-ish ring aligns with the plane
      borderMesh.rotation.z = Math.PI / 4;
      group.add(borderMesh);

      // Domain name label
      const labelDiv = document.createElement('div');
      labelDiv.className = 'domain-label';
      labelDiv.textContent = DOMAIN_NAMES[domain];
      const label = new CSS2DObject(labelDiv);
      label.position.set(0, 0.1, -2.8);
      group.add(label);

      // Agent count label
      const countDiv = document.createElement('div');
      countDiv.className = 'domain-count-label';
      countDiv.textContent = '0 agents';
      const countLabel = new CSS2DObject(countDiv);
      countLabel.position.set(0, 0.1, 2.8);
      group.add(countLabel);
      domainCountLabels.set(domain, countDiv);

      scene.add(group);
      domainZones.set(domain, group);
      domainAgentCounts.set(domain, 0);
    }

    // ── Agent instanced mesh ──────────────────────────────────────────

    const MAX_AGENTS = 2048;
    const agentGeo = new THREE.CircleGeometry(0.2, 16);
    agentGeo.rotateX(-Math.PI / 2);
    const agentMat = new THREE.MeshBasicMaterial();
    const agentMesh = new THREE.InstancedMesh(agentGeo, agentMat, MAX_AGENTS);
    agentMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    agentMesh.count = 0;

    const instanceColors = new Float32Array(MAX_AGENTS * 3);
    agentMesh.instanceColor = new THREE.InstancedBufferAttribute(instanceColors, 3);
    agentMesh.instanceColor.setUsage(THREE.DynamicDrawUsage);

    scene.add(agentMesh);

    const agents = new Map();
    let nextAgentIndex = 0;

    // ── Connection lines ──────────────────────────────────────────────

    const connectionLines = [];

    function addConnectionLine(fromDomain, toDomain) {
      const fromPos = DOMAIN_POSITIONS[fromDomain];
      const toPos = DOMAIN_POSITIONS[toDomain];
      if (!fromPos || !toPos) return;

      const points = [
        new THREE.Vector3(fromPos.x, 0.05, fromPos.z),
        new THREE.Vector3(toPos.x, 0.05, toPos.z),
      ];
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({
        color: 0xc8d6e0, transparent: true, opacity: 0.15, depthWrite: false,
      });
      const line = new THREE.Line(geo, mat);
      scene.add(line);
      connectionLines.push({ line, mat, createdAt: Date.now(), duration: 3000 });
    }

    function updateConnectionLines() {
      const now = Date.now();
      for (let i = connectionLines.length - 1; i >= 0; i--) {
        const cl = connectionLines[i];
        const elapsed = now - cl.createdAt;
        if (elapsed >= cl.duration) {
          scene.remove(cl.line);
          cl.line.geometry.dispose();
          cl.mat.dispose();
          connectionLines.splice(i, 1);
        } else {
          cl.mat.opacity = 0.15 * (1 - elapsed / cl.duration);
        }
      }
    }

    // ── Utility functions ─────────────────────────────────────────────

    function agentColor(agentId) {
      let hash = 0;
      for (let i = 0; i < agentId.length; i++) hash = ((hash << 5) - hash + agentId.charCodeAt(i)) | 0;
      const hue = ((hash & 0xFFFF) * 137.508) % 360;
      return new THREE.Color().setHSL(hue / 360, 0.8, 0.65);
    }

    function classifyDomain(path) {
      if (path === '/' || path === '/llms.txt' || path === '/health') return 'app-level';
      if (path === '/api/v1/' || path.startsWith('/api/v1/platform/') || path === '/api/v1/ethos' ||
          path === '/api/v1/capabilities' || path.startsWith('/api/v1/strategies') ||
          path.startsWith('/api/v1/knowledge/') || path.startsWith('/api/v1/skills')) return 'discovery';
      if (path.startsWith('/api/v1/agents/') || path.startsWith('/api/v1/node/') ||
          path.startsWith('/api/v1/actions/')) return 'identity';
      if (path.startsWith('/api/v1/wallet/') || path === '/api/v1/ledger') return 'wallet';
      if (path.startsWith('/api/v1/analysis/')) return 'analysis';
      if (path.startsWith('/api/v1/messages') || path.startsWith('/api/v1/alliances') ||
          path.startsWith('/api/v1/leaderboard') || path.startsWith('/api/v1/tournaments') ||
          path.startsWith('/api/v1/bounties')) return 'social';
      if (path.startsWith('/api/v1/channels/')) return 'channels';
      if (path.startsWith('/api/v1/market/')) return 'market';
      if (path.startsWith('/api/v1/analytics/')) return 'analytics';
      if (path.startsWith('/api/v1/capital/') || path === '/api/v1/help') return 'capital';
      return null;
    }

    // ── Fermat spiral distribution ────────────────────────────────────

    const domainAgentSlots = new Map();

    function agentOffsetInDomain(slotIndex) {
      const goldenAngle = 2.399963;
      const spacing = 0.45;
      const angle = slotIndex * goldenAngle;
      const r = spacing * Math.sqrt(slotIndex + 1);
      const maxR = 1.7; // stay within the 4x4 zone
      const clampedR = Math.min(r, maxR);
      return {
        x: clampedR * Math.cos(angle),
        z: clampedR * Math.sin(angle),
      };
    }

    function claimSlotInDomain(domain) {
      const slot = domainAgentSlots.get(domain) || 0;
      domainAgentSlots.set(domain, slot + 1);
      return agentOffsetInDomain(slot);
    }

    function updateDomainCounts() {
      // Reset counts
      for (const d of domainAgentCounts.keys()) domainAgentCounts.set(d, 0);
      // Count agents per domain
      for (const [, agent] of agents) {
        const d = agent.currentDomain;
        if (domainAgentCounts.has(d)) {
          domainAgentCounts.set(d, domainAgentCounts.get(d) + 1);
        }
      }
      // Update labels
      for (const [d, count] of domainAgentCounts) {
        const el = domainCountLabels.get(d);
        if (el) el.textContent = count === 1 ? '1 agent' : `${count} agents`;
      }
    }

    // ── Agent detail panel ────────────────────────────────────────────

    const agentPanel = document.getElementById('agent-panel');
    const panelAgentId = document.getElementById('panel-agent-id');
    const panelDomain = document.getElementById('panel-domain');
    const panelReqCount = document.getElementById('panel-req-count');
    const panelTimeline = document.getElementById('panel-timeline');
    const panelClose = document.getElementById('panel-close');
    let selectedAgentId = null;

    panelClose.addEventListener('click', () => {
      agentPanel.classList.remove('visible');
      selectedAgentId = null;
    });

    function showAgentPanel(agentId) {
      const agent = agents.get(agentId);
      if (!agent) return;
      selectedAgentId = agentId;

      panelAgentId.textContent = agentId.length > 24 ? agentId.slice(0, 24) + '...' : agentId;
      panelDomain.textContent = DOMAIN_NAMES[agent.currentDomain] || agent.currentDomain;
      panelReqCount.textContent = agent.requests.length;

      panelTimeline.innerHTML = '';
      const recentReqs = agent.requests.slice(-10).reverse();
      for (const req of recentReqs) {
        const entry = document.createElement('div');
        entry.className = 'timeline-entry';

        const method = document.createElement('span');
        method.className = 'timeline-method';
        method.textContent = (req.method || 'GET').slice(0, 4);

        const path = document.createElement('span');
        path.className = 'timeline-path';
        path.textContent = req.path || '--';
        path.title = req.path || '';

        const status = document.createElement('span');
        const st = req.status || 0;
        status.className = 'timeline-status' + (st >= 500 ? ' err' : st >= 400 ? ' warn' : ' ok');
        status.textContent = st || '--';

        const time = document.createElement('span');
        time.className = 'timeline-time';
        if (req._ts) {
          const d = new Date(req._ts);
          time.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        } else {
          time.textContent = '--:--:--';
        }

        entry.appendChild(method);
        entry.appendChild(path);
        entry.appendChild(status);
        entry.appendChild(time);
        panelTimeline.appendChild(entry);
      }

      agentPanel.classList.add('visible');
    }

    function updateAgentPanelLive() {
      if (!selectedAgentId) return;
      const agent = agents.get(selectedAgentId);
      if (!agent) {
        agentPanel.classList.remove('visible');
        selectedAgentId = null;
        return;
      }
      showAgentPanel(selectedAgentId);
    }

    // ── Raycasting for agent selection ────────────────────────────────

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (e) => {
      // Ignore clicks on the agent panel area
      if (e.target.closest('#agent-panel')) return;

      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObject(agentMesh);
      if (intersects.length > 0) {
        const instanceId = intersects[0].instanceId;
        // Find which agent has this index
        for (const [id, agent] of agents) {
          if (agent.index === instanceId) {
            showAgentPanel(id);
            return;
          }
        }
      } else {
        // Click on empty space closes panel
        agentPanel.classList.remove('visible');
        selectedAgentId = null;
      }
    });

    // ── Event handling ────────────────────────────────────────────────

    const eventTimestamps = [];
    let totalRequests = 0;

    function handleInit(data) {
      for (const a of data.agents) {
        if (!a.agent_id || !a.domain || agents.has(a.agent_id)) continue;
        if (nextAgentIndex >= MAX_AGENTS) break;
        const domPos = DOMAIN_POSITIONS[a.domain];
        if (!domPos) continue;
        const color = agentColor(a.agent_id);
        const offset = claimSlotInDomain(a.domain);
        const pos = new THREE.Vector3(domPos.x + offset.x, 0.05, domPos.z + offset.z);
        agents.set(a.agent_id, {
          index: nextAgentIndex++,
          color,
          currentDomain: a.domain,
          position: pos.clone(),
          targetPosition: null,
          lerpProgress: 1,
          lerpDuration: 800,
          lerpStart: null,
          requests: [],
          requestCount: 0,
        });
      }
      if (data.totalRequests) totalRequests = data.totalRequests;
      updateDomainCounts();
    }

    function handleEvent(event) {
      if (event.type === 'init') { handleInit(event); return; }
      if (event.event !== 'api_request' || !event.agent_id) return;

      const domain = classifyDomain(event.path);
      if (!domain) return;

      totalRequests++;
      eventTimestamps.push(Date.now());

      const id = event.agent_id;
      let agent = agents.get(id);

      const requestRecord = {
        method: event.method || 'GET',
        path: event.path,
        status: event.status || 0,
        duration_ms: event.duration_ms || 0,
        domain,
        _ts: event._ts || Date.now(),
      };

      if (!agent) {
        if (nextAgentIndex >= MAX_AGENTS) return;
        const color = agentColor(id);
        const domPos = DOMAIN_POSITIONS[domain];
        const offset = claimSlotInDomain(domain);
        const pos = new THREE.Vector3(domPos.x + offset.x, 0.05, domPos.z + offset.z);
        agent = {
          index: nextAgentIndex++,
          color,
          currentDomain: domain,
          position: pos.clone(),
          targetPosition: null,
          lerpProgress: 1,
          lerpDuration: 800,
          lerpStart: null,
          requests: [requestRecord],
          requestCount: 1,
        };
        agents.set(id, agent);
        updateDomainCounts();
        return;
      }

      agent.requests.push(requestRecord);
      if (agent.requests.length > 50) agent.requests.shift();
      agent.requestCount++;

      // Domain change -> lerp to new position
      if (domain !== agent.currentDomain && agent.lerpProgress >= 1) {
        const prevDomain = agent.currentDomain;
        agent.currentDomain = domain;
        const domPos = DOMAIN_POSITIONS[domain];
        const offset = claimSlotInDomain(domain);
        agent.targetPosition = new THREE.Vector3(domPos.x + offset.x, 0.05, domPos.z + offset.z);
        agent.lerpStart = agent.position.clone();
        agent.lerpProgress = 0;

        addConnectionLine(prevDomain, domain);
        updateDomainCounts();
      }
    }

    // ── HUD setup ─────────────────────────────────────────────────────

    const legendContainer = document.getElementById('legend-items');
    for (const [domain, color] of Object.entries(DOMAIN_COLORS)) {
      const item = document.createElement('div');
      item.className = 'domain-item';
      const hex = '#' + new THREE.Color(color).getHexString();
      item.innerHTML = `<div class="domain-dot" style="background:${hex}"></div><span>${DOMAIN_NAMES[domain]}</span>`;
      legendContainer.appendChild(item);
    }

    const statAgents = document.getElementById('stat-agents');
    const statRps = document.getElementById('stat-rps');
    const statTime = document.getElementById('stat-time');
    const statusDot = document.getElementById('status-dot');
    const statusLabel = document.getElementById('status-label');

    function setConnectionStatus(live) {
      if (live) {
        statusDot.className = 'status-dot live';
        statusLabel.textContent = 'LIVE';
      } else {
        statusDot.className = 'status-dot demo';
        statusLabel.textContent = 'DEMO';
      }
    }

    function updateHUD() {
      statAgents.textContent = agents.size;

      const now = Date.now();
      const cutoff = now - 10000;
      while (eventTimestamps.length > 0 && eventTimestamps[0] < cutoff) eventTimestamps.shift();
      const rps = eventTimestamps.length / 10;
      statRps.textContent = rps.toFixed(1);

      const d = new Date();
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      statTime.textContent = `${hh}:${mm}:${ss}`;
    }

    // ── SSE connection ────────────────────────────────────────────────

    let isLive = false;

    function connectSSE() {
      let es;
      try {
        es = new EventSource('/api/events');
      } catch {
        setConnectionStatus(false);
        startDemoMode();
        return;
      }

      es.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          handleEvent(event);
          if (!isLive) {
            isLive = true;
            stopDemoMode();
            setConnectionStatus(true);
          }
        } catch { /* ignore parse errors */ }
      };

      es.onerror = () => {
        es.close();
        isLive = false;
        setConnectionStatus(false);
        startDemoMode();
        setTimeout(connectSSE, 10000);
      };
    }

    // ── Demo mode ─────────────────────────────────────────────────────

    let demoInterval = null;

    function startDemoMode() {
      if (demoInterval) return;
      const paths = [
        '/api/v1/', '/api/v1/agents/register', '/api/v1/wallet/balance',
        '/api/v1/analysis/network-health', '/api/v1/messages',
        '/api/v1/channels/audit', '/api/v1/market/preview',
        '/api/v1/analytics/catalog', '/api/v1/capital/balance', '/llms.txt',
        '/api/v1/skills/wallet', '/api/v1/knowledge/strategy',
        '/api/v1/agents/me', '/api/v1/wallet/send',
        '/api/v1/leaderboard', '/api/v1/market/open',
        '/api/v1/alliances', '/api/v1/tournaments',
      ];
      const demoAgents = ['demo-a1', 'demo-a2', 'demo-a3', 'demo-a4', 'demo-a5'];
      demoInterval = setInterval(() => {
        handleEvent({
          event: 'api_request',
          agent_id: demoAgents[Math.floor(Math.random() * demoAgents.length)],
          path: paths[Math.floor(Math.random() * paths.length)],
          method: Math.random() > 0.7 ? 'POST' : 'GET',
          status: Math.random() > 0.9 ? 404 : 200,
          duration_ms: Math.floor(Math.random() * 200),
          _ts: Date.now(),
        });
      }, 500);
    }

    function stopDemoMode() {
      if (demoInterval) {
        clearInterval(demoInterval);
        demoInterval = null;
      }
    }

    // ── Animation loop ────────────────────────────────────────────────

    const clock = new THREE.Clock();
    const dummy = new THREE.Object3D();
    let frameCount = 0;

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta() * 1000;
      frameCount++;

      for (const [id, agent] of agents) {
        // Lerp animation for domain transitions
        if (agent.targetPosition && agent.lerpProgress < 1) {
          agent.lerpProgress += dt / agent.lerpDuration;
          if (agent.lerpProgress >= 1) {
            agent.lerpProgress = 1;
            agent.position.copy(agent.targetPosition);
            agent.targetPosition = null;
            agent.lerpStart = null;
          } else {
            // Smooth ease-in-out
            const t = agent.lerpProgress;
            const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            agent.position.lerpVectors(agent.lerpStart, agent.targetPosition, eased);
          }
        }

        // Update instanced mesh transform
        dummy.position.copy(agent.position);
        dummy.scale.setScalar(1);
        dummy.updateMatrix();
        agentMesh.setMatrixAt(agent.index, dummy.matrix);
        agentMesh.setColorAt(agent.index, agent.color);
      }

      if (agents.size > 0) {
        agentMesh.instanceMatrix.needsUpdate = true;
        if (agentMesh.instanceColor) agentMesh.instanceColor.needsUpdate = true;
        agentMesh.count = agents.size;
      }

      // Fade connection lines
      updateConnectionLines();

      // Render
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);

      // Update HUD at ~10fps
      if (frameCount % 6 === 0) updateHUD();

      // Update panel at ~5fps
      if (frameCount % 12 === 0 && selectedAgentId) updateAgentPanelLive();
    }

    // ── Initialize and start ──────────────────────────────────────────

    connectSSE();
    animate();

  </script>
</body>
</html>
