<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The River — Agent Flow Analytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #0d1117; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; color: #c8d6e0; }
    canvas { display: block; width: 100vw; height: 100vh; }

    .hud { position: fixed; pointer-events: none; z-index: 10; }

    #hud-title {
      top: 20px; left: 24px;
    }
    #hud-title h1 {
      font-size: 14px; letter-spacing: 4px; font-weight: 600;
      color: #c8d6e0;
    }
    #hud-title .subtitle {
      font-size: 10px; letter-spacing: 1px; opacity: 0.5; margin-top: 4px;
    }

    #hud-status {
      bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 2px; opacity: 0.7;
      background: rgba(13, 17, 23, 0.7);
      padding: 8px 16px; border-radius: 4px;
    }
    #hud-status .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    #hud-status .status-dot.live { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    #hud-status .status-dot.demo { background: #d29922; box-shadow: 0 0 6px #d29922; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Domain labels via CSS2DRenderer */
    .domain-label {
      color: #c8d6e0;
      font: 600 11px/1 "SF Mono", "Fira Code", "Cascadia Code", monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    .domain-label .label-name { display: block; }
    .domain-label .label-stats {
      font-size: 9px; font-weight: 400; opacity: 0.6;
      letter-spacing: 0.5px; margin-top: 3px;
    }

    /* Stats sidebar */
    #stats-sidebar {
      position: fixed; top: 0; right: 0; width: 260px; height: 70%;
      background: rgba(13, 17, 23, 0.85);
      border-left: 1px solid #21262d;
      padding: 20px 16px;
      z-index: 20; overflow-y: auto;
      font-size: 11px;
      pointer-events: auto;
    }
    #stats-sidebar h2 {
      font-size: 11px; letter-spacing: 2px; font-weight: 600;
      margin-bottom: 12px; color: #8b949e;
    }
    .stats-section { margin-bottom: 24px; }
    .stats-section h3 {
      font-size: 10px; letter-spacing: 1.5px; font-weight: 600;
      margin-bottom: 8px; color: #6e7681;
      text-transform: uppercase;
    }

    .transition-row {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 6px; font-size: 10px;
    }
    .transition-row .t-source { color: #8b949e; }
    .transition-row .t-arrow { color: #484f58; }
    .transition-row .t-target { color: #c8d6e0; }
    .transition-row .t-count {
      margin-left: auto; color: #58a6ff; font-weight: 600;
    }

    .domain-bar-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px; font-size: 10px;
    }
    .domain-bar-row .bar-label {
      width: 72px; text-align: right; color: #8b949e;
      flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px;
      font-size: 9px;
    }
    .domain-bar-row .bar-track {
      flex: 1; height: 6px; background: #161b22; border-radius: 3px;
      overflow: hidden;
    }
    .domain-bar-row .bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.5s ease;
    }
    .domain-bar-row .bar-count {
      width: 40px; text-align: right; color: #58a6ff; font-size: 9px;
      flex-shrink: 0;
    }

    /* Swimlane panel */
    #swimlane-panel {
      position: fixed; bottom: 0; left: 0; right: 0; height: 0;
      background: rgba(13, 17, 23, 0.92);
      border-top: 1px solid #21262d;
      z-index: 25; overflow: hidden;
      transition: height 0.3s ease;
      pointer-events: auto;
    }
    #swimlane-panel.open { height: 30vh; }
    #swimlane-panel .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid #21262d;
    }
    #swimlane-panel .panel-header h3 {
      font-size: 11px; letter-spacing: 2px; font-weight: 600; color: #c8d6e0;
      text-transform: uppercase;
    }
    #swimlane-panel .panel-close {
      cursor: pointer; color: #484f58; font-size: 18px; line-height: 1;
      background: none; border: none; font-family: inherit;
      pointer-events: auto;
    }
    #swimlane-panel .panel-close:hover { color: #c8d6e0; }

    #swimlane-content {
      padding: 8px 20px; overflow-y: auto;
      height: calc(100% - 42px);
    }
    .swimlane-row {
      display: grid;
      grid-template-columns: 100px 70px 1fr 60px;
      gap: 12px; align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #161b22;
      font-size: 10px;
    }
    .swimlane-row .sr-agent { color: #58a6ff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .swimlane-row .sr-time { color: #484f58; }
    .swimlane-row .sr-flow { color: #8b949e; }
    .swimlane-row .sr-flow .sr-current { color: #c8d6e0; font-weight: 600; }
    .swimlane-row .sr-status { text-align: right; font-weight: 600; }
    .swimlane-row .sr-status.s2xx { color: #3fb950; }
    .swimlane-row .sr-status.s4xx { color: #d29922; }
    .swimlane-row .sr-status.s5xx { color: #f85149; }
  </style>
</head>
<body>

  <div id="hud-title" class="hud">
    <h1>THE RIVER</h1>
    <div class="subtitle">FLOW ANALYTICS</div>
  </div>

  <div id="hud-status" class="hud">
    <div class="status-dot demo" id="status-dot"></div>
    <span id="status-label">DEMO</span>
  </div>

  <div id="stats-sidebar">
    <h2>FLOW STATS</h2>
    <div class="stats-section">
      <h3>Top transitions</h3>
      <div id="top-transitions"></div>
    </div>
    <div class="stats-section">
      <h3>Domain traffic</h3>
      <div id="domain-bars"></div>
    </div>
  </div>

  <div id="swimlane-panel">
    <div class="panel-header">
      <h3 id="swimlane-title">Domain Activity</h3>
      <button class="panel-close" id="swimlane-close">&times;</button>
    </div>
    <div id="swimlane-content"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ── Domain constants ──────────────────────────────────────────────

    const DOMAIN_COLUMNS = {
      'app-level':  { x: -20, z:  0  },
      'discovery':  { x: -12, z: -4  },
      'identity':   { x: -4,  z:  0  },
      'wallet':     { x:  4,  z: -4  },
      'analysis':   { x:  4,  z:  4  },
      'social':     { x: 12,  z: -6  },
      'channels':   { x: 12,  z:  0  },
      'market':     { x: 12,  z:  6  },
      'analytics':  { x: 20,  z: -3  },
      'capital':    { x: 20,  z:  3  },
    };

    const DOMAIN_COLORS = {
      'app-level': 0xffffff, 'discovery': 0x6eb5ff, 'identity': 0x5fd89a,
      'wallet': 0xffd36e, 'analysis': 0x64dfdf, 'social': 0xc77dff,
      'channels': 0xff8e98, 'market': 0xf4b350, 'analytics': 0x72efdd, 'capital': 0xff6d6d,
    };

    const DOMAIN_NAMES = {
      'app-level': 'App Level', 'discovery': 'Discovery', 'identity': 'Identity',
      'wallet': 'Wallet', 'analysis': 'Analysis', 'social': 'Social',
      'channels': 'Channels', 'market': 'Market', 'analytics': 'Analytics', 'capital': 'Capital',
    };

    // ── Scene setup ───────────────────────────────────────────────────

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0d1117, 1);
    document.body.prepend(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 0.1, 200);
    camera.position.set(0, 50, 0);
    camera.lookAt(0, 0, 0);
    camera.up.set(0, 0, -1);

    function fitCamera() {
      const positions = Object.values(DOMAIN_COLUMNS);
      let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
      for (const p of positions) {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
      }
      const pad = 6;
      const cx = (minX + maxX) / 2, cz = (minZ + maxZ) / 2;
      const rangeX = (maxX - minX) / 2 + pad;
      const rangeZ = (maxZ - minZ) / 2 + pad;
      const aspect = window.innerWidth / window.innerHeight;
      const halfW = Math.max(rangeX, rangeZ * aspect);
      const halfH = halfW / aspect;
      camera.left = -halfW; camera.right = halfW;
      camera.top = halfH; camera.bottom = -halfH;
      camera.position.set(cx, 50, cz);
      camera.updateProjectionMatrix();
    }
    fitCamera();

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableRotate = false;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.target.set(0, 0, 0);
    controls.update();

    // ── CSS2D label renderer ──────────────────────────────────────────

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    // ── Resize handler ────────────────────────────────────────────────

    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      labelRenderer.setSize(w, h);
      fitCamera();
    });

    // ── Domain classifier ─────────────────────────────────────────────

    function classifyDomain(path) {
      if (path === '/' || path === '/llms.txt' || path === '/health') return 'app-level';
      if (path === '/api/v1/' || path.startsWith('/api/v1/platform/') || path === '/api/v1/ethos' ||
          path === '/api/v1/capabilities' || path.startsWith('/api/v1/strategies') ||
          path.startsWith('/api/v1/knowledge/') || path.startsWith('/api/v1/skills')) return 'discovery';
      if (path.startsWith('/api/v1/agents/') || path.startsWith('/api/v1/node/') ||
          path.startsWith('/api/v1/actions/')) return 'identity';
      if (path.startsWith('/api/v1/wallet/') || path === '/api/v1/ledger') return 'wallet';
      if (path.startsWith('/api/v1/analysis/')) return 'analysis';
      if (path.startsWith('/api/v1/messages') || path.startsWith('/api/v1/alliances') ||
          path.startsWith('/api/v1/leaderboard') || path.startsWith('/api/v1/tournaments') ||
          path.startsWith('/api/v1/bounties')) return 'social';
      if (path.startsWith('/api/v1/channels/')) return 'channels';
      if (path.startsWith('/api/v1/market/')) return 'market';
      if (path.startsWith('/api/v1/analytics/')) return 'analytics';
      if (path.startsWith('/api/v1/capital/') || path === '/api/v1/help') return 'capital';
      return null;
    }

    // ── State ─────────────────────────────────────────────────────────

    const domainCounts = {};
    const transitionMap = new Map();   // "source->target" → count
    let totalRequests = 0;

    // Per-agent tracking for swimlane
    const agentHistory = new Map();    // agentId → [{ domain, path, status, _ts }]
    const agentCurrentDomain = new Map();

    // Domain event log for swimlane
    const domainEventLog = new Map();  // domain → [{ agent_id, path, status, prevDomain, nextDomain, _ts }]
    for (const d of Object.keys(DOMAIN_COLUMNS)) {
      domainCounts[d] = 0;
      domainEventLog.set(d, []);
    }

    // ── Domain nodes ──────────────────────────────────────────────────

    const domainMeshes = new Map();
    const domainLabels = new Map();
    const domainGroups = new Map();

    for (const [domain, pos] of Object.entries(DOMAIN_COLUMNS)) {
      const color = DOMAIN_COLORS[domain];
      const group = new THREE.Group();
      group.position.set(pos.x, 0, pos.z);

      // Flat rectangle
      const geo = new THREE.PlaneGeometry(3, 2);
      const mat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0.15,
        side: THREE.DoubleSide, depthWrite: false,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2;
      group.add(mesh);

      // Border (wireframe edges)
      const edgesGeo = new THREE.EdgesGeometry(geo);
      const edgesMat = new THREE.LineBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.3,
      });
      const edges = new THREE.LineSegments(edgesGeo, edgesMat);
      edges.rotation.x = -Math.PI / 2;
      group.add(edges);

      // CSS2D label
      const labelDiv = document.createElement('div');
      labelDiv.className = 'domain-label';
      labelDiv.innerHTML = `<span class="label-name">${DOMAIN_NAMES[domain]}</span><span class="label-stats" id="dl-${domain}">0 reqs</span>`;
      const label = new CSS2DObject(labelDiv);
      label.position.set(0, 0.5, -1.8);
      group.add(label);

      scene.add(group);
      domainMeshes.set(domain, { mesh, mat, group, baseScale: 1 });
      domainLabels.set(domain, labelDiv);
      domainGroups.set(domain, group);

      // Store domain name for raycasting
      mesh.userData.domain = domain;
    }

    // ── Flow ribbons ──────────────────────────────────────────────────

    const ribbonGroup = new THREE.Group();
    scene.add(ribbonGroup);
    const ribbonMap = new Map(); // "source->target" → { mesh, mat }

    function blendColors(c1, c2) {
      const a = new THREE.Color(c1);
      const b = new THREE.Color(c2);
      return a.lerp(b, 0.5);
    }

    function createRibbon(source, target, width) {
      const key = `${source}->${target}`;
      const sp = DOMAIN_COLUMNS[source];
      const tp = DOMAIN_COLUMNS[target];
      if (!sp || !tp) return;

      const halfW = Math.max(0.05, width / 2);

      // Direction vector in XZ plane
      const dx = tp.x - sp.x;
      const dz = tp.z - sp.z;
      const len = Math.sqrt(dx * dx + dz * dz);
      if (len < 0.01) return;

      // Perpendicular (for ribbon width)
      const nx = -dz / len;
      const nz = dx / len;

      // Midpoint with a slight curve offset
      const mx = (sp.x + tp.x) / 2;
      const mz = (sp.z + tp.z) / 2;
      // Offset midpoint perpendicular to give a subtle curve
      const curveOffset = len * 0.08;
      const cmx = mx + nx * curveOffset;
      const cmz = mz + nz * curveOffset;

      // Build ribbon as a tri-strip: 3 segments (start, mid, end) x 2 sides
      const positions = new Float32Array(18); // 6 vertices x 3
      const y = 0.02; // just above ground

      // Start left/right
      positions[0] = sp.x + nx * halfW; positions[1] = y; positions[2] = sp.z + nz * halfW;
      positions[3] = sp.x - nx * halfW; positions[4] = y; positions[5] = sp.z - nz * halfW;
      // Mid left/right
      positions[6] = cmx + nx * halfW; positions[7] = y; positions[8] = cmz + nz * halfW;
      positions[9] = cmx - nx * halfW; positions[10] = y; positions[11] = cmz - nz * halfW;
      // End left/right
      positions[12] = tp.x + nx * halfW; positions[13] = y; positions[14] = tp.z + nz * halfW;
      positions[15] = tp.x - nx * halfW; positions[16] = y; positions[17] = tp.z - nz * halfW;

      const indices = [0, 1, 2, 1, 3, 2, 2, 3, 4, 3, 5, 4];
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setIndex(indices);

      const blended = blendColors(DOMAIN_COLORS[source], DOMAIN_COLORS[target]);
      const mat = new THREE.MeshBasicMaterial({
        color: blended, transparent: true, opacity: 0.15,
        side: THREE.DoubleSide, depthWrite: false,
      });
      const mesh = new THREE.Mesh(geo, mat);

      // Remove old ribbon if it exists
      const existing = ribbonMap.get(key);
      if (existing) {
        ribbonGroup.remove(existing.mesh);
        existing.mesh.geometry.dispose();
        existing.mat.dispose();
      }

      ribbonGroup.add(mesh);
      ribbonMap.set(key, { mesh, mat, source, target });
    }

    function updateRibbons() {
      // Find max transition count for normalization
      let maxCount = 1;
      for (const count of transitionMap.values()) {
        maxCount = Math.max(maxCount, count);
      }

      for (const [key, count] of transitionMap) {
        const [source, target] = key.split('->');
        // Width: 0.1 to 1.5 based on proportion
        const width = 0.1 + (count / maxCount) * 1.4;
        createRibbon(source, target, width);
      }
    }

    // ── Flow particles (InstancedMesh) ────────────────────────────────

    const MAX_PARTICLES = 500;
    const particleGeo = new THREE.CircleGeometry(0.12, 6);
    const particleMat = new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.7,
      side: THREE.DoubleSide, depthWrite: false,
    });
    const particleMesh = new THREE.InstancedMesh(particleGeo, particleMat, MAX_PARTICLES);
    particleMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    const particleColors = new Float32Array(MAX_PARTICLES * 3);
    particleMesh.instanceColor = new THREE.InstancedBufferAttribute(particleColors, 3);
    particleMesh.instanceColor.setUsage(THREE.DynamicDrawUsage);
    particleMesh.count = 0;
    // Lay particles flat on the XZ plane
    scene.add(particleMesh);

    // Particle pool
    const particles = [];

    function spawnParticle(source, target) {
      if (particles.length >= MAX_PARTICLES) return;

      const sp = DOMAIN_COLUMNS[source];
      const tp = DOMAIN_COLUMNS[target];
      if (!sp || !tp) return;

      const dx = tp.x - sp.x;
      const dz = tp.z - sp.z;
      const len = Math.sqrt(dx * dx + dz * dz);
      if (len < 0.01) return;
      const nx = -dz / len;
      const nz = dx / len;
      const curveOffset = len * 0.08;
      const cmx = (sp.x + tp.x) / 2 + nx * curveOffset;
      const cmz = (sp.z + tp.z) / 2 + nz * curveOffset;

      const color = blendColors(DOMAIN_COLORS[source], DOMAIN_COLORS[target]);
      const speed = 0.3 + Math.random() * 0.4; // units per second along path

      particles.push({
        progress: 0,
        speed: speed / len, // normalize by distance
        sx: sp.x, sz: sp.z,
        mx: cmx, mz: cmz,
        tx: tp.x, tz: tp.z,
        color,
      });
    }

    function quadraticBezier(a, b, c, t) {
      const it = 1 - t;
      return it * it * a + 2 * it * t * b + t * t * c;
    }

    function updateParticles(dt) {
      const dummy = new THREE.Object3D();
      let alive = 0;

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.progress += p.speed * dt;

        if (p.progress >= 1) {
          particles.splice(i, 1);
          continue;
        }

        const t = p.progress;
        const px = quadraticBezier(p.sx, p.mx, p.tx, t);
        const pz = quadraticBezier(p.sz, p.mz, p.tz, t);

        dummy.position.set(px, 0.08, pz);
        dummy.rotation.x = -Math.PI / 2;
        dummy.scale.setScalar(1);
        dummy.updateMatrix();

        particleMesh.setMatrixAt(alive, dummy.matrix);
        particleMesh.setColorAt(alive, p.color);
        alive++;
      }

      particleMesh.count = alive;
      if (alive > 0) {
        particleMesh.instanceMatrix.needsUpdate = true;
        particleMesh.instanceColor.needsUpdate = true;
      }
    }

    // ── Background particles for continuous traffic visualization ──────

    // Spawn particles along active ribbons at a rate proportional to traffic
    let particleSpawnAccumulator = new Map();

    function spawnTrafficParticles(dt) {
      let maxCount = 1;
      for (const count of transitionMap.values()) maxCount = Math.max(maxCount, count);

      for (const [key, count] of transitionMap) {
        const rate = 0.2 + (count / maxCount) * 2.0; // particles per second
        const acc = (particleSpawnAccumulator.get(key) || 0) + rate * dt;
        if (acc >= 1) {
          const [source, target] = key.split('->');
          const spawns = Math.floor(acc);
          for (let i = 0; i < spawns && particles.length < MAX_PARTICLES; i++) {
            spawnParticle(source, target);
          }
          particleSpawnAccumulator.set(key, acc - spawns);
        } else {
          particleSpawnAccumulator.set(key, acc);
        }
      }
    }

    // ── Domain node scaling ───────────────────────────────────────────

    function updateDomainScales() {
      let maxCount = 1;
      for (const c of Object.values(domainCounts)) maxCount = Math.max(maxCount, c);

      for (const [domain, data] of domainMeshes) {
        const count = domainCounts[domain] || 0;
        const ratio = maxCount > 0 ? count / maxCount : 0;
        const scale = 0.8 + ratio * 0.7; // 0.8 to 1.5
        data.group.scale.setScalar(scale);

        // Update label
        const pct = totalRequests > 0 ? ((count / totalRequests) * 100).toFixed(1) : '0.0';
        const el = document.getElementById(`dl-${domain}`);
        if (el) el.textContent = `${count} reqs / ${pct}%`;
      }
    }

    // ── Stats sidebar ─────────────────────────────────────────────────

    const topTransitionsEl = document.getElementById('top-transitions');
    const domainBarsEl = document.getElementById('domain-bars');

    function updateStatsSidebar() {
      // Top 5 transitions
      const sorted = [...transitionMap.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      topTransitionsEl.innerHTML = sorted.map(([key, count]) => {
        const [source, target] = key.split('->');
        return `<div class="transition-row">
          <span class="t-source">${DOMAIN_NAMES[source] || source}</span>
          <span class="t-arrow">&rarr;</span>
          <span class="t-target">${DOMAIN_NAMES[target] || target}</span>
          <span class="t-count">${count}</span>
        </div>`;
      }).join('');

      if (sorted.length === 0) {
        topTransitionsEl.innerHTML = '<div style="color:#484f58;font-size:10px">No transitions yet</div>';
      }

      // Domain bars
      let maxCount = 1;
      for (const c of Object.values(domainCounts)) maxCount = Math.max(maxCount, c);

      domainBarsEl.innerHTML = Object.entries(domainCounts)
        .sort((a, b) => b[1] - a[1])
        .map(([domain, count]) => {
          const pct = maxCount > 0 ? (count / maxCount) * 100 : 0;
          const hex = '#' + new THREE.Color(DOMAIN_COLORS[domain]).getHexString();
          return `<div class="domain-bar-row">
            <span class="bar-label">${DOMAIN_NAMES[domain] || domain}</span>
            <span class="bar-track"><span class="bar-fill" style="width:${pct}%;background:${hex}"></span></span>
            <span class="bar-count">${count}</span>
          </div>`;
        }).join('');
    }

    // ── Swimlane panel ────────────────────────────────────────────────

    const swimlanePanel = document.getElementById('swimlane-panel');
    const swimlaneTitle = document.getElementById('swimlane-title');
    const swimlaneContent = document.getElementById('swimlane-content');
    const swimlaneClose = document.getElementById('swimlane-close');
    let selectedDomain = null;

    swimlaneClose.addEventListener('click', () => {
      swimlanePanel.classList.remove('open');
      selectedDomain = null;
    });

    function openSwimlane(domain) {
      selectedDomain = domain;
      swimlaneTitle.textContent = `${DOMAIN_NAMES[domain]} Activity`;
      swimlanePanel.classList.add('open');
      renderSwimlane(domain);
    }

    function renderSwimlane(domain) {
      const events = domainEventLog.get(domain) || [];
      const recent = events.slice(-20).reverse();

      if (recent.length === 0) {
        swimlaneContent.innerHTML = '<div style="color:#484f58;font-size:11px;padding:12px 0">No activity recorded yet</div>';
        return;
      }

      swimlaneContent.innerHTML = recent.map(e => {
        const time = new Date(e._ts).toLocaleTimeString();
        const agentShort = (e.agent_id || '???').slice(0, 12);
        const prev = e.prevDomain ? DOMAIN_NAMES[e.prevDomain] || e.prevDomain : '---';
        const next = e.nextDomain ? DOMAIN_NAMES[e.nextDomain] || e.nextDomain : '---';
        const current = DOMAIN_NAMES[domain];
        const statusNum = e.status || 0;
        let statusClass = 's2xx';
        if (statusNum >= 500) statusClass = 's5xx';
        else if (statusNum >= 400) statusClass = 's4xx';

        return `<div class="swimlane-row">
          <span class="sr-agent" title="${e.agent_id || ''}">${agentShort}</span>
          <span class="sr-time">${time}</span>
          <span class="sr-flow">${prev} &rarr; <span class="sr-current">${current}</span> &rarr; ${next}</span>
          <span class="sr-status ${statusClass}">${statusNum}</span>
        </div>`;
      }).join('');
    }

    // ── Raycaster for domain click ────────────────────────────────────

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
      // Ignore clicks on sidebar area
      if (event.clientX > window.innerWidth - 260) return;

      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      const meshes = [];
      for (const [domain, data] of domainMeshes) {
        meshes.push(data.mesh);
      }
      const intersects = raycaster.intersectObjects(meshes);
      if (intersects.length > 0) {
        const domain = intersects[0].object.userData.domain;
        if (domain) openSwimlane(domain);
      }
    });

    // ── Event handling ────────────────────────────────────────────────

    function handleInit(data) {
      if (data.totalRequests) totalRequests = data.totalRequests;
      if (data.agents) {
        for (const a of data.agents) {
          if (a.agent_id && a.domain) {
            agentCurrentDomain.set(a.agent_id, a.domain);
            domainCounts[a.domain] = (domainCounts[a.domain] || 0) + 1;
          }
        }
      }
      updateDomainScales();
      updateStatsSidebar();
    }

    function handleEvent(event) {
      if (event.type === 'init') { handleInit(event); return; }
      if (event.event !== 'api_request' || !event.agent_id) return;

      const domain = event.domain || classifyDomain(event.path);
      if (!domain) return;

      totalRequests++;
      domainCounts[domain] = (domainCounts[domain] || 0) + 1;

      const agentId = event.agent_id;
      const prevDomain = agentCurrentDomain.get(agentId) || null;
      agentCurrentDomain.set(agentId, domain);

      // Track transition
      if (prevDomain && prevDomain !== domain) {
        const key = `${prevDomain}->${domain}`;
        transitionMap.set(key, (transitionMap.get(key) || 0) + 1);
        // Spawn a particle for this event
        spawnParticle(prevDomain, domain);
      }

      // Log for swimlane
      const logEntry = {
        agent_id: agentId,
        path: event.path,
        status: event.status || 0,
        prevDomain: prevDomain,
        nextDomain: null, // filled in retroactively
        _ts: event._ts || Date.now(),
      };

      // Update previous entry's nextDomain
      const domainLog = domainEventLog.get(domain);
      if (domainLog) {
        domainLog.push(logEntry);
        if (domainLog.length > 100) domainLog.shift();
      }

      // If previous domain exists, update the last entry's nextDomain there
      if (prevDomain && prevDomain !== domain) {
        const prevLog = domainEventLog.get(prevDomain);
        if (prevLog) {
          for (let i = prevLog.length - 1; i >= 0; i--) {
            if (prevLog[i].agent_id === agentId && !prevLog[i].nextDomain) {
              prevLog[i].nextDomain = domain;
              break;
            }
          }
        }
      }

      // Agent history
      if (!agentHistory.has(agentId)) agentHistory.set(agentId, []);
      const hist = agentHistory.get(agentId);
      hist.push({ domain, path: event.path, status: event.status || 0, _ts: event._ts || Date.now() });
      if (hist.length > 50) hist.shift();

      // Refresh swimlane if viewing this domain
      if (selectedDomain === domain) renderSwimlane(domain);
    }

    // ── SSE connection ────────────────────────────────────────────────

    let isLive = false;

    function setConnectionStatus(live) {
      const statusDot = document.getElementById('status-dot');
      const statusLabel = document.getElementById('status-label');
      if (live) {
        statusDot.className = 'status-dot live';
        statusLabel.textContent = 'LIVE';
      } else {
        statusDot.className = 'status-dot demo';
        statusLabel.textContent = 'DEMO';
      }
    }

    function connectSSE() {
      let es;
      try {
        es = new EventSource('/api/events');
      } catch {
        setConnectionStatus(false);
        startDemoMode();
        return;
      }

      es.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          handleEvent(event);
          if (!isLive) {
            isLive = true;
            stopDemoMode();
            setConnectionStatus(true);
          }
        } catch { /* ignore */ }
      };

      es.onerror = () => {
        es.close();
        isLive = false;
        setConnectionStatus(false);
        startDemoMode();
        setTimeout(connectSSE, 10000);
      };
    }

    // ── Fetch flow data ───────────────────────────────────────────────

    async function fetchFlowData() {
      try {
        const res = await fetch('/api/flow');
        if (!res.ok) return;
        const data = await res.json();

        if (data.transitions) {
          for (const t of data.transitions) {
            const key = `${t.source}->${t.target}`;
            transitionMap.set(key, t.count);
          }
        }
        if (data.domainCounts) {
          for (const [d, c] of Object.entries(data.domainCounts)) {
            domainCounts[d] = c;
          }
          let total = 0;
          for (const c of Object.values(domainCounts)) total += c;
          if (total > totalRequests) totalRequests = total;
        }

        updateRibbons();
        updateDomainScales();
        updateStatsSidebar();
      } catch { /* not connected */ }
    }

    // ── Demo mode ─────────────────────────────────────────────────────

    let demoInterval = null;

    function startDemoMode() {
      if (demoInterval) return;
      const paths = [
        '/api/v1/', '/api/v1/agents/register', '/api/v1/wallet/balance',
        '/api/v1/analysis/network-health', '/api/v1/messages',
        '/api/v1/channels/audit', '/api/v1/market/preview',
        '/api/v1/analytics/catalog', '/api/v1/capital/balance', '/llms.txt',
        '/api/v1/skills/wallet', '/api/v1/knowledge/strategy',
        '/api/v1/agents/me', '/api/v1/wallet/send',
        '/api/v1/leaderboard', '/api/v1/market/open',
        '/api/v1/alliances', '/api/v1/tournaments',
      ];
      const demoAgents = ['demo-a1', 'demo-a2', 'demo-a3', 'demo-a4', 'demo-a5'];
      demoInterval = setInterval(() => {
        handleEvent({
          event: 'api_request',
          agent_id: demoAgents[Math.floor(Math.random() * demoAgents.length)],
          path: paths[Math.floor(Math.random() * paths.length)],
          method: 'GET',
          status: Math.random() > 0.9 ? (Math.random() > 0.5 ? 404 : 500) : 200,
          duration_ms: Math.floor(Math.random() * 200),
          _ts: Date.now(),
        });
      }, 400);
    }

    function stopDemoMode() {
      if (demoInterval) {
        clearInterval(demoInterval);
        demoInterval = null;
      }
    }

    // ── Grid lines (subtle background) ────────────────────────────────

    {
      const gridMat = new THREE.LineBasicMaterial({
        color: 0x21262d, transparent: true, opacity: 0.3,
      });
      for (let x = -24; x <= 24; x += 4) {
        const points = [new THREE.Vector3(x, -0.01, -12), new THREE.Vector3(x, -0.01, 12)];
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        scene.add(new THREE.Line(geo, gridMat));
      }
      for (let z = -12; z <= 12; z += 4) {
        const points = [new THREE.Vector3(-24, -0.01, z), new THREE.Vector3(24, -0.01, z)];
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        scene.add(new THREE.Line(geo, gridMat));
      }
    }

    // ── Animation loop ────────────────────────────────────────────────

    const clock = new THREE.Clock();
    let frameCount = 0;
    let lastRibbonUpdate = 0;
    let lastFlowFetch = 0;

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const time = clock.getElapsedTime();
      frameCount++;

      // Spawn ambient particles along ribbons
      spawnTrafficParticles(dt);

      // Update particle positions
      updateParticles(dt);

      // Periodic ribbon + stats updates (every 2s to avoid thrash)
      if (time - lastRibbonUpdate > 2) {
        updateRibbons();
        updateDomainScales();
        updateStatsSidebar();
        lastRibbonUpdate = time;
      }

      // Fetch flow data every 30s
      if (time - lastFlowFetch > 30) {
        fetchFlowData();
        lastFlowFetch = time;
      }

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    // ── Initialize ────────────────────────────────────────────────────

    fetchFlowData();
    connectSSE();
    animate();

  </script>
</body>
</html>
