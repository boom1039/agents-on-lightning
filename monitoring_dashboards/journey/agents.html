<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agents on Lightning - MCP Ledger Console</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050606;
      --panel: #0b0d0c;
      --panel-2: #101312;
      --line: #27302d;
      --line-2: #3a4641;
      --text: #d9e2dc;
      --muted: #8e9b94;
      --dim: #5f6b66;
      --green: #40d071;
      --red: #ff5d5d;
      --amber: #e7b94f;
      --cyan: #65d8d2;
      --white: #f4fff8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0;
    }
    button, input, select, textarea {
      font: inherit;
      color: var(--text);
      background: #070908;
      border: 1px solid var(--line);
      border-radius: 3px;
    }
    button {
      cursor: pointer;
      padding: 3px 8px;
      color: var(--green);
    }
    button:hover { border-color: var(--green); }
    input, select { height: 22px; padding: 2px 6px; }
    textarea {
      width: 100%;
      min-height: 84px;
      resize: vertical;
      padding: 8px;
      line-height: 1.35;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      border-bottom: 1px solid rgba(39,48,45,0.72);
      padding: 3px 5px;
      vertical-align: top;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #0f1311;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 9px;
    }
    tr:hover td { background: rgba(64,208,113,0.055); }
    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      gap: 6px;
      padding: 8px;
    }
    .topline {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 4px 8px;
    }
    .brand {
      color: var(--white);
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .nav a {
      color: var(--cyan);
      text-decoration: none;
    }
    .nav a:hover { color: var(--green); }
    .status {
      color: var(--muted);
      min-width: 180px;
      text-align: right;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(8, minmax(110px, 1fr));
      gap: 6px;
    }
    .metric {
      border: 1px solid var(--line);
      background: var(--panel);
      min-height: 58px;
      padding: 6px;
    }
    .metric label {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 9px;
    }
    .metric strong {
      display: block;
      color: var(--white);
      font-size: 18px;
      line-height: 1.25;
      margin-top: 2px;
    }
    .metric small {
      color: var(--dim);
      display: block;
      margin-top: 1px;
    }
    .metric[title] { cursor: help; }
    .main {
      display: grid;
      grid-template-columns: minmax(360px, 0.95fr) minmax(520px, 1.35fr) minmax(350px, 0.9fr);
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1.15fr) 250px;
      grid-template-areas:
        "slot0 slot1 slot2"
        "slot0 slot1 slot3"
        "slot0 slot1 slot4"
        "slot5 slot5 slot5";
      gap: 6px;
      min-height: 0;
    }
    .panel-slot {
      min-height: 0;
      display: flex;
      overflow: hidden;
    }
    .panel-slot[data-slot-index="0"] { grid-area: slot0; }
    .panel-slot[data-slot-index="1"] { grid-area: slot1; }
    .panel-slot[data-slot-index="2"] { grid-area: slot2; }
    .panel-slot[data-slot-index="3"] { grid-area: slot3; }
    .panel-slot[data-slot-index="4"] { grid-area: slot4; }
    .panel-slot[data-slot-index="5"] { grid-area: slot5; }
    .panel-slot.drag-over {
      outline: 1px dashed var(--cyan);
      outline-offset: -2px;
    }
    .pane {
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .pane-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 5px 7px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }
    .pane-head h2 {
      margin: 0;
      color: var(--white);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .pane-head .grow { flex: 1; }
    .pane-body {
      min-height: 0;
      overflow: auto;
    }
    .split-body {
      display: grid;
      grid-template-rows: 1fr 150px;
      min-height: 0;
      flex: 1;
    }
    .subpane {
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .subhead {
      padding: 5px 7px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 10px;
    }
    .subhead {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
    }
    .subhead .grow { flex: 1; }
    .panel-drag {
      cursor: grab;
      color: var(--muted);
      padding: 1px 5px;
    }
    .panel-drag:active { cursor: grabbing; }
    [data-panel].dragging {
      opacity: 0.55;
      outline: 1px dashed var(--green);
      outline-offset: -2px;
    }
    th[data-col] {
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    th[data-col].dragging {
      opacity: 0.5;
      color: var(--green);
    }
    th[data-col].drop-target {
      color: var(--cyan);
      box-shadow: inset 2px 0 0 var(--cyan);
    }
    th .sort-indicator {
      color: var(--green);
      margin-left: 3px;
    }
    .col-resize {
      position: absolute;
      top: 0;
      right: -3px;
      width: 7px;
      height: 100%;
      cursor: col-resize;
      z-index: 3;
    }
    .col-resize:hover,
    .col-resize.resizing {
      background: rgba(101,216,210,0.22);
    }
    body.resizing-column {
      cursor: col-resize;
      user-select: none;
    }
    .scroll { overflow: auto; min-height: 0; }
    .ledger-pane {
      border: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
      width: 100%;
    }
    .filters {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filters input { width: 118px; }
    .mono { font-variant-numeric: tabular-nums; }
    .ok { color: var(--green); }
    .bad { color: var(--red); }
    .warn { color: var(--amber); }
    .cyan { color: var(--cyan); }
    .muted { color: var(--muted); }
    .dim { color: var(--dim); }
    .selected td {
      background: rgba(64,208,113,0.12);
      color: var(--white);
    }
    .pill {
      display: inline-block;
      border: 1px solid var(--line-2);
      padding: 0 4px;
      border-radius: 3px;
      color: var(--muted);
      line-height: 15px;
    }
    .pill.ok { border-color: rgba(64,208,113,0.45); }
    .pill.bad { border-color: rgba(255,93,93,0.45); }
    .spark {
      display: inline-block;
      width: 92px;
      height: 20px;
      vertical-align: middle;
    }
    .kv {
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 3px 8px;
      padding: 7px;
      border-bottom: 1px solid var(--line);
    }
    .kv div:nth-child(odd) { color: var(--muted); }
    .proof-status {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 4px 8px;
      padding: 6px 7px;
      border-bottom: 1px solid var(--line);
      background: #080a09;
    }
    .proof-status div {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .proof-status .label {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 9px;
    }
    .proof-status a {
      color: var(--cyan);
      text-decoration: none;
    }
    .proof-status a:hover { color: var(--green); }
    .timeline-row {
      display: grid;
      grid-template-columns: 104px 50px minmax(100px, 0.95fr) 42px minmax(120px, 1.05fr);
      gap: 6px;
      padding: 3px 6px;
      border-bottom: 1px solid rgba(39,48,45,0.72);
      align-items: center;
      min-height: 22px;
      line-height: 16px;
    }
    .timeline-row > div {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .timeline-row:hover { background: rgba(64,208,113,0.055); }
    .sql-results {
      max-height: 180px;
      overflow: auto;
      border-top: 1px solid var(--line);
      margin-top: 6px;
    }
    .nowrap { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    @media (max-width: 1280px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; grid-template-rows: auto auto auto; }
      .metrics { grid-template-columns: repeat(4, 1fr); }
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(6, minmax(320px, auto));
        grid-template-areas:
          "slot0"
          "slot1"
          "slot2"
          "slot3"
          "slot4"
          "slot5";
      }
      .pane, .subpane, .ledger-pane { min-height: 320px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topline">
      <div class="brand">AOL MCP LEDGER CONSOLE</div>
      <div class="muted">click headers to sort; drag headers or move handles to rearrange</div>
      <div class="nav">
        <a href="/journey">route-grid</a>
        <a href="/journey/three">3d</a>
        <a href="/proofs">proofs</a>
        <a href="/llms.txt">llms</a>
        <button id="reset-layout" title="Reset saved panel, column, and sort state">reset layout</button>
      </div>
      <div class="status" id="status">loading</div>
    </header>

    <section class="metrics" id="metrics"></section>

    <main class="main" id="panel-grid">
      <div class="panel-slot" data-slot-index="0">
      <section class="pane" data-panel="agents">
        <div class="pane-head">
          <h2>Agent Index</h2>
          <span class="muted" title="Sources: /api/analytics/mcp-agents from DuckDB mcp_tool_events plus /api/analytics/ledger/agents from SQLite proof_ledger projections.">MCP + proof identities</span>
          <span class="grow"></span>
          <input id="agent-filter" placeholder="agent id">
          <button id="refresh">refresh</button>
          <button class="panel-drag" draggable="true" data-panel-drag="agents" title="Drag section">move</button>
        </div>
        <div class="pane-body">
          <table>
            <thead id="agents-head"></thead>
            <tbody id="agents-body"></tbody>
          </table>
        </div>
      </section>
      </div>

      <div class="panel-slot" data-slot-index="1">
      <section class="pane" data-panel="timeline">
        <div class="pane-head">
          <h2>Agent Timeline</h2>
          <span id="selected-agent" class="cyan" title="Sources: /api/analytics/mcp-agent/:id/journey for behavior and /api/analytics/ledger/agent/:id for Proof Ledger money events.">none selected</span>
          <span class="grow"></span>
          <button id="clear-agent">clear</button>
          <button class="panel-drag" draggable="true" data-panel-drag="timeline" title="Drag section">move</button>
        </div>
        <div class="split-body">
          <div class="scroll" id="timeline"></div>
          <div class="scroll" id="agent-detail"></div>
        </div>
      </section>
      </div>

      <div class="panel-slot" data-slot-index="2">
        <section class="subpane" data-panel="funnel">
          <div class="subhead">
            <span title="Source: /api/analytics/mcp-funnel from DuckDB mcp_tool_events workflow_stage metadata.">Funnel</span>
            <span class="grow"></span>
            <button class="panel-drag" draggable="true" data-panel-drag="funnel" title="Drag section">move</button>
          </div>
          <div class="scroll">
            <table>
              <thead id="funnel-head"></thead>
              <tbody id="funnel-body"></tbody>
            </table>
          </div>
        </section>
      </div>

      <div class="panel-slot" data-slot-index="3">
        <section class="subpane" data-panel="tools">
          <div class="subhead">
            <span title="Source: /api/analytics/mcp-tool-breakdown from DuckDB mcp_tool_events.">Tools + Failures</span>
            <span class="grow"></span>
            <button class="panel-drag" draggable="true" data-panel-drag="tools" title="Drag section">move</button>
          </div>
          <div class="scroll">
            <table>
              <thead id="tools-head"></thead>
              <tbody id="tools-body"></tbody>
            </table>
          </div>
        </section>
      </div>

      <div class="panel-slot" data-slot-index="4">
        <section class="subpane" data-panel="sql">
          <div class="subhead">
            <span title="Source: DuckDB analytics query route. This explores behavior telemetry, not canonical money proofs.">SQL Explorer</span>
            <span class="grow"></span>
            <button class="panel-drag" draggable="true" data-panel-drag="sql" title="Drag section">move</button>
          </div>
          <div class="scroll" style="padding:6px">
            <div class="filters" style="margin-bottom:5px">
              <button data-sql="SELECT agent_id, COUNT(*) AS calls, SUM(CASE WHEN success = false OR status >= 400 THEN 1 ELSE 0 END) AS failures FROM mcp_tool_events GROUP BY agent_id ORDER BY calls DESC LIMIT 25">agents</button>
              <button data-sql="SELECT tool_name, COUNT(*) AS calls, AVG(duration_ms) AS avg_ms FROM mcp_tool_events GROUP BY tool_name ORDER BY calls DESC LIMIT 25">tools</button>
              <button data-sql="SELECT error_code, COUNT(*) AS failures FROM mcp_tool_events WHERE success = false OR status >= 400 GROUP BY error_code ORDER BY failures DESC LIMIT 25">errors</button>
            </div>
            <textarea id="sql">SELECT COUNT(*) AS calls FROM mcp_tool_events</textarea>
            <div class="filters" style="margin-top:5px">
              <button id="run-sql">run select</button>
              <span id="sql-status" class="muted"></span>
            </div>
            <div class="sql-results" id="sql-results"></div>
          </div>
        </section>
      </div>

      <div class="panel-slot" data-slot-index="5">
        <section class="ledger-pane" data-panel="ledger">
          <div class="pane-head">
            <h2>Ledger Stream</h2>
            <span class="muted" title="Source: /api/analytics/ledger/recent derived from Proof Ledger public-safe rows when proof_ledger is enabled.">latest 100 proof/public entries</span>
            <span class="grow"></span>
            <div class="filters">
              <input id="ledger-agent" placeholder="agent id">
              <input id="ledger-type" placeholder="type">
              <button id="ledger-prev">prev</button>
              <button id="ledger-next">next</button>
              <button id="ledger-apply">apply</button>
              <span id="ledger-page" class="muted"></span>
            </div>
            <button class="panel-drag" draggable="true" data-panel-drag="ledger" title="Drag section">move</button>
          </div>
          <div class="pane-body">
            <div id="proof-status" class="proof-status"></div>
            <table>
              <thead id="ledger-head"></thead>
              <tbody id="ledger-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const state = {
      selectedAgent: null,
      ledgerOffset: 0,
      ledgerLimit: 100,
      data: {},
    };

    const $ = (id) => document.getElementById(id);
    const STORAGE_PREFIX = 'aol:mcp-ledger-console:v1';
    const PANEL_IDS = ['agents', 'timeline', 'funnel', 'tools', 'sql', 'ledger'];
    const TABLE_IDS = ['agents', 'funnel', 'tools', 'ledger'];
    const tableState = {};
    const defaultTableState = {
      agents: { order: ['agent', 'calls', 'fail', 'stage', 'lastTool', 'proofBalance', 'proofs', 'latestProof', 'proofHash', 'capital', 'ledger', 'note'], widths: {}, sortBy: null, sortDir: 'desc' },
      funnel: { order: ['stage', 'agents', 'calls', 'note'], widths: {}, sortBy: null, sortDir: 'desc' },
      tools: { order: ['tool', 'group', 'calls', 'fail', 'note'], widths: {}, sortBy: null, sortDir: 'desc' },
      ledger: { order: ['time', 'seq', 'agent', 'proofId', 'record', 'status', 'type', 'delta', 'amount', 'source', 'refs', 'hash'], widths: {}, sortBy: null, sortDir: 'desc' },
    };
    let panelOrder = loadJson('panels', PANEL_IDS);
    let draggedPanelId = null;
    let draggedColumn = null;
    let resizingColumn = null;
    let suppressHeaderClickUntil = 0;
    const dashboardSource = new URLSearchParams(window.location.search).get('source');

    function storageKey(name) {
      return `${STORAGE_PREFIX}:${name}`;
    }

    function loadJson(name, fallback) {
      try {
        const raw = localStorage.getItem(storageKey(name));
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(name, value) {
      try {
        localStorage.setItem(storageKey(name), JSON.stringify(value));
      } catch {}
    }

    function normalizedOrder(savedOrder, defaultOrder) {
      const saved = Array.isArray(savedOrder) ? savedOrder : [];
      return [
        ...saved.filter((id) => defaultOrder.includes(id)),
        ...defaultOrder.filter((id) => !saved.includes(id)),
      ];
    }

    panelOrder = normalizedOrder(panelOrder, PANEL_IDS);

    function loadTableState(tableId) {
      const defaults = defaultTableState[tableId];
      const saved = loadJson(`table:${tableId}`, {});
      return {
        order: normalizedOrder(saved.order, defaults.order),
        widths: saved.widths && typeof saved.widths === 'object' ? saved.widths : {},
        sortBy: defaults.order.includes(saved.sortBy) ? saved.sortBy : defaults.sortBy,
        sortDir: saved.sortDir === 'asc' ? 'asc' : 'desc',
      };
    }

    for (const tableId of TABLE_IDS) {
      tableState[tableId] = loadTableState(tableId);
    }
    const esc = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    function fmtNum(value) {
      const n = Number(value || 0);
      return Number.isFinite(n) ? Math.round(n).toLocaleString() : '0';
    }

    function fmtSats(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n) || n === 0) return '0';
      if (Math.abs(n) >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}m`;
      if (Math.abs(n) >= 10_000) return `${(n / 1000).toFixed(1)}k`;
      return Math.round(n).toLocaleString();
    }

    function fmtTime(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n) || n <= 0) return '-';
      return new Date(n).toLocaleString([], {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
      });
    }

    function fmtTimelineTime(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n) || n <= 0) return '-';
      const date = new Date(n);
      const pad = (v) => String(v).padStart(2, '0');
      return `${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function short(value, n = 16) {
      const s = String(value ?? '');
      return s.length > n ? `${s.slice(0, n - 3)}...` : s;
    }

    function apiPath(path, options = {}) {
      if (!['local', 'prod'].includes(dashboardSource)) return path;
      if (options.method && options.method !== 'GET') return path;
      if (!path.startsWith('/api/')) return path;
      const url = new URL(path, window.location.origin);
      url.searchParams.set('source', dashboardSource);
      return `${url.pathname}${url.search}`;
    }

    async function api(path, options = {}) {
      const res = await fetch(apiPath(path, options), {
        cache: 'no-store',
        headers: options.body ? { 'content-type': 'application/json' } : undefined,
        ...options,
      });
      if (!res.ok) {
        let message = `${res.status} ${res.statusText}`;
        try {
          const body = await res.json();
          message = body.message || body.error || message;
        } catch {}
        throw new Error(message);
      }
      return res.json();
    }

    function spark(values, color = '#40d071') {
      const nums = values.map((v) => Number(v || 0));
      const max = Math.max(...nums, 1);
      const width = 92;
      const height = 20;
      const points = nums.map((v, i) => {
        const x = nums.length <= 1 ? 0 : (i / (nums.length - 1)) * (width - 2) + 1;
        const y = height - 2 - ((v / max) * (height - 4));
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      return `<svg class="spark" viewBox="0 0 ${width} ${height}" aria-hidden="true">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5"/>
        <line x1="0" y1="${height - 1}" x2="${width}" y2="${height - 1}" stroke="#27302d" stroke-width="1"/>
      </svg>`;
    }

    function metric(label, value, note, values, color, title = '') {
      return `<div class="metric"${title ? ` title="${esc(title)}"` : ''}>
        <label>${esc(label)}</label>
        <strong>${esc(value)}</strong>
        <small>${esc(note || '')}</small>
        ${Array.isArray(values) ? spark(values, color) : ''}
      </div>`;
    }

    function eventAgent(entry) {
      return entry?.agent_id || entry?.from_agent_id || entry?.to_agent_id || '';
    }

    const DELTA_FIELDS = [
      ['ecash', 'wallet_ecash_delta_sats'],
      ['hub', 'wallet_hub_delta_sats'],
      ['cap', 'capital_available_delta_sats'],
      ['lock', 'capital_locked_delta_sats'],
      ['pend_dep', 'capital_pending_deposit_delta_sats'],
      ['pend_close', 'capital_pending_close_delta_sats'],
      ['spent', 'capital_service_spent_delta_sats'],
      ['pnl', 'routing_pnl_delta_sats'],
    ];

    function sequenceOf(entry) {
      return Number(entry?.global_sequence || entry?.sequence || 0) || 0;
    }

    function signedDeltaParts(entry) {
      const parts = [];
      for (const [label, key] of DELTA_FIELDS) {
        const value = Number(entry?.[key] || 0);
        if (Number.isFinite(value) && value !== 0) {
          parts.push(`${label}${value > 0 ? '+' : ''}${fmtSats(value)}`);
        }
      }
      return parts;
    }

    function signedDeltaText(entry) {
      const parts = signedDeltaParts(entry);
      return parts.length ? parts.join(' ') : 'no balance delta';
    }

    function detailText(entry) {
      const parts = [];
      const refs = entry?.public_safe_refs && typeof entry.public_safe_refs === 'object' ? entry.public_safe_refs : {};
      for (const key of [
        'proof_id',
        'proof_hash',
        'global_sequence',
        'agent_proof_sequence',
        'reference',
        'reference_hash',
        'flow_hash',
        'flow_id',
        'txid',
        'swap_id',
        'channel_point',
        'channel_id',
        'chan_id',
        'instruction_hash',
        'proof_group_id',
        'provider',
        'service',
        'service_id',
        'fee_sats',
        'net_amount_sats',
        'from_bucket',
        'to_bucket',
        'status',
        'reason',
        'address_hint',
        'checkpointed_through_global_sequence',
        'total_liability_sats',
        'total_reserve_sats',
        'reserve_sufficient',
      ]) {
        if (entry?.[key] !== undefined && entry?.[key] !== null) parts.push(`${key}=${entry[key]}`);
        else if (refs?.[key] !== undefined && refs?.[key] !== null) parts.push(`${key}=${refs[key]}`);
      }
      return parts.join(' ');
    }

    function refsText(entry) {
      const detail = detailText(entry);
      return detail || signedDeltaText(entry);
    }

      const an = Number(a);
      const bn = Number(b);
      if (Number.isFinite(an) && Number.isFinite(bn)) return an - bn;
      return String(a ?? '').localeCompare(String(b ?? ''));

    function orderedColumns(tableId) {
      const columns = tableColumns[tableId] || [];
      const defaultOrder = columns.map((col) => col.id);
      const stateForTable = tableState[tableId];
      stateForTable.order = normalizedOrder(stateForTable.order, defaultOrder);
      return stateForTable.order
        .map((id) => columns.find((col) => col.id === id))
        .filter(Boolean);
    }

    function sortRows(tableId, rows, context = {}) {
      const stateForTable = tableState[tableId];
      if (!stateForTable?.sortBy) return rows;
      const column = (tableColumns[tableId] || []).find((col) => col.id === stateForTable.sortBy);
      if (!column?.sort) return rows;
      const direction = stateForTable.sortDir === 'asc' ? 1 : -1;
      return rows.slice().sort((a, b) => compareValues(column.sort(a, context), column.sort(b, context)) * direction);
    }

    function columnWidth(tableId, column) {
      const stored = Number(tableState[tableId]?.widths?.[column.id]);
      const fallback = Number(column.width || 140);
      const width = Number.isFinite(stored) && stored > 0 ? stored : fallback;
      return Math.max(34, Math.min(720, Math.round(width)));
    }

    function renderTableHead(tableId) {
      const head = $(`${tableId}-head`);
      const stateForTable = tableState[tableId];
      head.innerHTML = `<tr>${orderedColumns(tableId).map((column) => {
        const width = columnWidth(tableId, column);
        const style = ` style="width:${width}px"`;
        const indicator = stateForTable.sortBy === column.id
          ? `<span class="sort-indicator">${stateForTable.sortDir === 'asc' ? 'up' : 'down'}</span>`
          : '';
        return `<th data-table="${tableId}" data-col="${column.id}" draggable="true"${style} title="Click to sort. Drag header left/right to reorder. Drag right edge to resize.">${esc(column.label)}${indicator}<span class="col-resize" data-table="${tableId}" data-col="${column.id}" title="Drag to resize column"></span></th>`;
      }).join('')}</tr>`;
      setupColumnDrag(tableId);
      setupColumnResize(tableId);
    }

    function renderConfiguredTable(tableId, rows, options = {}) {
      const context = options.context || {};
      const sortedRows = sortRows(tableId, rows.slice(), context);
      renderTableHead(tableId);
      const columns = orderedColumns(tableId);
      const body = $(`${tableId}-body`);
      body.innerHTML = sortedRows.map((row) => {
        const rowClass = options.rowClass ? options.rowClass(row) : '';
        const rowAttrs = options.rowAttrs ? options.rowAttrs(row) : '';
        const classAttr = rowClass ? ` class="${esc(rowClass)}"` : '';
        return `<tr${classAttr}${rowAttrs ? ` ${rowAttrs}` : ''}>${columns.map((column) => {
          const className = typeof column.className === 'function' ? column.className(row, context) : column.className;
          const title = typeof column.title === 'function' ? column.title(row, context) : column.title;
          const width = columnWidth(tableId, column);
          return `<td style="width:${width}px"${className ? ` class="${esc(className)}"` : ''}${title ? ` title="${esc(title)}"` : ''}>${column.html(row, context)}</td>`;
        }).join('')}</tr>`;
      }).join('');
    }

    function persistTableState(tableId) {
      saveJson(`table:${tableId}`, tableState[tableId]);
    }

    function rerenderTable(tableId) {
      if (tableId === 'agents') renderAgents();
      if (tableId === 'funnel') renderFunnel();
      if (tableId === 'tools') renderTools();
      if (tableId === 'ledger') renderLedger();
    }

    function moveColumn(tableId, fromCol, toCol) {
      if (!fromCol || !toCol || fromCol === toCol) return;
      const stateForTable = tableState[tableId];
      const next = stateForTable.order.filter((id) => id !== fromCol);
      const targetIndex = next.indexOf(toCol);
      next.splice(targetIndex < 0 ? next.length : targetIndex, 0, fromCol);
      stateForTable.order = next;
      persistTableState(tableId);
      rerenderTable(tableId);
    }

    function toggleColumnSort(tableId, colId) {
      const stateForTable = tableState[tableId];
      if (stateForTable.sortBy === colId) {
        stateForTable.sortDir = stateForTable.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        stateForTable.sortBy = colId;
        stateForTable.sortDir = 'desc';
      }
      persistTableState(tableId);
      rerenderTable(tableId);
    }

    function setupColumnDrag(tableId) {
      for (const th of document.querySelectorAll(`th[data-table="${tableId}"][data-col]`)) {
        th.addEventListener('click', () => {
          if (Date.now() < suppressHeaderClickUntil) return;
          toggleColumnSort(tableId, th.dataset.col);
        });
        th.addEventListener('dragstart', (event) => {
          draggedColumn = { tableId, colId: th.dataset.col };
          suppressHeaderClickUntil = Date.now() + 500;
          th.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', `${tableId}:${th.dataset.col}`);
        });
        th.addEventListener('dragend', () => {
          suppressHeaderClickUntil = Date.now() + 500;
          draggedColumn = null;
          th.classList.remove('dragging');
          document.querySelectorAll('th.drop-target').forEach((node) => node.classList.remove('drop-target'));
        });
        th.addEventListener('dragover', (event) => {
          if (!draggedColumn || draggedColumn.tableId !== tableId) return;
          event.preventDefault();
          th.classList.add('drop-target');
        });
        th.addEventListener('dragleave', () => {
          th.classList.remove('drop-target');
        });
        th.addEventListener('drop', (event) => {
          if (!draggedColumn || draggedColumn.tableId !== tableId) return;
          event.preventDefault();
          const fromCol = draggedColumn.colId;
          const toCol = th.dataset.col;
          suppressHeaderClickUntil = Date.now() + 500;
          th.classList.remove('drop-target');
          moveColumn(tableId, fromCol, toCol);
        });
      }
    }

    function setupColumnResize(tableId) {
      for (const handle of document.querySelectorAll(`.col-resize[data-table="${tableId}"][data-col]`)) {
        handle.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          event.stopPropagation();
          const th = handle.closest('th');
          resizingColumn = {
            tableId,
            colId: handle.dataset.col,
            startX: event.clientX,
            startWidth: th ? th.getBoundingClientRect().width : columnWidth(tableId, { id: handle.dataset.col }),
          };
          suppressHeaderClickUntil = Date.now() + 800;
          handle.classList.add('resizing');
          document.body.classList.add('resizing-column');
          handle.setPointerCapture?.(event.pointerId);
        });
      }
    }

    window.addEventListener('pointermove', (event) => {
      if (!resizingColumn) return;
      event.preventDefault();
      const stateForTable = tableState[resizingColumn.tableId];
      const nextWidth = Math.max(34, Math.min(720, resizingColumn.startWidth + event.clientX - resizingColumn.startX));
      stateForTable.widths = stateForTable.widths || {};
      stateForTable.widths[resizingColumn.colId] = Math.round(nextWidth);
      renderTableHead(resizingColumn.tableId);
      const columns = orderedColumns(resizingColumn.tableId);
      const colIndex = columns.findIndex((column) => column.id === resizingColumn.colId);
      if (colIndex >= 0) {
        const width = Math.round(nextWidth);
        for (const row of document.querySelectorAll(`#${resizingColumn.tableId}-body tr`)) {
          const cell = row.children[colIndex];
          if (cell) cell.style.width = `${width}px`;
        }
      }
    });

    window.addEventListener('pointerup', () => {
      if (!resizingColumn) return;
      persistTableState(resizingColumn.tableId);
      suppressHeaderClickUntil = Date.now() + 800;
      resizingColumn = null;
      document.body.classList.remove('resizing-column');
      document.querySelectorAll('.col-resize.resizing').forEach((node) => node.classList.remove('resizing'));
    });

    function applyPanelLayout() {
      panelOrder = normalizedOrder(panelOrder, PANEL_IDS);
      panelOrder.forEach((panelId, index) => {
        const panel = document.querySelector(`[data-panel="${panelId}"]`);
        const slot = document.querySelector(`[data-slot-index="${index}"]`);
        if (panel && slot && panel.parentElement !== slot) slot.appendChild(panel);
      });
    }

    function movePanel(fromPanel, toPanel) {
      if (!fromPanel || !toPanel || fromPanel === toPanel) return;
      const next = panelOrder.filter((id) => id !== fromPanel);
      const targetIndex = next.indexOf(toPanel);
      next.splice(targetIndex < 0 ? next.length : targetIndex, 0, fromPanel);
      panelOrder = normalizedOrder(next, PANEL_IDS);
      saveJson('panels', panelOrder);
      applyPanelLayout();
    }

    function setupPanelDrag() {
      for (const handle of document.querySelectorAll('[data-panel-drag]')) {
        handle.addEventListener('dragstart', (event) => {
          draggedPanelId = handle.dataset.panelDrag;
          const panel = document.querySelector(`[data-panel="${draggedPanelId}"]`);
          panel?.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', draggedPanelId);
        });
        handle.addEventListener('dragend', () => {
          document.querySelectorAll('[data-panel].dragging').forEach((node) => node.classList.remove('dragging'));
          document.querySelectorAll('.panel-slot.drag-over').forEach((node) => node.classList.remove('drag-over'));
          draggedPanelId = null;
        });
      }

      for (const slot of document.querySelectorAll('.panel-slot')) {
        slot.addEventListener('dragover', (event) => {
          if (!draggedPanelId) return;
          event.preventDefault();
          slot.classList.add('drag-over');
        });
        slot.addEventListener('dragleave', () => {
          slot.classList.remove('drag-over');
        });
        slot.addEventListener('drop', (event) => {
          if (!draggedPanelId) return;
          event.preventDefault();
          slot.classList.remove('drag-over');
          const targetPanel = slot.querySelector('[data-panel]')?.dataset.panel;
          if (targetPanel) movePanel(draggedPanelId, targetPanel);
        });
      }
    }

    function combineAgents() {
      const mcpAgents = Array.isArray(state.data.mcpAgents) ? state.data.mcpAgents : [];
      const ledgerRows = Array.isArray(state.data.ledgerAgents?.entries) ? state.data.ledgerAgents.entries : [];
      const byId = new Map();
      for (const row of ledgerRows) byId.set(row.agent_id, { ...row });
      for (const row of mcpAgents) {
        const base = byId.get(row.agent_id) || { agent_id: row.agent_id };
        byId.set(row.agent_id, { ...base, ...row });
      }
      const filter = $('agent-filter').value.trim();
      return [...byId.values()]
        .filter((row) => !filter || row.agent_id.includes(filter))
        .sort((a, b) => Number(b.last_seen || b.last_ledger_at || 0) - Number(a.last_seen || a.last_ledger_at || 0));
    }

    function renderMetrics() {
      const ledger = state.data.ledgerSummary || {};
      const proof = state.data.proofSummary || {};
      const publicLedger = ledger.public_ledger || {};
      const capital = ledger.capital || {};
      const liabilities = proof.proof_of_liabilities || {};
      const reserves = proof.proof_of_reserves || {};
      const chain = proof.global_chain || {};
      const agents = Array.isArray(state.data.mcpAgents) ? state.data.mcpAgents : [];
      const tools = Array.isArray(state.data.tools) ? state.data.tools : [];
      const calls = agents.reduce((sum, row) => sum + Number(row.tool_calls || 0), 0);
      const failures = agents.reduce((sum, row) => sum + Number(row.failed_calls || 0), 0);
      const uniqueTools = tools.length;
      const funnelValues = (state.data.funnel || []).map((row) => row.agents);
      const liabilityTotal = Number(liabilities.total_liability_sats || 0);
      const reserveTotal = Number(reserves.total_reserve_sats || 0);
      const reserveSurplus = Number(reserves.reserve_surplus_sats || 0);
      const coverage = liabilities.total_liability_sats > 0 && Number.isFinite(Number(reserves.reserve_coverage_ratio))
        ? `${Number(reserves.reserve_coverage_ratio).toFixed(2)}x`
        : liabilityTotal === 0 && reserveTotal > 0
          ? 'no liab'
          : '-';
      $('metrics').innerHTML = [
        metric('proof chain', chain.valid ? 'valid' : proof.available ? 'invalid' : 'off', `seq ${fmtNum(proof.latest_global_proof?.global_sequence || 0)} | checked ${fmtNum(chain.checked || 0)}`, [chain.checked || 0], chain.valid ? '#40d071' : '#ff5d5d', proofSourceTitle('Is the global proof chain valid?', '/api/analytics/proof-ledger/summary', 'SQLite proof_ledger', 'proofLedger.verifyChain() checks signatures, hashes, and global links.')),
        metric('liabilities', fmtSats(liabilityTotal), `${fmtNum(proof.proof_rows?.agent_count || 0)} agents with proofs`, Object.values(liabilities.live_derived_liability_totals || {}).filter((v) => Number.isFinite(Number(v))), '#65d8d2', proofSourceTitle('What does the platform acknowledge owing agents?', '/api/analytics/proof-ledger/summary', 'SQLite proof_ledger', 'sum current proof-derived balance buckets across agents.')),
        metric('reserves', fmtSats(reserveTotal), reserves.status || 'not published', (reserves.reserve_totals_by_source || []).map((row) => row.amount_sats), reserves.reserve_sufficient === false ? '#ff5d5d' : '#40d071', proofSourceTitle('Are reserves currently attested?', '/api/analytics/proof-ledger/summary', 'latest reserve_snapshot row in SQLite proof_ledger', 'reads operator-attested reserve totals and sufficiency flag.')),
        metric('coverage', coverage, `surplus ${fmtSats(reserveSurplus)}`, [reserveTotal, liabilityTotal], reserves.reserve_sufficient === false ? '#ff5d5d' : '#e7b94f', proofSourceTitle('Do reserves appear sufficient for acknowledged liabilities?', '/api/analytics/proof-ledger/summary', 'SQLite proof_ledger', 'reserve_total minus liability_total; reserve snapshots are operator-attested.')),
        metric('mcp agents', fmtNum(agents.length), 'identities seen using MCP tools', funnelValues, '#40d071', proofSourceTitle('Which agents are using tools?', '/api/analytics/mcp-agents', 'DuckDB mcp_tool_events', 'group MCP tool events by agent_id.')),
        metric('mcp calls', fmtNum(calls), `${fmtNum(failures)} failures`, [calls - failures, failures], failures ? '#e7b94f' : '#40d071', proofSourceTitle('How active are agents?', '/api/analytics/mcp-agents', 'DuckDB mcp_tool_events', 'sum calls and failures across agent identities.')),
        metric('tools used', fmtNum(uniqueTools), 'unique MCP tools called', tools.map((row) => row.calls), '#65d8d2', proofSourceTitle('Which tool surface is active?', '/api/analytics/mcp-tool-breakdown', 'DuckDB mcp_tool_events', 'count distinct MCP tools used.')),
        metric('proof rows', fmtNum(proof.proof_rows?.total || publicLedger.total_entries), 'signed money proofs', (publicLedger.type_counts || []).map((r) => r.count), '#40d071', proofSourceTitle('How many signed proof rows exist?', '/api/analytics/proof-ledger/summary', 'SQLite proof_ledger', 'count all signed Proof Ledger rows.')),
      ].join('');
    }

    function renderProofStatus() {
      const proof = state.data.proofSummary || {};
      const latest = proof.latest_global_proof || {};
      const liabilities = proof.proof_of_liabilities || {};
      const reserves = proof.proof_of_reserves || {};
      const checkpoint = liabilities.latest_signed_liability_checkpoint || {};
      const snapshot = reserves.latest_reserve_snapshot || {};
      const key = proof.public_key || {};
      const chain = proof.global_chain || {};
      const sources = proof.panel_sources || {};
      const title = `Source route: ${sources.route || '/api/analytics/proof-ledger/summary'}. Source data: ${sources.store || 'SQLite proof_ledger'}. Meaning: ${sources.meaning || 'Proof Ledger explains signed money state.'}`;
      $('proof-status').innerHTML = `<div title="${esc(title)}"><span class="label">chain</span> <span class="${chain.valid ? 'ok' : 'bad'}">${esc(chain.valid ? 'valid' : proof.available ? 'invalid' : 'off')}</span></div>
        <div title="${esc('Latest signed proof row in global Proof Ledger order.')}"><span class="label">latest</span> <span class="cyan">${esc(short(latest.proof_id || '-', 18))}</span></div>
        <div title="${esc('Hash of the latest canonical proof JSON. Agents can use this to verify chain continuity.')}"><span class="label">hash</span> ${esc(short(latest.proof_hash || chain.latest_hash || '-', 18))}</div>
        <div title="${esc('Latest signed proof-of-liabilities checkpoint derived from agent balances.')}"><span class="label">liability cp</span> ${esc(short(checkpoint.proof_id || '-', 18))}</div>
        <div title="${esc('Latest reserve snapshot is operator-attested until external reserve evidence is added.')}"><span class="label">reserve snap</span> ${esc(short(snapshot.proof_id || '-', 18))}</div>
        <div title="${esc('Published Ed25519 signing key id for proof verification.')}"><span class="label">key</span> ${esc(short(key.signing_key_id || '-', 18))}</div>
        <div title="${esc('Total proof-derived liabilities acknowledged by the platform.')}"><span class="label">owed</span> ${fmtSats(liabilities.total_liability_sats)}</div>
        <div title="${esc('Total reserves from latest operator-attested reserve snapshot.')}"><span class="label">reserves</span> ${fmtSats(reserves.total_reserve_sats)}</div>
        <div title="${esc('Reserve surplus equals reserve sats minus acknowledged liability sats.')}"><span class="label">surplus</span> ${fmtSats(reserves.reserve_surplus_sats)}</div>
        <div title="${esc('Links to the public proof explainer page.')}"><a href="/proofs">proof page</a></div>
        <div title="${esc('Links to public machine-readable proof checkpoint JSON.')}"><a href="/.well-known/proof-ledger.json">well-known json</a></div>
        <div title="${esc('MCP telemetry is behavior data in DuckDB; Proof Ledger is money data in SQLite proof_ledger.')}"><span class="label">boundary</span> behavior != money</div>`;
    }

    function renderAgents() {
      const rows = combineAgents();
      const maxCalls = Math.max(...rows.map((r) => Number(r.tool_calls || 0)), 1);
      renderConfiguredTable('agents', rows, {
        context: { maxCalls },
        rowClass: (row) => row.agent_id === state.selectedAgent ? 'selected' : '',
        rowAttrs: (row) => `data-agent="${esc(row.agent_id)}"`,
      });
      for (const tr of $('agents-body').querySelectorAll('tr[data-agent]')) {
        tr.addEventListener('click', () => selectAgent(tr.dataset.agent));
      }
    }

    function renderFunnel() {
      const rows = Array.isArray(state.data.funnel) ? state.data.funnel : [];
      const maxAgents = Math.max(...rows.map((r) => Number(r.agents || 0)), 1);
      renderConfiguredTable('funnel', rows, { context: { maxAgents } });
    }

    function renderTools() {
      const rows = (Array.isArray(state.data.tools) ? state.data.tools : []).slice(0, 42);
      const maxCalls = Math.max(...rows.map((r) => Number(r.calls || 0)), 1);
      renderConfiguredTable('tools', rows, { context: { maxCalls } });
    }

    function renderLedger() {
      const payload = state.data.ledgerRecent || { entries: [], total: 0, limit: state.ledgerLimit, offset: state.ledgerOffset };
      $('ledger-page').textContent = `${fmtNum(payload.offset || 0)}-${fmtNum((payload.offset || 0) + (payload.entries || []).length)} / ${fmtNum(payload.total || 0)}`;
      renderProofStatus();
      renderConfiguredTable('ledger', payload.entries || [], {
        rowAttrs: (entry) => `data-agent="${esc(eventAgent(entry))}"`,
      });
      for (const tr of $('ledger-body').querySelectorAll('tr[data-agent]')) {
        if (tr.dataset.agent) tr.addEventListener('click', () => selectAgent(tr.dataset.agent));
      }
    }

    function tsOf(entry) {
      return Number(entry?.recorded_at || entry?.created_at_ms || entry?._ts || entry?.ts || 0) || 0;
    }

    function renderAgentDetail(agentPayload, ledgerPayload) {
      const agent = combineAgents().find((row) => row.agent_id === state.selectedAgent) || {};
      const capital = ledgerPayload?.capital_balance || {};
      const proofBalanceData = ledgerPayload?.proof_balance || {};
      const latestProof = ledgerPayload?.latest_agent_proof || {};
      const agentChain = ledgerPayload?.agent_chain || {};
      const latestCheckpoint = ledgerPayload?.latest_liability_checkpoint || {};
      const publicTotal = Number(ledgerPayload?.public_total || 0);
      const proofPath = [
        latestProof.proof_id ? `latest=${short(latestProof.proof_id, 18)}` : 'latest=none',
        agentChain?.valid ? 'agent-chain=valid' : 'agent-chain=not verified',
        ledgerPayload?.included_in_latest_liability_checkpoint ? 'checkpoint=included' : 'checkpoint=pending',
      ].join(' | ');
      $('agent-detail').innerHTML = `<div class="kv">
        <div>agent</div><div class="cyan">${esc(state.selectedAgent || '-')}</div>
        <div>calls</div><div>${fmtNum(agent.tool_calls || 0)} tool calls, ${fmtNum(agent.failed_calls || 0)} failures</div>
        <div>stage</div><div>${esc(agent.last_workflow_stage || '-')} / ${esc(agent.highest_financial_milestone || '-')}</div>
        <div title="Source: /api/analytics/ledger/agent/:id from SQLite proof_ledger">proof balance</div><div>${fmtSats(proofBalanceData.total_tracked_sats)} total acknowledged</div>
        <div title="Source: /api/analytics/ledger/agent/:id from SQLite proof_ledger balance projection">proof buckets</div><div>ecash ${fmtSats(proofBalanceData.wallet_ecash_sats)} | hub ${fmtSats(proofBalanceData.wallet_hub_sats)} | cap ${fmtSats(proofBalanceData.capital_available_sats)} | locked ${fmtSats(proofBalanceData.capital_locked_sats)} | pend ${fmtSats((proofBalanceData.capital_pending_deposit_sats || 0) + (proofBalanceData.capital_pending_close_sats || 0))}</div>
        <div title="Source: /api/analytics/ledger/agent/:id from SQLite proof_ledger">latest proof</div><div class="cyan">${esc(short(latestProof.proof_id || '-', 28))} <span class="dim">${esc(short(latestProof.proof_hash || '', 18))}</span></div>
        <div title="Source: proofLedger.verifyChain({ agentId })">agent chain</div><div class="${agentChain.valid ? 'ok' : 'bad'}">${esc(agentChain.valid ? 'valid' : agentChain ? 'invalid' : '-')} | ${fmtNum(agentChain.checked || 0)} checked | ${fmtNum(ledgerPayload?.proof_total || 0)} proofs</div>
        <div title="Source: latest liability checkpoint compared to selected agent latest proof sequence">checkpoint</div><div class="${ledgerPayload?.included_in_latest_liability_checkpoint ? 'ok' : 'warn'}">${esc(ledgerPayload?.included_in_latest_liability_checkpoint ? 'included in latest liability checkpoint' : 'not included yet or no money proof')}</div>
        <div title="Verification path for this agent: latest signed proof, per-agent hash chain, and latest liability checkpoint">proof trace</div><div>${esc(proofPath)}</div>
        <div title="Source: /api/analytics/ledger/agent/:id. Agents can independently retain proofs and verify proof hashes/signatures with MCP proof tools.">agent check</div><div>list proofs -> fetch proof -> verify signature/hash chain -> compare checkpoint through seq ${fmtNum(latestCheckpoint.global_sequence || 0)}</div>
        <div>capital</div><div>${fmtSats((capital.available || 0) + (capital.locked || 0) + (capital.pending_deposit || 0) + (capital.pending_close || 0))} total tracked</div>
        <div>buckets</div><div>avail ${fmtSats(capital.available)} | locked ${fmtSats(capital.locked)} | pend dep ${fmtSats(capital.pending_deposit)} | pend close ${fmtSats(capital.pending_close)}</div>
        <div>ledger</div><div>${fmtNum(publicTotal)} public rows, ${fmtNum(ledgerPayload?.capital_activity_total || 0)} capital activity rows</div>
        <div>last error</div><div class="${agent.last_error_message ? 'bad' : 'muted'}">${esc(agent.last_error_message || 'none')}</div>
      </div>`;
    }

    function renderTimeline(agentPayload, ledgerPayload) {
      const toolEvents = Array.isArray(agentPayload?.tool_events) ? agentPayload.tool_events : [];
      const backend = Array.isArray(agentPayload?.backend_requests) ? agentPayload.backend_requests : [];
      const ledgerTimeline = Array.isArray(ledgerPayload?.timeline) ? ledgerPayload.timeline : [];
      const rows = [
        ...toolEvents.map((event) => ({
          ts: event.ts,
          kind: 'mcp',
          label: event.tool_name,
          status: event.status,
          outcome: event.outcome_type || event.error_code || '-',
          detail: `${event.workflow_stage || '-'} ${event.risk_level || ''}`,
          bad: event.success === false || Number(event.status || 0) >= 400,
        })),
        ...backend.map((event) => ({
          ts: event.ts,
          kind: 'api',
          label: `${event.method || ''} ${event.path || ''}`,
          status: event.status,
          outcome: event.status >= 400 ? 'backend_failure' : 'backend_ok',
          detail: event.tool_name || event.mcp_request_id || '-',
          bad: Number(event.status || 0) >= 400,
        })),
        ...ledgerTimeline.map((event) => ({
          ts: event.ts,
          kind: event.entry?.proof_id ? 'proof' : event.source === 'capital_activity' ? 'capital' : 'ledger',
          label: `${event.entry?.proof_record_type || 'money'}:${event.entry?.type || '-'}`,
          status: event.entry?.status || '',
          outcome: signedDeltaText(event.entry),
          detail: refsText(event.entry),
          bad: false,
        })),
      ].sort((a, b) => Number(b.ts || 0) - Number(a.ts || 0)).slice(0, 220);

      $('timeline').innerHTML = rows.length ? rows.map((row) => `<div class="timeline-row">
        <div class="mono muted">${fmtTimelineTime(row.ts)}</div>
        <div class="${row.bad ? 'bad' : row.kind === 'ledger' || row.kind === 'capital' || row.kind === 'proof' ? 'ok' : 'cyan'}">${esc(row.kind)}</div>
        <div class="nowrap">${esc(row.label)}</div>
        <div class="${row.bad ? 'bad' : 'ok'} mono">${esc(row.status || '')}</div>
        <div class="nowrap">${esc(row.outcome)} <span class="dim">${esc(row.detail)}</span></div>
      </div>`).join('') : '<div class="kv"><div>empty</div><div>No agent selected or no events found.</div></div>';
    }

    async function selectAgent(agentId) {
      if (!agentId) return;
      state.selectedAgent = agentId;
      $('selected-agent').textContent = agentId;
      renderAgents();
      $('timeline').innerHTML = '<div class="kv"><div>loading</div><div>fetching agent timeline</div></div>';
      try {
        const [agentPayload, ledgerPayload] = await Promise.all([
          api(`/api/analytics/mcp-agent/${encodeURIComponent(agentId)}/journey?backend_limit=250`),
          api(`/api/analytics/ledger/agent/${encodeURIComponent(agentId)}?limit=250&capital_limit=250`),
        ]);
        renderTimeline(agentPayload, ledgerPayload);
        renderAgentDetail(agentPayload, ledgerPayload);
      } catch (err) {
        $('timeline').innerHTML = `<div class="kv"><div class="bad">error</div><div>${esc(err.message)}</div></div>`;
      }
    }

    function renderSql(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        $('sql-results').innerHTML = '<div class="kv"><div>result</div><div>0 rows</div></div>';
        return;
      }
      const cols = Object.keys(rows[0]);
      $('sql-results').innerHTML = `<table><thead><tr>${cols.map((c) => `<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${
        rows.slice(0, 100).map((row) => `<tr>${cols.map((c) => `<td>${esc(typeof row[c] === 'object' ? JSON.stringify(row[c]) : row[c])}</td>`).join('')}</tr>`).join('')
      }</tbody></table>`;
    }

    async function runSql() {
      $('sql-status').textContent = 'running';
      try {
        const rows = await api('/api/analytics/query', {
          method: 'POST',
          body: JSON.stringify({ sql: $('sql').value, params: [] }),
        });
        $('sql-status').textContent = `${fmtNum(rows.length)} rows`;
        renderSql(rows);
      } catch (err) {
        $('sql-status').textContent = err.message;
        $('sql-results').innerHTML = '';
      }
    }

    async function loadLedgerPage() {
      const params = new URLSearchParams({
        limit: String(state.ledgerLimit),
        offset: String(state.ledgerOffset),
      });
      const agent = $('ledger-agent').value.trim();
      const type = $('ledger-type').value.trim();
      if (agent) params.set('agent_id', agent);
      if (type) params.set('type', type);
      state.data.ledgerRecent = await api(`/api/analytics/ledger/recent?${params}`);
      renderLedger();
    }

    async function refreshAll() {
      $('status').textContent = 'loading';
      try {
        const [
          mcpAgents,
          funnel,
          tools,
          milestones,
          ledgerSummary,
          ledgerRecent,
          ledgerAgents,
          reconciliation,
          proofSummary,
        ] = await Promise.all([
          api('/api/analytics/mcp-agents?limit=100'),
          api('/api/analytics/mcp-funnel'),
          api('/api/analytics/mcp-tool-breakdown'),
          api('/api/analytics/mcp-milestones'),
          api('/api/analytics/ledger/summary'),
          api('/api/analytics/ledger/recent?limit=100&offset=0'),
          api('/api/analytics/ledger/agents?limit=100'),
          api('/api/analytics/ledger/reconciliation'),
          api('/api/analytics/proof-ledger/summary'),
        ]);
        state.data = { mcpAgents, funnel, tools, milestones, ledgerSummary, ledgerRecent, ledgerAgents, reconciliation, proofSummary };
        state.ledgerOffset = 0;
        renderMetrics();
        renderAgents();
        renderFunnel();
        renderTools();
        renderLedger();
        $('status').innerHTML = `<span class="${reconciliation.ok ? 'ok' : 'warn'}">recon ${reconciliation.ok ? 'ok' : `${reconciliation.issue_count} issues`}</span> | updated ${fmtTime(Date.now())}`;
        if (state.selectedAgent) await selectAgent(state.selectedAgent);
      } catch (err) {
        $('status').innerHTML = `<span class="bad">${esc(err.message)}</span>`;
      }
    }

    $('refresh').addEventListener('click', refreshAll);
    $('reset-layout').addEventListener('click', () => {
      localStorage.removeItem(storageKey('panels'));
      for (const tableId of TABLE_IDS) localStorage.removeItem(storageKey(`table:${tableId}`));
      window.location.reload();
    });
    $('agent-filter').addEventListener('input', renderAgents);
    $('clear-agent').addEventListener('click', () => {
      state.selectedAgent = null;
      $('selected-agent').textContent = 'none selected';
      $('timeline').innerHTML = '';
      $('agent-detail').innerHTML = '';
      renderAgents();
    });
    $('ledger-apply').addEventListener('click', () => {
      state.ledgerOffset = 0;
      loadLedgerPage().catch((err) => { $('status').textContent = err.message; });
    });
    $('ledger-prev').addEventListener('click', () => {
      state.ledgerOffset = Math.max(0, state.ledgerOffset - state.ledgerLimit);
      loadLedgerPage().catch((err) => { $('status').textContent = err.message; });
    });
    $('ledger-next').addEventListener('click', () => {
      state.ledgerOffset += state.ledgerLimit;
      loadLedgerPage().catch((err) => { $('status').textContent = err.message; });
    });
    $('run-sql').addEventListener('click', runSql);
    for (const btn of document.querySelectorAll('[data-sql]')) {
      btn.addEventListener('click', () => {
        $('sql').value = btn.dataset.sql;
        runSql();
      });
    }

    applyPanelLayout();
    setupPanelDrag();
    for (const tableId of TABLE_IDS) renderTableHead(tableId);
    refreshAll();
    setInterval(refreshAll, 30_000);
  </script>
</body>
</html>
