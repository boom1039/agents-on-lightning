<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Journey — Flex Route Monitor</title>
<style>
/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Root variables ── */
:root {
  --bg: #0d1117;
  --card-bg: rgba(13,17,23,0.88);
  --text: #c8d6e0;
  --text-dim: #8b949e;
  --text-bright: #e6edf3;
  --border: #21262d;
  --border-hover: #58a6ff;
  --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;

  /* Domain colors */
  --color-app-level: #ffffff;
  --color-discovery: #6eb5ff;
  --color-identity: #5fd89a;
  --color-wallet: #ffd36e;
  --color-analysis: #64dfdf;
  --color-social: #c77dff;
  --color-channels: #ff8e98;
  --color-market: #f4b350;
  --color-analytics: #72efdd;
  --color-capital: #ff6d6d;
  --color-other: #8b949e;
}

/* ── Base ── */
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── App shell ── */
#app {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100vh;
}

/* ── Header ── */
#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 72px;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: linear-gradient(180deg, var(--bg) 60%, transparent 100%);
  pointer-events: none;
}

#header > * { pointer-events: auto; }

#title h1 {
  font-size: 13px;
  letter-spacing: 4px;
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1.4;
}

#title p {
  font-size: 10px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ── Stats ── */
#stats {
  display: flex;
  align-items: center;
  gap: 28px;
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  font-weight: 500;
}

.stat strong {
  font-size: 16px;
  color: var(--text-bright);
  font-weight: 700;
  letter-spacing: 0;
}

/* ── Legend ── */
#legend {
  display: flex;
  align-items: center;
  gap: 14px;
}

#legend h3 {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  font-weight: 600;
}

.legend-row {
  display: flex;
  align-items: center;
  gap: 5px;
}

.legend-row span {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.3px;
}

.legend-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-dot.live {
  background: #58a6ff;
  box-shadow: 0 0 6px rgba(88,166,255,0.5);
}
.legend-dot.ok   { background: #3fb950; }
.legend-dot.warn { background: #d29922; }
.legend-dot.err  { background: #f85149; }

/* ── Columns ── */
#columns {
  display: flex;
  flex: 1;
  overflow: hidden;
  padding-top: 72px;
  padding-bottom: 40px;
  padding-left: 12px;
  padding-right: 12px;
  position: relative;
}

#col-left,
#col-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: #21262d transparent;
}

#col-left::-webkit-scrollbar,
#col-right::-webkit-scrollbar { width: 4px; }
#col-left::-webkit-scrollbar-track,
#col-right::-webkit-scrollbar-track { background: transparent; }
#col-left::-webkit-scrollbar-thumb,
#col-right::-webkit-scrollbar-thumb { background: #21262d; border-radius: 2px; }

/* ── Divider ── */
#divider {
  position: relative;
  width: 22px;
  flex-shrink: 0;
  cursor: col-resize;
  z-index: 12;
  display: flex;
  align-items: stretch;
  justify-content: center;
}

.divider-line {
  width: 1px;
  background: #30363d;
  transition: width 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
}

#divider:hover .divider-line,
body.dragging-divider #divider .divider-line {
  width: 3px;
  background: #58a6ff;
  box-shadow: 0 0 8px rgba(88,166,255,0.3);
}

body.dragging-divider {
  cursor: col-resize;
  -webkit-user-select: none;
  user-select: none;
}

/* ── Domain group ── */
.domain-group {
  flex: calc(1 + var(--agent-count, 0)) 1 28px;
  min-height: 28px;
  background: rgba(15,19,24,0.9);
  border: 1px solid #161b22;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: flex-grow 0.4s ease;
}

/* ── Domain header ── */
.domain-header {
  height: 20px;
  min-height: 20px;
  display: flex;
  flex-direction: row;
  align-items: center;
  border-left: 3px solid var(--domain-color, var(--color-other));
  padding-left: 10px;
  padding-right: 8px;
  gap: 6px;
}

.domain-name {
  font-size: 10px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.domain-agent-count {
  margin-left: auto;
  font-size: 9px;
  color: var(--text-dim);
  flex-shrink: 0;
}

/* ── Domain tiles container ── */
.domain-tiles {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  padding: 4px;
  flex: 1;
  align-content: flex-start;
  overflow: hidden;
}

/* ── Route tile ── */
.route-tile {
  flex: 0 0 auto;
  min-width: 44px;
  min-height: 22px;
  opacity: 0.35;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: flex-grow 0.4s ease, flex-basis 0.4s ease, opacity 0.3s ease;
}

.route-tile.active {
  flex: var(--tile-agents, 1) 0 70px;
  opacity: 1;
}

.route-tile:hover {
  border-color: var(--border-hover);
}

/* ── Tile head ── */
.tile-head {
  height: 16px;
  min-height: 16px;
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 0 4px;
  overflow: hidden;
  position: relative;
}

.tile-head::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 100%;
  background: var(--domain-color, var(--color-other));
  opacity: 0.15;
  pointer-events: none;
  border-radius: 3px 3px 0 0;
}

/* ── Method badge ── */
.method-badge {
  position: relative;
  z-index: 1;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.3px;
  padding: 1px 3px;
  border-radius: 2px;
  background: color-mix(in srgb, var(--domain-color, var(--color-other)) 20%, transparent);
  color: var(--domain-color, var(--color-other));
  flex-shrink: 0;
  line-height: 1.3;
  white-space: nowrap;
}

/* ── Route path ── */
.route-path {
  position: relative;
  z-index: 1;
  font-size: 8px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
  line-height: 1.3;
}

.route-tile:hover .route-path { color: var(--text); }

/* ── Agent count in tile ── */
.agent-count {
  position: relative;
  z-index: 1;
  font-size: 8px;
  color: var(--text-dim);
  flex-shrink: 0;
  line-height: 1.3;
}

.agent-count.has-inflight { color: #58a6ff; }

/* ── Tile body (dot container) ── */
.tile-body {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding: 2px 3px 3px;
  align-content: flex-start;
  flex: 1;
  overflow: hidden;
}

/* ── Dots ── */
.dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  background: #3fb950;
  animation: dot-enter 200ms ease-out;
  transition: background 0.3s ease;
}

.dot.in-flight {
  background: #58a6ff;
  box-shadow: 0 0 6px rgba(88,166,255,0.5);
  animation: pulse-flight 2s ease-in-out infinite, dot-enter 200ms ease-out;
}

.dot.warning { background: #d29922; }
.dot.error   { background: #f85149; }

/* ── Animations ── */
@keyframes dot-enter {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

@keyframes pulse-flight {
  0%, 100% { box-shadow: 0 0 4px rgba(88,166,255,0.4); }
  50%      { box-shadow: 0 0 8px rgba(88,166,255,0.7); }
}

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  z-index: 100;
  display: none;
  max-width: 380px;
  background: rgba(22,27,34,0.96);
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  pointer-events: none;
}

.tt-title  { font-size: 11px; font-weight: 700; color: var(--text-bright); margin-bottom: 6px; }
.tt-row    { display: flex; justify-content: space-between; gap: 12px; line-height: 1.6; }
.tt-label  { color: var(--text-dim); }
.tt-value  { color: var(--text-bright); text-align: right; }
.tt-divider { border-top: 1px solid var(--border); margin: 8px 0; }
.tt-note   { color: var(--text-dim); font-size: 9px; margin-top: 6px; }

/* ── Status bar ── */
#status-bar {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  border-radius: 999px;
  background: rgba(13,17,23,0.78);
  border: 1px solid var(--border);
  padding: 6px 12px;
  font-size: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot.live    { background: #3fb950; box-shadow: 0 0 6px rgba(63,185,80,0.5); }
.status-dot.offline { background: #f85149; box-shadow: 0 0 6px rgba(248,81,73,0.4); }

#status-label { color: var(--text-dim); letter-spacing: 1px; font-weight: 500; }
#log-label    { color: var(--text-dim); font-size: 9px; }
</style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="title">
        <h1>THE JOURNEY</h1>
        <p>Live route grid for all agent traffic.<br>Each dot is an agent. Each tile is a route.</p>
      </div>
      <div id="stats">
        <span class="stat">AGENTS<strong id="stat-agents">0</strong></span>
        <span class="stat">ROUTES<strong id="stat-routes">0</strong></span>
        <span class="stat">IN FLIGHT<strong id="stat-inflight">0</strong></span>
      </div>
      <div id="legend">
        <h3>DOTS</h3>
        <div class="legend-row"><span>in flight</span><div class="legend-dot live"></div></div>
        <div class="legend-row"><span>2xx</span><div class="legend-dot ok"></div></div>
        <div class="legend-row"><span>4xx</span><div class="legend-dot warn"></div></div>
        <div class="legend-row"><span>5xx</span><div class="legend-dot err"></div></div>
      </div>
    </div>
    <div id="columns">
      <div id="col-left"></div>
      <div id="divider"><div class="divider-line"></div></div>
      <div id="col-right"></div>
    </div>
    <div id="status-bar">
      <div class="status-dot offline" id="status-dot"></div>
      <span id="status-label">CONNECTING</span>
      <span id="log-label"></span>
    </div>
    <div id="tooltip"></div>
  </div>

  <script>
// ═══════════════════════════════════════════════════════════════════════════
// DATA LAYER — constants, state, SSE, data functions
// ═══════════════════════════════════════════════════════════════════════════

const DOMAIN_NAMES = {
  'app-level': 'App / Docs', discovery: 'Discovery', identity: 'Identity',
  wallet: 'Wallet', analysis: 'Analysis', social: 'Social',
  channels: 'Channels', market: 'Market', analytics: 'Analytics',
  capital: 'Capital', other: 'Other',
};

const DOMAIN_COLORS = {
  'app-level': '#ffffff', discovery: '#6eb5ff', identity: '#5fd89a',
  wallet: '#ffd36e', analysis: '#64dfdf', social: '#c77dff',
  channels: '#ff8e98', market: '#f4b350', analytics: '#72efdd',
  capital: '#ff6d6d', other: '#8b949e',
};

const LEFT_DOMAINS = ['app-level', 'discovery', 'identity', 'wallet', 'analysis'];
const RIGHT_DOMAINS = ['social', 'channels', 'market', 'analytics', 'capital', 'other'];

const routeMap = new Map();
const agentMap = new Map();
let inflightCount = 0;
let logInfo = null;
let liveConnected = false;
let lastSnapshotAt = 0;

// ── Utilities ─────────────────────────────────────────────────────────────

function compactPath(path) {
  return String(path || '')
    .replace(/^\/api\/v1\//, '')
    .replace(/^\/docs\//, 'docs/')
    .replace(/^\//, '');
}

function sortRoutes(a, b) {
  const groupCmp = String(a.group || '').localeCompare(String(b.group || ''));
  if (groupCmp !== 0) return groupCmp;
  const pathCmp = String(a.routePath || a.routeLabel || '').localeCompare(String(b.routePath || b.routeLabel || ''));
  if (pathCmp !== 0) return pathCmp;
  return String(a.method || 'GET').localeCompare(String(b.method || 'GET'));
}

function formatDurationCompact(ms) {
  if (!Number.isFinite(ms) || ms < 0) return '-';
  if (ms < 1000) return `${Math.round(ms)}ms`;
  if (ms < 60_000) return `${(ms / 1000).toFixed(ms < 10_000 ? 1 : 0)}s`;
  if (ms < 3_600_000) return `${Math.floor(ms / 60_000)}m`;
  return `${Math.floor(ms / 3_600_000)}h ${Math.floor((ms % 3_600_000) / 60_000)}m`;
}

function formatDurationLong(ms) {
  if (!Number.isFinite(ms) || ms < 0) return '-';
  if (ms < 1000) return `${Math.round(ms)} ms`;
  if (ms < 60_000) return `${(ms / 1000).toFixed(ms < 10_000 ? 1 : 0)} sec`;
  if (ms < 3_600_000) return `${Math.floor(ms / 60_000)} min ${Math.floor((ms % 60_000) / 1000)} sec`;
  return `${Math.floor(ms / 3_600_000)} hr ${Math.floor((ms % 3_600_000) / 60_000)} min`;
}

function formatTimestamp(ms) {
  if (!Number.isFinite(ms) || ms <= 0) return '-';
  return new Date(ms).toLocaleString([], {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', second: '2-digit',
  });
}

function formatStatus(agent) {
  if (!Number.isFinite(agent?.status) || agent.status <= 0) return '-';
  return agent.statusBucket ? `${agent.status} ${agent.statusBucket}` : String(agent.status);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function tooltipRow(label, value) {
  if (value == null || value === '') return '';
  return '<div class="tt-row"><span class="tt-label">' + escapeHtml(label)
    + '</span><span class="tt-value">' + escapeHtml(value) + '</span></div>';
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

// ── Data Functions ────────────────────────────────────────────────────────

function upsertRoute(routeLike) {
  if (!routeLike || !routeLike.routeKey) return;
  const existing = routeMap.get(routeLike.routeKey) || {};
  routeMap.set(routeLike.routeKey, { ...existing, ...routeLike });
}

function applySnapshot(snapshot) {
  agentMap.clear();
  for (const route of snapshot.routes || []) {
    const existing = routeMap.get(route.routeKey);
    routeMap.set(route.routeKey, { ...existing, ...route });
  }
  for (const agent of snapshot.agents || []) {
    agentMap.set(agent.id, { ...agent });
    upsertRoute({
      routeKey: agent.routeKey, routePath: agent.routePath,
      routeLabel: agent.routeLabel, method: agent.method,
      domain: agent.domain, group: agent.group,
      surfaceType: agent.surfaceType, canonical: agent.canonical,
      lastEventTime: agent.lastEventTime,
    });
  }
  inflightCount = snapshot.stats?.inFlight || 0;
  logInfo = snapshot.log || null;
  lastSnapshotAt = snapshot.builtAt || Date.now();
  renderUpdate();
  updateHud();
}

function applyEvent(event) {
  if (event.type === 'snapshot' && event.snapshot) {
    applySnapshot(event.snapshot);
    return;
  }
  if (event.routeKey) {
    upsertRoute({
      routeKey: event.routeKey, routePath: event.routePath,
      routeLabel: event.routePath, method: event.method,
      domain: event.domain, group: event.group,
      lastEventTime: event.ts,
    });
  }
  if (event.event === 'request_start') inflightCount += 1;
  if (event.event === 'request_finish') inflightCount = Math.max(0, inflightCount - 1);
  if (event.agent) {
    agentMap.set(event.agent.id, { ...event.agent });
    upsertRoute({
      routeKey: event.agent.routeKey, routePath: event.agent.routePath,
      routeLabel: event.agent.routeLabel, method: event.agent.method,
      domain: event.agent.domain, group: event.agent.group,
      surfaceType: event.agent.surfaceType, canonical: event.agent.canonical,
      lastEventTime: event.agent.lastEventTime,
    });
  }
  renderUpdate();
  updateHud();
}

function computeRouteGroups() {
  const grouped = new Map();
  for (const route of routeMap.values()) {
    grouped.set(route.routeKey, { ...route, agents: [], inFlight: 0 });
  }
  for (const agent of agentMap.values()) {
    if (!agent.routeKey) continue;
    if (!grouped.has(agent.routeKey)) {
      grouped.set(agent.routeKey, {
        routeKey: agent.routeKey, routePath: agent.routePath,
        routeLabel: agent.routeLabel, method: agent.method,
        domain: agent.domain || 'other', group: agent.group || 'other',
        surfaceType: agent.surfaceType, canonical: agent.canonical,
        agents: [], inFlight: 0,
      });
    }
    grouped.get(agent.routeKey).agents.push(agent);
  }
  for (const route of grouped.values()) {
    route.inFlight = route.agents.filter(a => a.phase === 'in-flight').length;
  }
  return grouped;
}

// ── SSE ───────────────────────────────────────────────────────────────────

function connectSse() {
  let es;
  try { es = new EventSource('/api/journey/events'); }
  catch { setLiveStatus(false, 'SSE FAILED'); return; }

  es.onmessage = (msg) => {
    try {
      applyEvent(JSON.parse(msg.data));
      setLiveStatus(true, 'LIVE');
    } catch {}
  };
  es.onerror = () => {
    es.close();
    setLiveStatus(false, 'RECONNECTING');
    setTimeout(connectSse, 3000);
  };
}

async function loadSnapshot() {
  const res = await fetch('/api/journey');
  const snapshot = await res.json();
  applySnapshot(snapshot);
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDERING LAYER — DOM rendering, tooltips, divider, init
// ═══════════════════════════════════════════════════════════════════════════

const colLeft  = document.getElementById('col-left');
const colRight = document.getElementById('col-right');
const dividerEl = document.getElementById('divider');
const tooltip  = document.getElementById('tooltip');
const columnsEl = document.getElementById('columns');

const domainElements = new Map();
const tileElements = new Map();
let cachedRouteGroups = null;
let activeTooltip = null;

// ── Domain group scaffolding ──────────────────────────────────────────────

function ensureDomainGroups() {
  const build = (domainList, container) => {
    for (const domain of domainList) {
      if (domainElements.has(domain)) continue;

      const group = document.createElement('div');
      group.className = 'domain-group';
      group.dataset.domain = domain;
      group.style.setProperty('--domain-color', DOMAIN_COLORS[domain] || '#888');
      group.style.setProperty('--agent-count', '0');

      const header = document.createElement('div');
      header.className = 'domain-header';

      const nameEl = document.createElement('span');
      nameEl.className = 'domain-name';
      nameEl.textContent = DOMAIN_NAMES[domain] || domain;

      const countEl = document.createElement('span');
      countEl.className = 'domain-agent-count';
      countEl.textContent = '0';

      header.append(nameEl, countEl);

      const tiles = document.createElement('div');
      tiles.className = 'domain-tiles';

      group.append(header, tiles);
      container.appendChild(group);

      domainElements.set(domain, { group, header, tiles, nameEl, countEl });
    }
  };
  build(LEFT_DOMAINS, colLeft);
  build(RIGHT_DOMAINS, colRight);
}

// ── Tile creation ─────────────────────────────────────────────────────────

function createTile(routeKey, routeData) {
  const el = document.createElement('div');
  el.className = 'route-tile';
  el.dataset.routeKey = routeKey;

  const head = document.createElement('div');
  head.className = 'tile-head';

  const badge = document.createElement('span');
  badge.className = 'method-badge';
  badge.textContent = (routeData.method || 'GET').substring(0, 3);

  const pathEl = document.createElement('span');
  pathEl.className = 'route-path';
  pathEl.textContent = compactPath(routeData.routePath);

  const countEl = document.createElement('span');
  countEl.className = 'agent-count';
  countEl.textContent = '0';

  head.append(badge, pathEl, countEl);

  const body = document.createElement('div');
  body.className = 'tile-body';

  el.append(head, body);

  // Route-level tooltip — looks up current data at show time
  el.addEventListener('mouseenter', (e) => showRouteTooltip(routeKey, e.clientX, e.clientY));
  el.addEventListener('mousemove', (e) => positionTooltip(e.clientX, e.clientY));
  el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; activeTooltip = null; });

  const entry = { el, head, body, pathEl, countEl, dots: new Map() };
  tileElements.set(routeKey, entry);
  return entry;
}

// ── Dot creation ──────────────────────────────────────────────────────────

function createDot(agentId) {
  const dot = document.createElement('span');
  dot.className = 'dot';
  dot.dataset.agentId = agentId;

  // Look up latest agent data at show time (not stale closure)
  dot.addEventListener('mouseenter', (e) => {
    e.stopPropagation();
    const agent = agentMap.get(agentId);
    if (agent) showAgentTooltip(agent, e.clientX, e.clientY);
  });
  dot.addEventListener('mousemove', (e) => {
    e.stopPropagation();
    positionTooltip(e.clientX, e.clientY);
  });
  dot.addEventListener('mouseleave', (e) => {
    e.stopPropagation();
    tooltip.style.display = 'none';
    activeTooltip = null;
  });

  return dot;
}

function applyDotClass(dot, agent) {
  dot.className = 'dot';
  if (agent.phase === 'in-flight') dot.classList.add('in-flight');
  else if (agent.status >= 500) dot.classList.add('error');
  else if (agent.status >= 400) dot.classList.add('warning');
  else dot.classList.add('success');
}

function dotClassKey(agent) {
  if (agent.phase === 'in-flight') return 'in-flight';
  if (agent.status >= 500) return 'error';
  if (agent.status >= 400) return 'warning';
  return 'success';
}

// ── Main render ───────────────────────────────────────────────────────────

function renderUpdate() {
  cachedRouteGroups = computeRouteGroups();

  // Build per-domain route lists
  const domainRoutes = new Map();
  for (const domain of [...LEFT_DOMAINS, ...RIGHT_DOMAINS]) {
    domainRoutes.set(domain, []);
  }
  for (const [routeKey, route] of cachedRouteGroups) {
    const list = domainRoutes.get(route.domain);
    if (list) list.push({ routeKey, route });
  }

  const seenTileKeys = new Set();

  for (const [domain, routes] of domainRoutes) {
    const de = domainElements.get(domain);
    if (!de) continue;

    const sorted = routes.sort((a, b) => sortRoutes(a.route, b.route));

    let totalAgents = 0;
    for (const { route } of sorted) totalAgents += route.agents.length;

    de.group.style.setProperty('--agent-count', String(totalAgents));
    de.countEl.textContent = String(totalAgents);

    const orderedTileEls = [];

    for (const { routeKey, route } of sorted) {
      seenTileKeys.add(routeKey);
      let tile = tileElements.get(routeKey);
      if (!tile) {
        tile = createTile(routeKey, route);
        de.tiles.appendChild(tile.el);
      }

      // Update tile state
      const hasAgents = route.agents.length > 0;
      tile.el.classList.toggle('active', hasAgents);
      tile.el.style.setProperty('--tile-agents', String(route.agents.length));
      tile.pathEl.textContent = compactPath(route.routePath);
      tile.countEl.textContent = String(route.agents.length);
      tile.countEl.classList.toggle('has-inflight', route.inFlight > 0);

      // Sync dots
      const currentAgentIds = new Set();
      for (const agent of route.agents) {
        currentAgentIds.add(agent.id);
        let dot = tile.dots.get(agent.id);
        if (!dot) {
          dot = createDot(agent.id);
          applyDotClass(dot, agent);
          tile.body.appendChild(dot);
          tile.dots.set(agent.id, dot);
        } else {
          applyDotClass(dot, agent);
        }
      }

      // Remove stale dots
      for (const [agentId, dot] of tile.dots) {
        if (!currentAgentIds.has(agentId)) {
          dot.remove();
          tile.dots.delete(agentId);
        }
      }

      orderedTileEls.push(tile.el);
    }

    // Reorder tiles to match sort order
    if (orderedTileEls.length > 0) {
      de.tiles.append(...orderedTileEls);
    }

    // Remove tiles no longer in this domain
    for (const child of Array.from(de.tiles.children)) {
      const rk = child.dataset.routeKey;
      if (rk && !seenTileKeys.has(rk)) {
        const entry = tileElements.get(rk);
        if (entry) { entry.dots.clear(); tileElements.delete(rk); }
        child.remove();
      }
    }
  }

  // Remove orphaned tiles
  for (const [routeKey, tile] of tileElements) {
    if (!seenTileKeys.has(routeKey)) {
      tile.el.remove();
      tile.dots.clear();
      tileElements.delete(routeKey);
    }
  }
}

// ── HUD ───────────────────────────────────────────────────────────────────

function updateHud() {
  document.getElementById('stat-agents').textContent = agentMap.size.toLocaleString();
  document.getElementById('stat-routes').textContent = routeMap.size.toLocaleString();
  document.getElementById('stat-inflight').textContent = inflightCount.toLocaleString();
  if (logInfo) {
    const mb = (Number(logInfo.lastSizeBytes || 0) / 1024 / 1024).toFixed(1);
    document.getElementById('log-label').textContent =
      `LOG ${mb}MB ${String(logInfo.level || 'ok').toUpperCase()}`;
  }
}

// ── Connection status ─────────────────────────────────────────────────────

function setLiveStatus(connected, label) {
  liveConnected = connected;
  document.getElementById('status-dot').className =
    `status-dot ${connected ? 'live' : 'offline'}`;
  document.getElementById('status-label').textContent = label;
}

// ── Tooltip helpers ───────────────────────────────────────────────────────

function getCurrentRouteMs(agent, now) {
  if (Number.isFinite(agent.routeEnteredAt)) return Math.max(0, now - agent.routeEnteredAt);
  return Number.isFinite(agent.currentRouteMs) ? agent.currentRouteMs : null;
}

function getCurrentRequestMs(agent, now) {
  if (agent.phase !== 'in-flight') return null;
  if (Number.isFinite(agent.startedAt)) return Math.max(0, now - agent.startedAt);
  return Number.isFinite(agent.currentRequestMs) ? agent.currentRequestMs : null;
}

function positionTooltip(x, y) {
  tooltip.style.display = 'block';
  let tx = x + 14, ty = y + 14;
  const rect = tooltip.getBoundingClientRect();
  if (tx + rect.width > window.innerWidth) tx = x - rect.width + 4;
  if (ty + rect.height > window.innerHeight) ty = window.innerHeight - rect.height - 8;
  tooltip.style.left = `${Math.max(8, tx)}px`;
  tooltip.style.top = `${Math.max(8, ty)}px`;
}

function showRouteTooltip(routeKey, x, y) {
  const groups = cachedRouteGroups || computeRouteGroups();
  const route = groups.get(routeKey);
  if (!route) return;
  activeTooltip = { type: 'route', key: routeKey };
  tooltip.innerHTML = [
    `<div class="tt-title">${escapeHtml(route.routePath)}</div>`,
    tooltipRow('method', route.method),
    tooltipRow('domain', DOMAIN_NAMES[route.domain] || route.domain),
    tooltipRow('group', route.group),
    tooltipRow('surface', route.surfaceType),
    tooltipRow('agents', route.agents.length),
    tooltipRow('in flight', route.inFlight || 0),
  ].join('');
  positionTooltip(x, y);
}

function showAgentTooltip(agent, x, y) {
  activeTooltip = { type: 'agent', key: agent.id };
  renderAgentTooltipContent(agent);
  positionTooltip(x, y);
}

function renderAgentTooltipContent(agent) {
  const now = Date.now();
  const routeMs = getCurrentRouteMs(agent, now);
  const requestMs = getCurrentRequestMs(agent, now);
  const sessionAgeMs = Number.isFinite(agent.sessionStartedAt)
    ? Math.max(0, now - agent.sessionStartedAt)
    : (Number.isFinite(agent.sessionAgeMs) ? agent.sessionAgeMs : null);
  const lastSeenMs = Number.isFinite(agent.lastEventTime)
    ? Math.max(0, now - agent.lastEventTime) : null;
  const dwellHistory = Array.isArray(agent.dwellHistory)
    ? agent.dwellHistory.slice(-3).reverse() : [];

  const rows = [
    tooltipRow('route', agent.routePath),
    agent.rawPath && agent.rawPath !== agent.routePath ? tooltipRow('raw path', agent.rawPath) : '',
    tooltipRow('method', agent.method),
    tooltipRow('domain', DOMAIN_NAMES[agent.domain] || agent.domain),
    tooltipRow('group', agent.group),
    tooltipRow('surface', agent.surfaceType),
    tooltipRow('phase', agent.phase),
    tooltipRow('status', formatStatus(agent)),
    tooltipRow('session', formatDurationLong(sessionAgeMs)),
    tooltipRow('session start', formatTimestamp(agent.sessionStartedAt)),
    agent.registeredAt ? tooltipRow('registered', formatTimestamp(agent.registeredAt)) : '',
    tooltipRow('on route', formatDurationLong(routeMs)),
    tooltipRow('entered route', formatTimestamp(agent.routeEnteredAt)),
    requestMs == null ? '' : tooltipRow('in request', formatDurationLong(requestMs)),
    requestMs == null ? '' : tooltipRow('request start', formatTimestamp(agent.startedAt)),
    tooltipRow('last seen', lastSeenMs == null ? '-' : `${formatDurationLong(lastSeenMs)} ago`),
    tooltipRow('last event', formatTimestamp(agent.lastEventTime)),
    tooltipRow('requests', agent.requestCount),
    agent.resultCount !== agent.requestCount ? tooltipRow('results', agent.resultCount) : '',
    agent.traceId ? tooltipRow('trace', agent.traceId) : '',
  ].filter(Boolean);

  const dwellHtml = dwellHistory.length === 0 ? ''
    : `<div class="tt-divider"></div>${
        dwellHistory.map(entry =>
          tooltipRow(compactPath(entry.routePath),
            `${formatDurationCompact(entry.dwellMs)} \u2022 left ${formatTimestamp(entry.leftAt)}`)
        ).join('')
      }<div class="tt-note">Recent route stays</div>`;

  tooltip.innerHTML =
    `<div class="tt-title">${escapeHtml(agent.id)}</div>${rows.join('')}${dwellHtml}`;
}

function refreshTooltip() {
  if (!activeTooltip || tooltip.style.display === 'none') return;
  if (activeTooltip.type === 'agent') {
    const agent = agentMap.get(activeTooltip.key);
    if (agent) renderAgentTooltipContent(agent);
    else { tooltip.style.display = 'none'; activeTooltip = null; }
  } else if (activeTooltip.type === 'route') {
    showRouteTooltip(activeTooltip.key,
      parseFloat(tooltip.style.left), parseFloat(tooltip.style.top));
  }
}

// ── Divider resize ────────────────────────────────────────────────────────

(function initDividerResize() {
  let dragging = false;
  dividerEl.addEventListener('pointerdown', (e) => {
    dragging = true;
    dividerEl.setPointerCapture(e.pointerId);
    document.body.classList.add('dragging-divider');
    e.preventDefault();
  });
  dividerEl.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const rect = columnsEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const ratio = clamp(x / rect.width, 0.2, 0.8);
    colLeft.style.flex = String(ratio);
    colRight.style.flex = String(1 - ratio);
  });
  const stopDrag = (e) => {
    if (!dragging) return;
    dragging = false;
    dividerEl.releasePointerCapture(e.pointerId);
    document.body.classList.remove('dragging-divider');
  };
  dividerEl.addEventListener('pointerup', stopDrag);
  dividerEl.addEventListener('pointercancel', stopDrag);
})();

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  setLiveStatus(false, 'LOADING');
  ensureDomainGroups();
  await loadSnapshot();
  connectSse();
  setInterval(() => { if (!liveConnected) loadSnapshot().catch(() => {}); }, 15000);
  setInterval(refreshTooltip, 1000);
}

init().catch(() => setLiveStatus(false, 'LOAD FAILED'));
  </script>
