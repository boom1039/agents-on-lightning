<!DOCTYPE html>
<html><head><title>Journey Validate</title></head>
<body style="background:#111;color:#ccc;font:14px/1.8 monospace;padding:20px;">
<pre id="out">Validating modules...</pre>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
  }
}
</script>
<script type="module">
const out = document.getElementById('out');
const results = [];
let pass = 0, fail = 0;

async function check(name, fn) {
  try {
    await fn();
    results.push(`OK  ${name}`);
    pass++;
  } catch (e) {
    results.push(`ERR ${name}: ${e.message}`);
    fail++;
  }
  out.textContent = results.join('\n') + `\n\n${pass} passed, ${fail} failed`;
}

// Phase 1: Core modules (no DOM/WebGL needed)
await check('three (library)', async () => {
  const THREE = await import('three');
  if (!THREE.Vector3) throw new Error('Vector3 missing');
});

await check('constants.js', async () => {
  const c = await import('./js/constants.js');
  if (!c.PHASE_COLORS) throw new Error('PHASE_COLORS missing');
  if (!c.styleState) throw new Error('styleState missing');
  if (typeof c.styleState.flightSpeed !== 'number') throw new Error('flightSpeed missing from styleState');
  if (typeof c.gridSlotPos !== 'function') throw new Error('gridSlotPos missing');
  if (typeof c.easeOut !== 'function') throw new Error('easeOut missing');
});

await check('manifest.js', async () => {
  const m = await import('./js/manifest.js');
  if (!m.MANIFEST || m.MANIFEST.length === 0) throw new Error('MANIFEST empty');
  if (!m.routeKeyMap) throw new Error('routeKeyMap missing');
  // Verify every manifest entry has required fields
  for (const r of m.MANIFEST) {
    if (!r.routeKey || !r.method || !r.path || !r.phase || !r.subgroup)
      throw new Error(`Bad manifest entry: ${JSON.stringify(r)}`);
  }
});

await check('layout.js', async () => {
  const l = await import('./js/layout.js');
  if (typeof l.computeLayout !== 'function') throw new Error('computeLayout missing');
  const layout = l.computeLayout();
  if (!(layout instanceof Map)) throw new Error('computeLayout must return Map');
  if (layout.size === 0) throw new Error('Layout is empty');

  // Verify every phase has subgroups with routes
  let totalRoutes = 0;
  for (const [p, ph] of layout) {
    if (!ph.pos) throw new Error(`Phase ${p}: missing pos`);
    if (!ph.size) throw new Error(`Phase ${p}: missing size`);
    if (!ph.subgroups || ph.subgroups.size === 0) throw new Error(`Phase ${p}: no subgroups`);
    for (const [sgName, sg] of ph.subgroups) {
      if (!sg.pos) throw new Error(`Phase ${p} / ${sgName}: missing pos`);
      if (!sg.size) throw new Error(`Phase ${p} / ${sgName}: missing size`);
      if (!sg.routes || sg.routes.length === 0) throw new Error(`Phase ${p} / ${sgName}: no routes`);
      for (const r of sg.routes) {
        if (!r.entry) throw new Error(`Phase ${p} / ${sgName}: route missing entry`);
        if (!r.pos) throw new Error(`Phase ${p} / ${sgName}: route missing pos`);
        totalRoutes++;
      }
    }
  }
  results.push(`     ${layout.size} phases, ${totalRoutes} routes positioned`);
});

// Phase 2: Verify all manifest routes got positions in layout
await check('layout coverage', async () => {
  const { MANIFEST } = await import('./js/manifest.js');
  const { computeLayout } = await import('./js/layout.js');
  const layout = computeLayout();
  const positioned = new Set();
  for (const [, ph] of layout) {
    for (const [, sg] of ph.subgroups) {
      for (const r of sg.routes) positioned.add(r.entry.routeKey);
    }
  }
  const missing = MANIFEST.filter(m => !positioned.has(m.routeKey));
  if (missing.length > 0) throw new Error(`${missing.length} routes not positioned: ${missing.map(m=>m.routeKey).join(', ')}`);
});

// Phase 3: modules that need DOM but not WebGL
await check('scene.js (may fail in headless)', async () => {
  await import('./js/scene.js');
});

await check('builder.js', async () => {
  await import('./js/builder.js');
});

await check('agents.js', async () => {
  await import('./js/agents.js');
});

await check('events.js', async () => {
  await import('./js/events.js');
});

await check('hud.js', async () => {
  await import('./js/hud.js');
});

await check('interaction.js', async () => {
  await import('./js/interaction.js');
});

await check('style-panel.js', async () => {
  await import('./js/style-panel.js');
});

// Final
document.title = fail > 0 ? `FAIL (${fail})` : 'ALL OK';
out.textContent = results.join('\n') + `\n\n── ${pass} passed, ${fail} failed ──`;
</script>
</body></html>
