<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Journey</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000000; font-family: system-ui, -apple-system, sans-serif; color: #a1a1aa; }
canvas { display: block; }

#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(9,9,11,0.82); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(63,63,70,0.4);
  padding: 10px 20px; display: flex; align-items: center; gap: 20px;
  font-size: 13px; color: #71717a;
}
.hud-val { color: #e4e4e7; font-weight: 600; }
.hud-sep { flex: 1; }
.sim-btn {
  background: transparent; border: 1px solid #3f3f46; color: #a1a1aa;
  padding: 5px 16px; border-radius: 6px; cursor: pointer; font-size: 12px;
  font-family: inherit; letter-spacing: 0.5px; transition: all 0.15s;
}
.sim-btn:hover { border-color: #52525b; color: #e4e4e7; background: rgba(255,255,255,0.03); }
.sim-btn.active { background: #27272a; border-color: #52525b; color: #e4e4e7; }

#tooltip {
  position: fixed; z-index: 200; display: none; pointer-events: none;
  background: rgba(9,9,11,0.95); border: 1px solid #27272a; border-radius: 8px;
  padding: 12px 16px; color: #a1a1aa; font-size: 12px; max-width: 360px;
  backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#tooltip .tt-title { color: #e4e4e7; font-weight: 600; margin-bottom: 4px; }
#tooltip .tt-dim { color: #52525b; }
#tooltip hr { border: none; border-top: 1px solid #27272a; margin: 6px 0; }

.sp-row select {
  background: #18181b; border: 1px solid #3f3f46; color: #a1a1aa;
  padding: 2px 6px; border-radius: 3px; font-size: 10px; cursor: pointer;
  font-family: inherit;
}

/* Style Panel */
#style-panel {
  position: fixed; top: 44px; right: 0; z-index: 150;
  width: 260px; max-height: calc(100vh - 54px); overflow-y: auto;
  background: rgba(9,9,11,0.92); backdrop-filter: blur(12px);
  border-left: 1px solid rgba(63,63,70,0.4);
  border-bottom: 1px solid rgba(63,63,70,0.4);
  padding: 12px 14px; font-size: 11px; color: #a1a1aa;
  transform: translateX(100%); transition: transform 0.2s;
}
#style-panel.open { transform: translateX(0); }
#style-toggle {
  position: fixed; top: 48px; right: 8px; z-index: 151;
  background: rgba(9,9,11,0.8); border: 1px solid #3f3f46; color: #a1a1aa;
  padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
  font-family: inherit; transition: all 0.15s;
}
#style-toggle:hover { border-color: #52525b; color: #e4e4e7; }
.sp-section { margin-bottom: 10px; }
.sp-section-title { color: #71717a; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.sp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.sp-row label { flex: 1; }
.sp-row input[type="color"] {
  width: 28px; height: 20px; border: 1px solid #3f3f46; border-radius: 3px;
  background: transparent; cursor: pointer; padding: 0;
}
.sp-row input[type="range"] {
  width: 80px; accent-color: #71717a;
}
.sp-row .sp-val { width: 28px; text-align: right; color: #52525b; font-size: 10px; }
.sp-row input[type="checkbox"] { accent-color: #71717a; width: 14px; height: 14px; cursor: pointer; }
.sp-presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.sp-preset-btn {
  background: transparent; border: 1px solid #3f3f46; color: #a1a1aa;
  padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 10px;
  font-family: inherit; transition: all 0.15s;
}
.sp-preset-btn:hover { border-color: #52525b; color: #e4e4e7; background: rgba(255,255,255,0.04); }

/* Drag overlay */
.sg-dragging { cursor: grabbing !important; }
#drag-hint {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(9,9,11,0.9); border: 1px solid #3f3f46; border-radius: 6px;
  padding: 8px 16px; color: #a1a1aa; font-size: 12px; z-index: 200;
  display: none; pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
  <span>Agents: <span class="hud-val" id="hud-agents">0</span></span>
  <span>In-flight: <span class="hud-val" id="hud-inflight">0</span></span>
  <span>Events/s: <span class="hud-val" id="hud-eps">0</span></span>
  <span>Active: <span class="hud-val" id="hud-active">0/0</span></span>
  <span>Feed: <span class="hud-val" id="hud-live">LOADING</span></span>
  <span class="hud-sep"></span>
  <span>Layout: <span class="hud-val" id="hud-layout">Default</span></span>
  <button class="sim-btn" id="btn-simulate">SIMULATE</button>
</div>
<div id="tooltip"></div>
<button id="style-toggle">Style</button>
<div id="style-panel"></div>
<div id="drag-hint">Shift+drag: label / box / domain &middot; Double-click domain: flip route anchors &middot; D/S/C = dump</div>

<script>
// Error capture — catches module load errors, runtime errors, unhandled rejections
window.__ERRORS__ = [];
window.onerror = (msg, src, line, col) => {
  const entry = `${src}:${line}:${col} ${msg}`;
  window.__ERRORS__.push(entry);
  showErrorOverlay(entry);
};
window.addEventListener('unhandledrejection', (e) => {
  const entry = `Unhandled: ${e.reason?.message || e.reason}`;
  window.__ERRORS__.push(entry);
  showErrorOverlay(entry);
});
function showErrorOverlay(msg) {
  let el = document.getElementById('error-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'error-overlay';
    el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(180,20,20,0.95);color:#fff;font:12px/1.6 monospace;padding:10px 16px;max-height:40vh;overflow-y:auto;';
    document.body.appendChild(el);
  }
  el.innerHTML += msg.replace(/</g,'&lt;') + '<br>';
}
</script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
  }
}
</script>
<script type="module">
import { loadManifest } from './js/manifest.js';
import { computeLayout } from './js/layout.js';
import { clearScene, buildScene, updateRouteBoxHeights } from './js/builder.js';
import { initInteraction, refreshInteraction } from './js/interaction.js';
import { buildStylePanel, refreshSpacingUI } from './js/style-panel.js';
import { connectSSE, repositionAllAgents } from './js/events.js';
import { initHUD, refreshHUD } from './js/hud.js';
import { flightMgr, updateAgentDrift } from './js/agents.js';
import { renderer, camera, controls, composer } from './js/scene.js';
import { styleState } from './js/constants.js';
import { routeBoxes, phaseGroups } from './js/builder.js';
import { LAYOUTS } from './js/layouts.js';

await loadManifest();

const layout = computeLayout();
buildScene(layout);
initInteraction();
initHUD();
buildStylePanel();
connectSSE();

// Layout switching (called from interaction.js via L key)
window._currentLayout = 'default';
window.switchLayout = function(name) {
  const L = LAYOUTS[name];
  if (!L) return;
  const isRebuild = name === window._currentLayout;

  // Apply spacing defaults only on layout switch (not slider rebuild)
  if (!isRebuild && L.spacing) {
    styleState.phaseGap = L.spacing.phaseGap;
    styleState.routeGap = L.spacing.routeGap;
    styleState.sgGap = L.spacing.sgGap;
    refreshSpacingUI();
  }

  clearScene();
  const newLayout = computeLayout(L.positions);
  buildScene(newLayout, L.style);

  // Terraced: elevate phase groups and set yBase for agent positioning
  const yStep = L.yStep || 0;
  for (const [p, group] of phaseGroups) {
    group.position.y = (p - 1) * yStep;
  }
  for (const [, rb] of routeBoxes) {
    rb.yBase = (rb.entry.phase - 1) * yStep;
  }

  if (!isRebuild) {
    camera.position.set(L.camera.px, L.camera.py, L.camera.pz);
    controls.target.set(L.camera.tx, L.camera.ty, L.camera.tz);
  }
  controls.update();
  repositionAllAgents();
  refreshInteraction();
  window._currentLayout = name;
  document.getElementById('hud-layout').textContent = L.label;
};

let lastHUDUpdate = 0;

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();

  controls.update();
  flightMgr.update(now);
  updateRouteBoxHeights();
  updateAgentDrift(now);

  if (now - lastHUDUpdate > 500) {
    refreshHUD();
    lastHUDUpdate = now;
  }

  composer.render();
}

animate();
</script>
</body>
</html>
