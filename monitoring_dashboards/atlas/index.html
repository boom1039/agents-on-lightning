<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Atlas — 3D Route World</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05080d;
      color: #d7e1ec;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }
    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }
    #overlay {
      z-index: 4;
      pointer-events: auto;
    }
    #title,
    #search-wrap,
    #stats,
    #legend,
    #controls,
    #status,
    #tooltip,
    #inspector {
      position: fixed;
      z-index: 6;
    }
    #title {
      top: 18px;
      left: 22px;
      pointer-events: none;
    }
    #title h1 {
      color: #f5f8fc;
      font-size: 13px;
      letter-spacing: 4px;
      font-weight: 700;
    }
    #title p {
      margin-top: 6px;
      color: #8f9baa;
      font-size: 10px;
      line-height: 1.45;
      max-width: 340px;
    }
    #search-wrap {
      top: 78px;
      left: 22px;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #route-search {
      width: 100%;
      border: 1px solid #222b35;
      background: rgba(10, 14, 20, 0.92);
      color: #f5f8fc;
      font: 600 11px/1.2 "SF Mono", monospace;
      padding: 10px 12px;
      border-radius: 999px;
      outline: none;
    }
    #route-search:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 1px rgba(88, 166, 255, 0.25);
    }
    #search-meta {
      color: #7f8b98;
      font-size: 10px;
      padding-left: 12px;
      min-height: 12px;
    }
    #stats {
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    .stat {
      display: inline-block;
      margin: 0 14px;
      color: #8f9baa;
      font-size: 10px;
      letter-spacing: 1px;
    }
    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 17px;
      color: #f5f8fc;
      font-weight: 700;
      letter-spacing: 0;
    }
    #legend {
      top: 18px;
      right: 22px;
      text-align: right;
      pointer-events: none;
    }
    #legend h3 {
      color: #8f9baa;
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      color: #8f9baa;
      font-size: 10px;
      margin-bottom: 4px;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .legend-dot.peg { background: #59636f; }
    .legend-dot.live { background: #58a6ff; box-shadow: 0 0 10px rgba(88, 166, 255, 0.45); }
    .legend-dot.ok { background: #3fb950; }
    .legend-dot.warn { background: #d29922; }
    .legend-dot.err { background: #f85149; }
    .legend-pill {
      width: 14px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.25);
    }
    #controls {
      right: 22px;
      bottom: 54px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .control-btn {
      border: 1px solid #26313c;
      background: rgba(10, 14, 20, 0.94);
      color: #d7e1ec;
      font: 600 10px/1 "SF Mono", monospace;
      letter-spacing: 1px;
      padding: 9px 12px;
      border-radius: 999px;
      cursor: pointer;
    }
    .control-btn:hover {
      border-color: #58a6ff;
      color: #f5f8fc;
    }
    #status {
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #21262d;
      background: rgba(10, 14, 20, 0.9);
      color: #8f9baa;
      font-size: 10px;
      pointer-events: none;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .status-dot.live { background: #3fb950; box-shadow: 0 0 8px rgba(63, 185, 80, 0.7); }
    .status-dot.offline { background: #f85149; box-shadow: 0 0 8px rgba(248, 81, 73, 0.7); }
    #tooltip {
      display: none;
      max-width: 420px;
      background: rgba(13, 18, 25, 0.98);
      border: 1px solid #293440;
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.5);
      color: #d7e1ec;
      font-size: 10px;
      line-height: 1.45;
      pointer-events: none;
    }
    #tooltip .tt-title,
    #inspector .panel-title {
      color: #f5f8fc;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 7px;
    }
    .tt-row,
    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 3px;
    }
    .tt-label,
    .panel-label { color: #8f9baa; }
    .tt-value,
    .panel-value {
      color: #f5f8fc;
      text-align: right;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .tt-divider,
    .panel-divider {
      border-top: 1px solid #21262d;
      margin: 8px 0;
    }
    .tt-note,
    .panel-note {
      color: #8f9baa;
      font-size: 9px;
      margin-top: 6px;
    }
    #inspector {
      top: 94px;
      right: 22px;
      width: 340px;
      max-height: calc(100vh - 170px);
      overflow: auto;
      display: none;
      background: rgba(13, 18, 25, 0.98);
      border: 1px solid #293440;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
      padding: 12px;
      pointer-events: auto;
    }
    #inspector.visible { display: block; }
    #inspector .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .panel-close {
      border: 0;
      background: transparent;
      color: #8f9baa;
      font: inherit;
      cursor: pointer;
      padding: 2px 4px;
    }
    .panel-close:hover { color: #f5f8fc; }
    #inspector::-webkit-scrollbar { width: 8px; }
    #inspector::-webkit-scrollbar-thumb {
      background: #293440;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div id="title">
    <h1>THE ATLAS</h1>
    <p>Whole-system 3D route world.<br>Quiet routes stay as home pegs. Busy routes bloom upward.</p>
  </div>

  <div id="search-wrap">
    <input id="route-search" type="text" autocomplete="off" placeholder="Find a route or path">
    <div id="search-meta"></div>
  </div>

  <div id="stats">
    <span class="stat">AGENTS<strong id="stat-agents">0</strong></span>
    <span class="stat">ROUTES<strong id="stat-routes">0</strong></span>
    <span class="stat">HOT<strong id="stat-hot">0</strong></span>
    <span class="stat">IN FLIGHT<strong id="stat-inflight">0</strong></span>
  </div>

  <div id="legend">
    <h3>ATLAS</h3>
    <div class="legend-row"><span>home peg</span><div class="legend-dot peg"></div></div>
    <div class="legend-row"><span>in flight</span><div class="legend-dot live"></div></div>
    <div class="legend-row"><span>2xx</span><div class="legend-dot ok"></div></div>
    <div class="legend-row"><span>4xx</span><div class="legend-dot warn"></div></div>
    <div class="legend-row"><span>5xx</span><div class="legend-dot err"></div></div>
    <div class="legend-row"><span>extra trays</span><div class="legend-pill"></div></div>
  </div>

  <div id="controls">
    <button class="control-btn" id="demo-spray">RESET + SPRAY</button>
    <button class="control-btn" id="reset-view">RESET VIEW</button>
  </div>

  <div id="status">
    <div class="status-dot offline" id="status-dot"></div>
    <span id="status-label">CONNECTING</span>
    <span id="log-label"></span>
  </div>

  <canvas id="overlay"></canvas>
  <div id="tooltip"></div>
  <div id="inspector">
    <div class="panel-head">
      <div class="panel-title" id="panel-title">Pinned</div>
      <button class="panel-close" id="panel-close">CLOSE</button>
    </div>
    <div id="panel-content"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import {
      ATLAS_DOMAIN_LABELS,
      ATLAS_DOMAIN_LAYOUT,
      ATLAS_DOMAIN_ORDER,
      ATLAS_WORLD,
      buildAtlasLayout,
      buildAtlasRouteSignature,
      compactAtlasPath,
      shortRouteLabel,
    } from '/live/atlas-layout.mjs';
    import { RouteDock } from '/live/route-dock.mjs';

    const DOMAIN_COLORS = {
      'app-level': '#e6edf3',
      discovery: '#6eb5ff',
      identity: '#5fd89a',
      wallet: '#ffd36e',
      analysis: '#64dfdf',
      social: '#c77dff',
      channels: '#ff8e98',
      market: '#f4b350',
      analytics: '#72efdd',
      capital: '#ff6d6d',
      other: '#8b949e',
    };

    const AGENT_CAPACITY = 14_000;
    const BASE_CAMERA_ZOOM = 1;
    const MIN_CAMERA_ZOOM = 0.82;
    const MAX_CAMERA_ZOOM = 1.22;
    const ROUTE_MOVE_BASE_MS = 980;
    const SAME_ROUTE_MOVE_MS = 220;
    const MAX_MOVE_QUEUE = 10;
    const RECENT_ROUTE_MS = 120_000;
    const STALE_VISUAL_MS = 6_000;
    const SNAPSHOT_REFRESH_MS = 60_000;
    const HOVER_RADIUS = 8;
    const SEARCH_LABEL_LIMIT = 18;

    const overlay = document.getElementById('overlay');
    const overlayCtx = overlay.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const inspector = document.getElementById('inspector');
    const panelTitle = document.getElementById('panel-title');
    const panelContent = document.getElementById('panel-content');
    const searchInput = document.getElementById('route-search');
    const searchMeta = document.getElementById('search-meta');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.inset = '0';
    document.body.insertBefore(renderer.domElement, overlay);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05080d);
    scene.fog = new THREE.Fog(0x05080d, 74, 140);

    const camera = new THREE.OrthographicCamera(-90, 90, 60, -60, 0.1, 250);
    camera.position.set(0, 72, 44);
    camera.lookAt(0, 6, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.76);
    const hemi = new THREE.HemisphereLight(0x9bb8d3, 0x0b1016, 0.62);
    const key = new THREE.DirectionalLight(0xf6f9ff, 0.92);
    key.position.set(-22, 48, 26);
    const rim = new THREE.DirectionalLight(0x6eb5ff, 0.2);
    rim.position.set(30, 20, -20);
    scene.add(ambient, hemi, key, rim);

    const board = new THREE.Mesh(
      new THREE.BoxGeometry(ATLAS_WORLD.width, ATLAS_WORLD.boardHeight, ATLAS_WORLD.depth),
      new THREE.MeshStandardMaterial({
        color: 0x091018,
        metalness: 0.06,
        roughness: 0.94,
      }),
    );
    board.position.y = -ATLAS_WORLD.boardHeight / 2;
    scene.add(board);

    const boardGlow = new THREE.Mesh(
      new THREE.PlaneGeometry(ATLAS_WORLD.width * 0.98, ATLAS_WORLD.depth * 0.98),
      new THREE.MeshBasicMaterial({
        color: 0x0d1622,
        transparent: true,
        opacity: 0.24,
        depthWrite: false,
      }),
    );
    boardGlow.rotation.x = -Math.PI / 2;
    boardGlow.position.y = 0.02;
    scene.add(boardGlow);

    const grid = new THREE.GridHelper(ATLAS_WORLD.width, 28, 0x18212b, 0x0d141c);
    grid.position.y = 0.03;
    if (Array.isArray(grid.material)) {
      for (const material of grid.material) {
        material.transparent = true;
        material.opacity = 0.32;
      }
    } else {
      grid.material.transparent = true;
      grid.material.opacity = 0.32;
    }
    scene.add(grid);

    const islandGroup = new THREE.Group();
    const dockGroup = new THREE.Group();
    scene.add(islandGroup, dockGroup);

    const agentGeometry = new THREE.SphereGeometry(0.26, 10, 10);
    const staticAgentMaterial = new THREE.MeshBasicMaterial({
      toneMapped: false,
      transparent: true,
      opacity: 1,
      vertexColors: true,
      depthTest: false,
      depthWrite: false,
    });
    const movingAgentMaterial = new THREE.MeshBasicMaterial({
      toneMapped: false,
      transparent: true,
      opacity: 1,
      vertexColors: true,
      depthTest: false,
      depthWrite: false,
    });
    const staticAgentMesh = new THREE.InstancedMesh(agentGeometry, staticAgentMaterial, AGENT_CAPACITY);
    const movingAgentMesh = new THREE.InstancedMesh(agentGeometry, movingAgentMaterial, AGENT_CAPACITY);
    staticAgentMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    movingAgentMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    staticAgentMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(AGENT_CAPACITY * 3), 3);
    movingAgentMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(AGENT_CAPACITY * 3), 3);
    staticAgentMesh.renderOrder = 40;
    movingAgentMesh.renderOrder = 50;
    scene.add(staticAgentMesh, movingAgentMesh);

    const islandMap = new Map();
    const dockMap = new Map();
    const routeMap = new Map();
    const agentMap = new Map();
    const visualAgents = new Map();
    let atlasLayout = null;
    let lockedAnchors = new Map();
    let routeSignature = '';
    let searchTerm = '';
    let liveConnected = false;
    let zoomLevel = BASE_CAMERA_ZOOM;
    let inflightCount = 0;
    let lastSnapshotAt = 0;
    let logInfo = null;
    let hovered = null;
    let pinned = null;
    let pointer = { x: 0, y: 0 };
    let screenRoutes = [];
    let screenAgents = [];
    let hotRouteCount = 0;
    let demoBusy = false;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + ((b - a) * t);
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - (Math.pow(-2 * t + 2, 3) / 2);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatTimestamp(ms) {
      if (!Number.isFinite(ms) || ms <= 0) return '-';
      const date = new Date(ms);
      return date.toLocaleString([], {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit',
      });
    }

    function formatDurationLong(ms) {
      if (!Number.isFinite(ms) || ms < 0) return '-';
      if (ms < 1000) return `${Math.round(ms)} ms`;
      if (ms < 60_000) return `${(ms / 1000).toFixed(ms < 10_000 ? 1 : 0)} sec`;
      if (ms < 3_600_000) return `${Math.floor(ms / 60_000)} min ${Math.floor((ms % 60_000) / 1000)} sec`;
      return `${Math.floor(ms / 3_600_000)} hr ${Math.floor((ms % 3_600_000) / 60_000)} min`;
    }

    function formatDurationCompact(ms) {
      if (!Number.isFinite(ms) || ms < 0) return '-';
      if (ms < 1000) return `${Math.round(ms)}ms`;
      if (ms < 60_000) return `${(ms / 1000).toFixed(ms < 10_000 ? 1 : 0)}s`;
      if (ms < 3_600_000) return `${Math.floor(ms / 60_000)}m`;
      return `${Math.floor(ms / 3_600_000)}h ${Math.floor((ms % 3_600_000) / 60_000)}m`;
    }

    function tooltipRow(label, value) {
      if (value == null || value === '') return '';
      return `<div class="tt-row"><span class="tt-label">${escapeHtml(label)}</span><span class="tt-value">${escapeHtml(value)}</span></div>`;
    }

    function panelRow(label, value) {
      if (value == null || value === '') return '';
      return `<div class="panel-row"><span class="panel-label">${escapeHtml(label)}</span><span class="panel-value">${escapeHtml(value)}</span></div>`;
    }

    function domainColor(domain) {
      return new THREE.Color(DOMAIN_COLORS[domain] || DOMAIN_COLORS.other);
    }

    function agentColor(agent) {
      if (agent.phase === 'in-flight') return new THREE.Color('#58a6ff');
      if (agent.status >= 500) return new THREE.Color('#f85149');
      if (agent.status >= 400) return new THREE.Color('#d29922');
      return new THREE.Color('#3fb950');
    }

    function fitCamera() {
      const aspect = window.innerWidth / Math.max(1, window.innerHeight);
      const halfWidth = 92;
      const halfHeight = halfWidth / Math.max(0.55, aspect);
      camera.left = -halfWidth;
      camera.right = halfWidth;
      camera.top = halfHeight;
      camera.bottom = -halfHeight;
      camera.zoom = zoomLevel;
      camera.updateProjectionMatrix();
    }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      renderer.setPixelRatio(dpr);
      renderer.setSize(window.innerWidth, window.innerHeight);
      overlay.width = Math.floor(window.innerWidth * dpr);
      overlay.height = Math.floor(window.innerHeight * dpr);
      overlay.style.width = `${window.innerWidth}px`;
      overlay.style.height = `${window.innerHeight}px`;
      overlayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      fitCamera();
    }

    function projectWorld(x, y, z) {
      const point = new THREE.Vector3(x, y, z).project(camera);
      return {
        x: ((point.x + 1) / 2) * window.innerWidth,
        y: ((-point.y + 1) / 2) * window.innerHeight,
        visible: point.z >= -1 && point.z <= 1,
      };
    }

    function drawRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle = null) {
      const r = Math.min(radius, width / 2, height / 2);
      overlayCtx.beginPath();
      overlayCtx.moveTo(x + r, y);
      overlayCtx.arcTo(x + width, y, x + width, y + height, r);
      overlayCtx.arcTo(x + width, y + height, x, y + height, r);
      overlayCtx.arcTo(x, y + height, x, y, r);
      overlayCtx.arcTo(x, y, x + width, y, r);
      overlayCtx.closePath();
      overlayCtx.fillStyle = fillStyle;
      overlayCtx.fill();
      if (strokeStyle) {
        overlayCtx.strokeStyle = strokeStyle;
        overlayCtx.lineWidth = 1;
        overlayCtx.stroke();
      }
    }

    function getCurrentRouteMs(agent, now = Date.now()) {
      if (Number.isFinite(agent?.routeEnteredAt)) return Math.max(0, now - agent.routeEnteredAt);
      return Number.isFinite(agent?.currentRouteMs) ? agent.currentRouteMs : null;
    }

    function getCurrentRequestMs(agent, now = Date.now()) {
      if (agent?.phase !== 'in-flight') return null;
      if (Number.isFinite(agent?.startedAt)) return Math.max(0, now - agent.startedAt);
      return Number.isFinite(agent?.currentRequestMs) ? agent.currentRequestMs : null;
    }

    function formatStatus(agent) {
      if (!Number.isFinite(agent?.status) || agent.status <= 0) return '-';
      return agent.statusBucket ? `${agent.status} ${agent.statusBucket}` : String(agent.status);
    }

    function ensureIsland(panel) {
      let island = islandMap.get(panel.domain);
      if (island) return island;

      const group = new THREE.Group();
      const color = domainColor(panel.domain);

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(panel.width, panel.islandHeight, panel.depth),
        new THREE.MeshStandardMaterial({
          color: color.clone().multiplyScalar(0.23),
          emissive: color,
          emissiveIntensity: 0.03,
          metalness: 0.04,
          roughness: 0.92,
          transparent: true,
          opacity: 0.98,
        }),
      );
      base.position.y = panel.islandHeight / 2;
      group.add(base);

      const top = new THREE.Mesh(
        new THREE.BoxGeometry(panel.width * 0.97, 0.08, panel.depth * 0.97),
        new THREE.MeshStandardMaterial({
          color: color.clone().multiplyScalar(0.34),
          emissive: color,
          emissiveIntensity: 0.06,
          metalness: 0.02,
          roughness: 0.84,
          transparent: true,
          opacity: 0.96,
        }),
      );
      top.position.y = panel.islandHeight + 0.04;
      group.add(top);

      const glow = new THREE.Mesh(
        new THREE.PlaneGeometry(panel.width * 0.94, panel.depth * 0.94),
        new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.08,
          depthWrite: false,
        }),
      );
      glow.rotation.x = -Math.PI / 2;
      glow.position.y = panel.islandHeight + 0.06;
      group.add(glow);

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1)),
        new THREE.LineBasicMaterial({
          color,
          transparent: true,
          opacity: 0.3,
        }),
      );
      edges.scale.set(panel.width, panel.islandHeight, panel.depth);
      edges.position.y = panel.islandHeight / 2;
      group.add(edges);

      group.position.set(panel.x, 0, panel.z);
      islandGroup.add(group);
      island = { group, base, top, glow, edges, panel };
      islandMap.set(panel.domain, island);
      return island;
    }

    function rebuildLayout(force = false) {
      const routes = [...routeMap.values()];
      const nextSignature = buildAtlasRouteSignature(routes);
      if (!force && atlasLayout && routeSignature === nextSignature) {
        for (const route of routes) {
          const dock = dockMap.get(route.routeKey);
          if (dock) dock.setRoute(route);
        }
        return;
      }

      const candidate = buildAtlasLayout(routes);
      for (const [routeKey, anchor] of candidate.routeAnchors) {
        if (!lockedAnchors.has(routeKey) || force) lockedAnchors.set(routeKey, anchor);
      }

      atlasLayout = {
        board: candidate.board,
        domains: candidate.domains,
        routeAnchors: new Map(lockedAnchors),
      };
      routeSignature = nextSignature;

      for (const panel of atlasLayout.domains.values()) ensureIsland(panel);

      for (const route of routes) {
        const anchor = atlasLayout.routeAnchors.get(route.routeKey);
        if (!anchor) continue;
        let dock = dockMap.get(route.routeKey);
        if (!dock) {
          dock = new RouteDock({
            THREE,
            route,
            anchor,
            color: domainColor(route.domain),
          });
          dockGroup.add(dock.group);
          dockMap.set(route.routeKey, dock);
        } else {
          dock.anchor = anchor;
          dock.group.position.set(anchor.x, anchor.baseY, anchor.z);
          dock.setRoute(route);
        }
      }
    }

    function upsertRoute(routeLike) {
      if (!routeLike?.routeKey) return;
      const existing = routeMap.get(routeLike.routeKey) || {};
      routeMap.set(routeLike.routeKey, {
        ...existing,
        ...routeLike,
      });
    }

    function applySnapshot(snapshot) {
      routeMap.clear();
      agentMap.clear();

      for (const route of snapshot.routes || []) {
        upsertRoute(route);
      }

      for (const agent of snapshot.agents || []) {
        agentMap.set(agent.id, { ...agent });
        upsertRoute({
          routeKey: agent.routeKey,
          routePath: agent.routePath,
          routeLabel: agent.routeLabel,
          method: agent.method,
          domain: agent.domain,
          group: agent.group,
          surfaceType: agent.surfaceType,
          canonical: agent.canonical,
          lastEventTime: agent.lastEventTime,
        });
      }

      inflightCount = snapshot.stats?.inFlight || 0;
      lastSnapshotAt = snapshot.builtAt || Date.now();
      logInfo = snapshot.log || null;
      rebuildLayout();
      updateHud();
    }

    function applyEvent(event) {
      if (event.type === 'snapshot' && event.snapshot) {
        applySnapshot(event.snapshot);
        return;
      }

      if (event.routeKey) {
        upsertRoute({
          routeKey: event.routeKey,
          routePath: event.routePath,
          routeLabel: event.routePath,
          method: event.method,
          domain: event.domain,
          group: event.group,
          surfaceType: event.surfaceType,
          lastEventTime: event.ts,
        });
      }

      if (event.event === 'request_start') inflightCount += 1;
      if (event.event === 'request_finish') inflightCount = Math.max(0, inflightCount - 1);

      if (event.agent) {
        agentMap.set(event.agent.id, { ...event.agent });
        upsertRoute({
          routeKey: event.agent.routeKey,
          routePath: event.agent.routePath,
          routeLabel: event.agent.routeLabel,
          method: event.agent.method,
          domain: event.agent.domain,
          group: event.agent.group,
          surfaceType: event.agent.surfaceType,
          canonical: event.agent.canonical,
          lastEventTime: event.agent.lastEventTime,
        });
      }

      rebuildLayout();
      updateHud();
    }

    function computeGroupedRoutes(now = Date.now()) {
      const grouped = new Map();
      for (const route of routeMap.values()) {
        grouped.set(route.routeKey, {
          ...route,
          agents: [],
          inFlight: 0,
          recent: Number.isFinite(route.lastEventTime) && (now - route.lastEventTime) <= RECENT_ROUTE_MS,
        });
      }

      for (const agent of agentMap.values()) {
        if (!agent.routeKey) continue;
        if (!grouped.has(agent.routeKey)) {
          grouped.set(agent.routeKey, {
            routeKey: agent.routeKey,
            routePath: agent.routePath,
            routeLabel: agent.routeLabel,
            method: agent.method,
            domain: agent.domain || 'other',
            group: agent.group || 'other',
            surfaceType: agent.surfaceType || 'other',
            canonical: agent.canonical ?? false,
            lastEventTime: agent.lastEventTime || 0,
            agents: [],
            inFlight: 0,
            recent: true,
          });
        }
        grouped.get(agent.routeKey).agents.push(agent);
      }

      hotRouteCount = 0;
      for (const route of grouped.values()) {
        route.agents.sort((a, b) => {
          const aTime = Number.isFinite(a.routeEnteredAt) ? a.routeEnteredAt : (a.lastEventTime || 0);
          const bTime = Number.isFinite(b.routeEnteredAt) ? b.routeEnteredAt : (b.lastEventTime || 0);
          if (aTime !== bTime) return aTime - bTime;
          return String(a.id).localeCompare(String(b.id));
        });
        route.inFlight = route.agents.filter((agent) => agent.phase === 'in-flight').length;
        if (route.agents.length > 0 || route.inFlight > 0) hotRouteCount += 1;
      }

      return grouped;
    }

    function updateHud() {
      document.getElementById('stat-agents').textContent = agentMap.size.toLocaleString();
      document.getElementById('stat-routes').textContent = routeMap.size.toLocaleString();
      document.getElementById('stat-hot').textContent = hotRouteCount.toLocaleString();
      document.getElementById('stat-inflight').textContent = inflightCount.toLocaleString();
      if (logInfo) {
        const bytes = Number(logInfo.lastSizeBytes || 0);
        const mb = (bytes / 1024 / 1024).toFixed(1);
        document.getElementById('log-label').textContent = `LOG ${mb}MB ${String(logInfo.level || 'ok').toUpperCase()}`;
      }
    }

    function setLiveStatus(connected, label) {
      liveConnected = connected;
      document.getElementById('status-dot').className = `status-dot ${connected ? 'live' : 'offline'}`;
      document.getElementById('status-label').textContent = label;
    }

    async function triggerDemoSpray() {
      if (demoBusy) return;
      demoBusy = true;
      const button = document.getElementById('demo-spray');
      button.textContent = 'SPRAYING';
      button.disabled = true;
      searchMeta.textContent = 'Resetting live state and starting replay spray...';
      try {
        const response = await fetch('/api/demo/reset-and-spray', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
        });
        const payload = await response.json();
        if (!response.ok || !payload?.ok) {
          throw new Error(payload?.error || 'spray failed');
        }
        pinPayload(null);
        hovered = null;
        tooltip.style.display = 'none';
        searchMeta.textContent = `Spraying ${payload.agents} agents for about ${formatDurationCompact(payload.durationMs)}`;
      } catch (error) {
        searchMeta.textContent = `Spray failed: ${error.message || error}`;
      } finally {
        demoBusy = false;
        button.textContent = 'RESET + SPRAY';
        button.disabled = false;
      }
    }

    function buildSearchMatches(groupedRoutes) {
      if (!searchTerm) {
        searchMeta.textContent = '';
        return { keys: new Set(), labelKeys: new Set(), bestRouteKey: null };
      }

      const needle = searchTerm.toLowerCase();
      const matches = [...groupedRoutes.values()].filter((route) => {
        const haystack = [
          route.routePath,
          route.routeLabel,
          route.method,
          route.group,
          route.domain,
        ].join(' ').toLowerCase();
        return haystack.includes(needle);
      }).sort((a, b) => {
        const aScore = (a.agents.length * 10) + a.inFlight;
        const bScore = (b.agents.length * 10) + b.inFlight;
        if (aScore !== bScore) return bScore - aScore;
        return String(a.routePath).localeCompare(String(b.routePath));
      });

      searchMeta.textContent = matches.length === 0
        ? 'No routes match'
        : `${matches.length} match${matches.length === 1 ? '' : 'es'} • Enter pins the first`;

      return {
        keys: new Set(matches.map((route) => route.routeKey)),
        labelKeys: new Set(matches.slice(0, SEARCH_LABEL_LIMIT).map((route) => route.routeKey)),
        bestRouteKey: matches[0]?.routeKey || null,
      };
    }

    function buildArcControlPoint(from, to) {
      const mid = from.clone().lerp(to, 0.5);
      mid.y = Math.max(from.y, to.y) + 1.45 + Math.min(2.2, from.distanceTo(to) * 0.11);
      return mid;
    }

    function sampleArc(from, control, to, t) {
      const a = from.clone().multiplyScalar((1 - t) * (1 - t));
      const b = control.clone().multiplyScalar(2 * (1 - t) * t);
      const c = to.clone().multiplyScalar(t * t);
      return a.add(b).add(c);
    }

    function computeMoveDuration(routeChanged, distance, agent, queueDepth = 0) {
      const timing = agent?.timing || null;
      let base = routeChanged
        ? ROUTE_MOVE_BASE_MS + distance * 48
        : SAME_ROUTE_MOVE_MS + distance * 18;

      if (routeChanged && Number.isFinite(timing?.gapFromPrevRequestMs)) {
        base = Math.max(base, 420 + (timing.gapFromPrevRequestMs * 0.18));
      }
      if (routeChanged && Number.isFinite(timing?.latencyMs)) {
        base = Math.max(base, 760 + (timing.latencyMs * 0.35));
      }

      base = clamp(base, routeChanged ? 860 : 160, routeChanged ? 1900 : 520);
      if (queueDepth > 0) {
        base = Math.max(routeChanged ? 300 : 90, base * Math.max(0.42, 1 - queueDepth * 0.12));
      }
      return base;
    }

    function startVisualMove(visual, segment, agent, now) {
      const from = visual.position.clone();
      const to = segment.position.clone();
      const routeChanged = segment.routeKey !== visual.currentRouteKey;
      visual.moveStartAt = now;
      visual.moveDurationMs = computeMoveDuration(routeChanged, from.distanceTo(to), agent, visual.pending.length);
      visual.from = from;
      visual.to = to;
      visual.control = routeChanged ? buildArcControlPoint(from, to) : null;
      visual.toRouteKey = segment.routeKey;
      visual.moving = routeChanged;
    }

    function advanceVisual(visual, now) {
      if (!visual.moveDurationMs || visual.moveDurationMs <= 0) {
        return;
      }
      const progress = clamp((now - visual.moveStartAt) / visual.moveDurationMs, 0, 1);
      const eased = easeInOutCubic(progress);
      visual.position.copy(
        visual.control
          ? sampleArc(visual.from, visual.control, visual.to, eased)
          : new THREE.Vector3(
            lerp(visual.from.x, visual.to.x, eased),
            lerp(visual.from.y, visual.to.y, eased),
            lerp(visual.from.z, visual.to.z, eased),
          ),
      );

      if (progress < 1) return;
      visual.position.copy(visual.to);
      visual.currentRouteKey = visual.toRouteKey;
      visual.moveDurationMs = 0;
      visual.moving = false;
    }

    function ensureVisualAgent(agent, targetPosition, now) {
      let visual = visualAgents.get(agent.id);
      if (!visual) {
        visual = {
          id: agent.id,
          currentRouteKey: agent.routeKey,
          toRouteKey: agent.routeKey,
          position: targetPosition.clone(),
          from: targetPosition.clone(),
          to: targetPosition.clone(),
          control: null,
          moveStartAt: now,
          moveDurationMs: 0,
          pending: [],
          moving: false,
          seenAt: now,
        };
        visualAgents.set(agent.id, visual);
        return visual;
      }

      advanceVisual(visual, now);
      if ((!visual.moveDurationMs || visual.moveDurationMs <= 0) && visual.pending.length > 0) {
        startVisualMove(visual, visual.pending.shift(), agent, now);
      }

      const activeTarget = visual.pending.length > 0
        ? visual.pending[visual.pending.length - 1]
        : {
          routeKey: visual.moveDurationMs > 0 ? visual.toRouteKey : visual.currentRouteKey,
          position: visual.moveDurationMs > 0 ? visual.to : visual.position,
        };
      const routeChanged = activeTarget.routeKey !== agent.routeKey;
      const distance = activeTarget.position.distanceTo(targetPosition);

      if (routeChanged) {
        const pendingLast = visual.pending[visual.pending.length - 1];
        if (pendingLast && pendingLast.routeKey === agent.routeKey) {
          pendingLast.position.copy(targetPosition);
        } else if (visual.moveDurationMs > 0 || visual.pending.length > 0) {
          visual.pending.push({ routeKey: agent.routeKey, position: targetPosition.clone() });
          if (visual.pending.length > MAX_MOVE_QUEUE) visual.pending = visual.pending.slice(-MAX_MOVE_QUEUE);
        } else {
          startVisualMove(visual, { routeKey: agent.routeKey, position: targetPosition.clone() }, agent, now);
        }
      } else if (distance > 0.02) {
        if (visual.pending.length > 0) {
          visual.pending[visual.pending.length - 1].position.copy(targetPosition);
        } else if (visual.moveDurationMs > 0) {
          visual.to.copy(targetPosition);
          if (visual.control) visual.control = buildArcControlPoint(visual.from, visual.to);
        } else {
          startVisualMove(visual, { routeKey: agent.routeKey, position: targetPosition.clone() }, agent, now);
        }
      }

      visual.seenAt = now;
      return visual;
    }

    function updateIslands(groupedRoutes) {
      for (const domain of ATLAS_DOMAIN_ORDER) {
        const island = islandMap.get(domain);
        if (!island) continue;

        let agents = 0;
        let liveRoutes = 0;
        let inFlight = 0;
        for (const route of groupedRoutes.values()) {
          if (route.domain !== domain) continue;
          agents += route.agents.length;
          inFlight += route.inFlight || 0;
          if (route.agents.length > 0 || route.inFlight > 0) liveRoutes += 1;
        }

        const energy = clamp((agents * 0.05) + (liveRoutes * 0.04) + (inFlight * 0.18), 0.06, 1);
        island.top.material.emissiveIntensity = 0.06 + energy * 0.2;
        island.glow.material.opacity = 0.04 + energy * 0.18;
        island.edges.material.opacity = 0.18 + energy * 0.3;
      }
    }

    function updateDocks(groupedRoutes, searchMatches, now) {
      for (const [routeKey, dock] of dockMap) {
        const route = groupedRoutes.get(routeKey) || dock.route || {
          routeKey,
          routePath: routeKey,
          domain: 'other',
          agents: [],
          inFlight: 0,
        };
        dock.setRoute(route);
        const highlighted = hovered?.type === 'route' && hovered.routeKey === routeKey
          || pinned?.type === 'route' && pinned.routeKey === routeKey;
        const searchMatch = searchMatches.keys.has(routeKey);
        dock.updateVisual({
          occupancy: route.agents.length,
          inFlight: route.inFlight || 0,
          highlighted,
          searchMatch,
        });

        const synced = dock.syncAgents(route.agents, now);
        route.slotEntries = synced.slots.map((slot) => (slot.agentId ? agentMap.get(slot.agentId) : null));
        route.slotIndexByAgent = synced.indexByAgent;

        for (const [agentId, slotIndex] of synced.indexByAgent) {
          const agent = agentMap.get(agentId);
          if (!agent) continue;
          const slot = dock.getSlotTarget(slotIndex);
          const target = new THREE.Vector3(
            slot.x,
            slot.y + (agent.phase === 'in-flight' ? 0.24 : 0),
            slot.z,
          );
          ensureVisualAgent(agent, target, now);
        }
      }

      for (const [agentId, visual] of visualAgents) {
        if (agentMap.has(agentId)) continue;
        if ((now - visual.seenAt) > STALE_VISUAL_MS) visualAgents.delete(agentId);
      }
    }

    function drawAgents(now) {
      const dummy = new THREE.Object3D();
      let staticCount = 0;
      let movingCount = 0;

      for (const [agentId, visual] of visualAgents) {
        const agent = agentMap.get(agentId);
        if (!agent) continue;
        advanceVisual(visual, now);

        const moving = visual.moving || visual.pending.length > 0;
        const mesh = moving ? movingAgentMesh : staticAgentMesh;
        const index = moving ? movingCount : staticCount;
        const pulse = agent.phase === 'in-flight'
          ? 1.22 + Math.sin(now / 180) * 0.08
          : moving
            ? 1.12
            : 1;
        dummy.position.copy(visual.position);
        dummy.scale.setScalar(pulse);
        dummy.updateMatrix();
        mesh.setMatrixAt(index, dummy.matrix);
        mesh.setColorAt(index, agentColor(agent));
        if (moving) movingCount += 1;
        else staticCount += 1;
      }

      staticAgentMesh.count = staticCount;
      movingAgentMesh.count = movingCount;
      staticAgentMesh.instanceMatrix.needsUpdate = true;
      movingAgentMesh.instanceMatrix.needsUpdate = true;
      if (staticAgentMesh.instanceColor) staticAgentMesh.instanceColor.needsUpdate = true;
      if (movingAgentMesh.instanceColor) movingAgentMesh.instanceColor.needsUpdate = true;
    }

    function buildRouteTooltip(route) {
      const now = Date.now();
      const ages = route.agents
        .map((agent) => getCurrentRouteMs(agent, now))
        .filter((value) => Number.isFinite(value));
      const oldest = ages.length > 0 ? Math.max(...ages) : null;
      const avg = ages.length > 0 ? ages.reduce((sum, value) => sum + value, 0) / ages.length : null;
      return `
        <div class="tt-title">${escapeHtml(route.routePath)}</div>
        ${tooltipRow('method', route.method)}
        ${tooltipRow('domain', ATLAS_DOMAIN_LABELS[route.domain] || route.domain)}
        ${tooltipRow('group', route.group)}
        ${tooltipRow('surface', route.surfaceType)}
        ${tooltipRow('agents', route.agents.length)}
        ${tooltipRow('in flight', route.inFlight || 0)}
        ${tooltipRow('oldest stay', formatDurationLong(oldest))}
        ${tooltipRow('avg stay', formatDurationLong(avg))}
      `;
    }

    function buildAgentTooltip(agent) {
      const now = Date.now();
      const routeMs = getCurrentRouteMs(agent, now);
      const requestMs = getCurrentRequestMs(agent, now);
      const lastSeenMs = Number.isFinite(agent.lastEventTime) ? Math.max(0, now - agent.lastEventTime) : null;
      const timing = agent.timing || null;
      const dwellHistory = Array.isArray(agent.dwellHistory) ? agent.dwellHistory.slice(-3).reverse() : [];
      return `
        <div class="tt-title">${escapeHtml(agent.id)}</div>
        ${tooltipRow('route', agent.routePath)}
        ${agent.rawPath && agent.rawPath !== agent.routePath ? tooltipRow('raw path', agent.rawPath) : ''}
        ${tooltipRow('method', agent.method)}
        ${tooltipRow('domain', ATLAS_DOMAIN_LABELS[agent.domain] || agent.domain)}
        ${tooltipRow('group', agent.group)}
        ${tooltipRow('phase', agent.phase)}
        ${tooltipRow('status', formatStatus(agent))}
        ${tooltipRow('session', formatDurationLong(agent.sessionAgeMs))}
        ${tooltipRow('session start', formatTimestamp(agent.sessionStartedAt))}
        ${tooltipRow('on route', formatDurationLong(routeMs))}
        ${tooltipRow('entered route', formatTimestamp(agent.routeEnteredAt))}
        ${requestMs == null ? '' : tooltipRow('in request', formatDurationLong(requestMs))}
        ${requestMs == null ? '' : tooltipRow('request start', formatTimestamp(agent.startedAt))}
        ${tooltipRow('last seen', lastSeenMs == null ? '-' : `${formatDurationLong(lastSeenMs)} ago`)}
        ${tooltipRow('requests', agent.requestCount)}
        ${agent.traceId ? tooltipRow('trace', agent.traceId) : ''}
        ${timing?.requestTimelineIndex != null ? tooltipRow('timeline index', timing.requestTimelineIndex) : ''}
        ${timing?.gapFromPrevRequestMs != null ? tooltipRow('replay gap', formatDurationCompact(timing.gapFromPrevRequestMs)) : ''}
        ${timing?.latencyMs != null ? tooltipRow('replay latency', formatDurationCompact(timing.latencyMs)) : ''}
        ${dwellHistory.length === 0 ? '' : '<div class="tt-divider"></div>'}
        ${dwellHistory.map((entry) => tooltipRow(compactAtlasPath(entry.routePath), `${formatDurationCompact(entry.dwellMs)} • ${formatTimestamp(entry.leftAt)}`)).join('')}
        ${dwellHistory.length === 0 ? '' : '<div class="tt-note">Recent route stays</div>'}
      `;
    }

    function buildRoutePanel(route) {
      const ages = route.agents
        .map((agent) => getCurrentRouteMs(agent))
        .filter((value) => Number.isFinite(value));
      const oldest = ages.length > 0 ? Math.max(...ages) : null;
      const avg = ages.length > 0 ? ages.reduce((sum, value) => sum + value, 0) / ages.length : null;
      panelTitle.textContent = route.routePath;
      panelContent.innerHTML = `
        ${panelRow('method', route.method)}
        ${panelRow('domain', ATLAS_DOMAIN_LABELS[route.domain] || route.domain)}
        ${panelRow('group', route.group)}
        ${panelRow('surface', route.surfaceType)}
        ${panelRow('agents', route.agents.length)}
        ${panelRow('in flight', route.inFlight || 0)}
        ${panelRow('oldest stay', formatDurationLong(oldest))}
        ${panelRow('avg stay', formatDurationLong(avg))}
        <div class="panel-divider"></div>
        ${route.agents.slice(0, 12).map((agent) => panelRow(agent.id, `${formatStatus(agent)} • ${formatDurationCompact(getCurrentRouteMs(agent))}`)).join('')}
        ${route.agents.length > 12 ? `<div class="panel-note">${route.agents.length - 12} more agents in this route</div>` : ''}
      `;
      inspector.classList.add('visible');
    }

    function buildAgentPanel(agent) {
      const timing = agent.timing || null;
      const dwellHistory = Array.isArray(agent.dwellHistory) ? agent.dwellHistory.slice().reverse() : [];
      panelTitle.textContent = agent.id;
      panelContent.innerHTML = `
        ${panelRow('route', agent.routePath)}
        ${agent.rawPath && agent.rawPath !== agent.routePath ? panelRow('raw path', agent.rawPath) : ''}
        ${panelRow('method', agent.method)}
        ${panelRow('domain', ATLAS_DOMAIN_LABELS[agent.domain] || agent.domain)}
        ${panelRow('group', agent.group)}
        ${panelRow('phase', agent.phase)}
        ${panelRow('status', formatStatus(agent))}
        ${panelRow('session', formatDurationLong(agent.sessionAgeMs))}
        ${panelRow('session start', formatTimestamp(agent.sessionStartedAt))}
        ${panelRow('on route', formatDurationLong(getCurrentRouteMs(agent)))}
        ${panelRow('in request', formatDurationLong(getCurrentRequestMs(agent)))}
        ${panelRow('last event', formatTimestamp(agent.lastEventTime))}
        ${panelRow('requests', agent.requestCount)}
        ${agent.traceId ? panelRow('trace', agent.traceId) : ''}
        ${timing?.requestTimelineIndex != null ? panelRow('timeline index', timing.requestTimelineIndex) : ''}
        ${timing?.gapFromPrevRequestMs != null ? panelRow('replay gap', formatDurationCompact(timing.gapFromPrevRequestMs)) : ''}
        ${timing?.latencyMs != null ? panelRow('replay latency', formatDurationCompact(timing.latencyMs)) : ''}
        ${dwellHistory.length > 0 ? '<div class="panel-divider"></div>' : ''}
        ${dwellHistory.map((entry) => panelRow(compactAtlasPath(entry.routePath), `${formatDurationCompact(entry.dwellMs)} • ${formatTimestamp(entry.leftAt)}`)).join('')}
        ${dwellHistory.length > 0 ? '<div class="panel-note">Recent route stays</div>' : ''}
      `;
      inspector.classList.add('visible');
    }

    function pinPayload(payload) {
      pinned = payload;
      if (!payload) {
        inspector.classList.remove('visible');
        return;
      }
      if (payload.type === 'route') buildRoutePanel(payload.route);
      else buildAgentPanel(payload.agent);
    }

    function refreshPinned(groupedRoutes) {
      if (!pinned) return;
      if (pinned.type === 'route') {
        const latestRoute = groupedRoutes.get(pinned.routeKey);
        if (!latestRoute) {
          pinPayload(null);
          return;
        }
        pinned = { type: 'route', routeKey: latestRoute.routeKey, route: latestRoute };
        buildRoutePanel(latestRoute);
        return;
      }
      const latestAgent = agentMap.get(pinned.agent.id);
      if (!latestAgent) {
        pinPayload(null);
        return;
      }
      pinned = { type: 'agent', agent: latestAgent };
      buildAgentPanel(latestAgent);
    }

    function showTooltip(payload, x, y) {
      if (!payload) {
        tooltip.style.display = 'none';
        return;
      }
      tooltip.innerHTML = payload.type === 'route'
        ? buildRouteTooltip(payload.route)
        : buildAgentTooltip(payload.agent);
      tooltip.style.display = 'block';
      const rect = tooltip.getBoundingClientRect();
      let tx = x + 14;
      let ty = y + 14;
      if (tx + rect.width > window.innerWidth) tx = x - rect.width - 10;
      if (ty + rect.height > window.innerHeight) ty = window.innerHeight - rect.height - 10;
      tooltip.style.left = `${Math.max(8, tx)}px`;
      tooltip.style.top = `${Math.max(8, ty)}px`;
    }

    function pickPayload(x, y) {
      for (const item of screenAgents) {
        const dx = x - item.x;
        const dy = y - item.y;
        if ((dx * dx + dy * dy) <= ((item.r + HOVER_RADIUS) * (item.r + HOVER_RADIUS))) {
          return { type: 'agent', agent: item.agent };
        }
      }
      for (const item of screenRoutes) {
        if (
          x >= item.rect.x
          && x <= item.rect.x + item.rect.w
          && y >= item.rect.y
          && y <= item.rect.y + item.rect.h
        ) {
          return { type: 'route', routeKey: item.routeKey, route: item.route };
        }
      }
      return null;
    }

    function renderOverlay(groupedRoutes, searchMatches, now) {
      overlayCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      screenRoutes = [];
      screenAgents = [];

      overlayCtx.textBaseline = 'top';

      for (const domain of ATLAS_DOMAIN_ORDER) {
        const panel = atlasLayout?.domains.get(domain);
        if (!panel) continue;

        let agents = 0;
        let hot = 0;
        let inFlight = 0;
        for (const route of groupedRoutes.values()) {
          if (route.domain !== domain) continue;
          agents += route.agents.length;
          inFlight += route.inFlight || 0;
          if (route.agents.length > 0 || route.inFlight > 0) hot += 1;
        }

        const pos = projectWorld(panel.x - panel.width / 2 + 1.3, panel.islandHeight + 0.9, panel.z - panel.depth / 2 + 0.8);
        overlayCtx.font = '700 13px "SF Mono", monospace';
        overlayCtx.fillStyle = DOMAIN_COLORS[domain] || DOMAIN_COLORS.other;
        overlayCtx.fillText(ATLAS_DOMAIN_LABELS[domain] || domain, pos.x, pos.y);
        overlayCtx.font = '600 9px "SF Mono", monospace';
        overlayCtx.fillStyle = '#7f8b98';
        overlayCtx.fillText(`${agents} agents • ${hot} hot • ${inFlight} live`, pos.x, pos.y + 15);
      }

      const visibleLabels = [];
      for (const [routeKey, dock] of dockMap) {
        const route = groupedRoutes.get(routeKey) || dock.route;
        const showLabel = route.agents.length > 0
          || route.inFlight > 0
          || searchMatches.labelKeys.has(routeKey)
          || hovered?.type === 'route' && hovered.routeKey === routeKey
          || pinned?.type === 'route' && pinned.routeKey === routeKey;
        if (!showLabel) continue;
        visibleLabels.push({ route, dock, routeKey });
      }

      visibleLabels.sort((a, b) => {
        const aScore = (a.route.inFlight * 100) + (a.route.agents.length * 10);
        const bScore = (b.route.inFlight * 100) + (b.route.agents.length * 10);
        if (aScore !== bScore) return bScore - aScore;
        return String(a.route.routePath).localeCompare(String(b.route.routePath));
      });

      for (const item of visibleLabels) {
        const route = item.route;
        const dock = item.dock;
        const labelPoint = dock.getLabelAnchor();
        const pos = projectWorld(labelPoint.x, labelPoint.y, labelPoint.z);
        if (!pos.visible) continue;

        const text = shortRouteLabel(route);
        overlayCtx.font = '700 10px "SF Mono", monospace';
        const textWidth = overlayCtx.measureText(text).width;
        const countText = String(route.agents.length);
        const countWidth = overlayCtx.measureText(countText).width + 12;
        const width = Math.max(64, textWidth + countWidth + (route.inFlight > 0 ? 24 : 14));
        const height = 18;
        const x = pos.x;
        const y = pos.y;
        const accent = route.inFlight > 0 ? '#58a6ff' : (DOMAIN_COLORS[route.domain] || DOMAIN_COLORS.other);
        const highlighted = hovered?.type === 'route' && hovered.routeKey === route.routeKey
          || pinned?.type === 'route' && pinned.routeKey === route.routeKey;

        drawRoundedRect(
          x,
          y,
          width,
          height,
          9,
          highlighted ? 'rgba(16, 24, 34, 0.98)' : 'rgba(10, 15, 22, 0.9)',
          accent,
        );

        overlayCtx.fillStyle = '#f5f8fc';
        overlayCtx.fillText(text, x + 8, y + 4);

        const bubbleWidth = countWidth;
        drawRoundedRect(
          x + width - bubbleWidth - 4,
          y + 2,
          bubbleWidth,
          14,
          7,
          route.inFlight > 0 ? 'rgba(88, 166, 255, 0.22)' : 'rgba(255, 255, 255, 0.08)',
        );
        overlayCtx.fillStyle = route.inFlight > 0 ? '#9ecbff' : '#d7e1ec';
        overlayCtx.fillText(countText, x + width - bubbleWidth + 2, y + 4);

        if (route.inFlight > 0) {
          overlayCtx.beginPath();
          overlayCtx.fillStyle = '#58a6ff';
          overlayCtx.arc(x + width - bubbleWidth - 10, y + 9, 3, 0, Math.PI * 2);
          overlayCtx.fill();
        }

        screenRoutes.push({
          routeKey: route.routeKey,
          route,
          rect: { x, y, w: width, h: height },
        });
      }

      for (const [agentId, visual] of visualAgents) {
        const agent = agentMap.get(agentId);
        if (!agent) continue;
        const point = projectWorld(visual.position.x, visual.position.y, visual.position.z);
        if (!point.visible) continue;
        screenAgents.push({
          id: agentId,
          agent,
          x: point.x,
          y: point.y,
          r: agent.phase === 'in-flight' ? 6 : 5,
        });
      }
    }

    function render() {
      const now = Date.now();
      const groupedRoutes = computeGroupedRoutes(now);
      const searchMatches = buildSearchMatches(groupedRoutes);

      updateIslands(groupedRoutes);
      updateDocks(groupedRoutes, searchMatches, now);
      drawAgents(now);
      renderer.render(scene, camera);
      renderOverlay(groupedRoutes, searchMatches, now);
      refreshPinned(groupedRoutes);
      updateHud();
      if (hovered) showTooltip(hovered, pointer.x, pointer.y);
    }

    async function loadSnapshot() {
      const response = await fetch('/api/journey', { cache: 'no-store' });
      const snapshot = await response.json();
      applySnapshot(snapshot);
    }

    function connectEvents() {
      let es;
      try {
        es = new EventSource('/api/journey/events');
      } catch {
        setLiveStatus(false, 'OFFLINE');
        return;
      }

      es.onopen = () => setLiveStatus(true, 'LIVE');
      es.onerror = () => setLiveStatus(false, 'RECONNECTING');
      es.onmessage = (message) => {
        try {
          applyEvent(JSON.parse(message.data));
        } catch {}
      };
    }

    overlay.addEventListener('mousemove', (event) => {
      pointer = { x: event.clientX, y: event.clientY };
      hovered = pickPayload(pointer.x, pointer.y);
      showTooltip(hovered, pointer.x, pointer.y);
    });

    overlay.addEventListener('mouseleave', () => {
      hovered = null;
      tooltip.style.display = 'none';
    });

    overlay.addEventListener('click', (event) => {
      const payload = pickPayload(event.clientX, event.clientY);
      pinPayload(payload);
    });

    overlay.addEventListener('wheel', (event) => {
      event.preventDefault();
      zoomLevel = clamp(zoomLevel * (event.deltaY > 0 ? 0.94 : 1.06), MIN_CAMERA_ZOOM, MAX_CAMERA_ZOOM);
      fitCamera();
    }, { passive: false });

    searchInput.addEventListener('input', (event) => {
      searchTerm = String(event.target.value || '').trim();
    });

    searchInput.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;
      const groupedRoutes = computeGroupedRoutes(Date.now());
      const searchMatches = buildSearchMatches(groupedRoutes);
      if (!searchMatches.bestRouteKey) return;
      const route = groupedRoutes.get(searchMatches.bestRouteKey);
      if (route) pinPayload({ type: 'route', routeKey: route.routeKey, route });
    });

    document.getElementById('reset-view').addEventListener('click', () => {
      zoomLevel = BASE_CAMERA_ZOOM;
      fitCamera();
    });
    document.getElementById('demo-spray').addEventListener('click', () => {
      void triggerDemoSpray();
    });

    document.getElementById('panel-close').addEventListener('click', () => pinPayload(null));

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') pinPayload(null);
      if (event.key.toLowerCase() === 'r') {
        zoomLevel = BASE_CAMERA_ZOOM;
        fitCamera();
      }
    });

    window.addEventListener('resize', resize);

    resize();
    await loadSnapshot();
    connectEvents();
    setInterval(() => { void loadSnapshot(); }, SNAPSHOT_REFRESH_MS);

    function animate() {
      requestAnimationFrame(animate);
      render();
    }
    animate();
  </script>
</body>
</html>
