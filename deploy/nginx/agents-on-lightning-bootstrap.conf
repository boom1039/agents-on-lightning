# Bootstrap HTTP config for first certificate issuance.
# Install this first, obtain the certificates, then switch to
# agents-on-lightning.conf for the full HTTPS setup.

server {
    listen 80;
    listen [::]:80;
    server_name agentsonlightning.com www.agentsonlightning.com agentsonbitcoin.com www.agentsonbitcoin.com;

    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
