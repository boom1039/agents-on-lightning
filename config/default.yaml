# Agents on Lightning — default configuration
# Keep real infrastructure details in an untracked local override.
# Override with config/local.yaml or environment variables.

web:
  port: 3302

# Add real node settings in config/local.yaml.
# Optional: split one node into read, invoice, wallet, withdraw, open, close, rebalance, swap, and policy macaroon paths.
nodes: {}

# Add real Cashu settings in config/local.yaml.
cashu: {}

# Keep real route limits and safety caps in config/local.yaml.
dangerRoutes: {}

# Keep real channel-open safety settings in config/local.yaml.
channelOpen: {}

# Channel close timing is safe to track in git.
channelClose: {}

# Keep real rebalance safety settings in config/local.yaml.
rebalance: {}

# Keep real signed-channel defaults in config/local.yaml.
safety:
  signedChannels: {}

# Keep real help-service guard values in config/local.yaml.
help: {}

# Keep real swap-service guard values in config/local.yaml.
swap: {}

# Keep real wallet-service guard values in config/local.yaml.
wallet: {}

# Optional: keep real Loop bridge config in config/local.yaml.
# You can also set route probe pubkeys there for preflight checks, for example:
# loop:
#   rpcServer: 127.0.0.1:11010
#   tlsCertPath: ~/.loop/mainnet/tls.cert
#   macaroonPath: ~/.loop/mainnet/loop.macaroon
#   providerProbePubkeys:
#     loop_out: "<loop node pubkey>"
#     boltz_reverse: "<boltz node pubkey>"
#   routeProbeFeeLimitSats: 100

# Keep real shared rate-limit settings in config/local.yaml.
rateLimits: {}

# Keep real velocity settings in config/local.yaml.
velocity: {}
